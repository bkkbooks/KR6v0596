body:
  text: 三修身之道近年來由於弘法的因緣每與學佛的同道或留心中國文化的朋友談到佛法與儒學的同異但我只是專心佛法對儒學並無深切的研究所以雖說到一些一定也難於恰到好處我覺得佛法與儒學在其文化背景學理來源及其要求實現的究極目的顯然是不同的但在立身處世的基本觀念及修學的歷程上可說是大致相近的如現在要說到的修身之道為人以修身為本以修身為關要就是儒佛非常一致的問題一儒佛之道大同一修身為本之道被看作初學入德之門的大學上說自天子以至於庶人壹是皆以修身為本這是說無論是誰想不失卻人的本分想為君子希賢希聖或者齊家治國平天下都要從修身做起如孔子說君子求諸己孟子說君子之守修其身而天下平所以子路問君子孔子也就告訴他修己以敬修己以安人修己以安百姓修身就是修己在梵語中迦耶譯為身是積聚的意思身有廣狹的不同含義一指皮膚的感覺官能名為身根近於觸覺神經二指眼耳鼻舌等生理組織名為根身與習用的身體一詞相近三統指身心的綜合體就是個人或個己如佛法常說的我見其實就是身見儒者所說的修身或修己當然指第三義的修治自我說如誤解為身體那修身就成為修精煉氣的方士道了依儒者看來希求世界和平社會安寧國家富強家庭和樂這決不但是發展物產或者改革政治或者嚴密控制人民所能濟事的這必須重視自身的修養尤其是從事政治的人修身更覺重要不能以身作則一味要求別人或者覺得都是別人不好那是不對的所以孔子說子欲善而民善矣子帥以正孰敢不正孟子也說行有不得者皆反求諸己其身正而天下歸之這一觀點與佛法完全一致佛法有打牛的譬喻如牛車不動了那應該打牛不應該打車就是說重視自己的身心修治外在的一切問題才能因而得到解決說到自己心是更根本的所以儒者說修身要推求到正心誠意致知的本源而佛法說到人生眾生的淨化世界的淨化時也歸結到心說心淨則眾生淨心淨則國土淨說到心並非離開當前的自己而只是把握自己的最緊要處而已佛法及儒家同以修身為本從自身而探求到自心以此為進德成業解決問題的關鍵這不像西方的唯物論者從環境從物質出發而想從物質與經濟的制御中去求解決也不像西方的神教者以神為本而想從求神憐愍求神救贖中解決問題唯物論與神意論者都不是直從自己的當下去求解決而引導人心去馳逐那空虛的物質渺茫的神靈修身為本的文化才是尊重人性的真現實者儒佛一致的修身之道是有修學次第的從平凡的人身向上修學達到高明究竟的地步當然要有次第要遵循漸入的程序大學說知所先後則近道矣這是怎樣的重視次第登高自卑行遠自邇原是不容躐等的佛法也是一樣佛說佛法如大海漸入漸深兩晉以前印度傳來的佛法始終的漸學而漸悟或頓悟宋代的竺道生首唱漸學的大頓悟說以為一悟就究竟成佛到後來有的索性專提頓悟撇開漸學使人一下就走那蚊蟲咬鐵壁無有下嘴處的工夫其實佛法也是重視次第的如唐代的唯識學就有大乘入道次第章佛法在西藏有著名的菩提道次第也就是證入涅槃的道次證入有漸入的頓入的但從道的修學歷程說是不能沒有始終先後的現在要說到的修身之道就是依先後的道次來說二大人之學修身為本的大學朱子說是大人之學什麼是小人與大人呢孔子每以君子與小人對稱如說女為君子儒無為小人儒孟子卻有時以大人與小人對稱如說養其小者為小人養其大者為大人在古代君子或大人指人君及卿大夫說大人與小人的對稱也就是君侯卿大夫與細民老百姓這一對稱一直沿用到清季明明德於天下的大人之學實在是政治哲學儒者理想的政治著重在從政者的自修其身以身作則從自身的德學來化導平民所以說君子之德風小人之德草這樣小人不一定是壞人只是局限於生活利益而不能本著德學來利益廣大人群所以樊遲問稼問圃孔子就不免慨歎說小人哉樊須也大人君子的大學本是執政者的政治學所以被看作堯舜禹湯文武周公之道但孔子以來道學民間化政治不只是貴族的政治布衣卿相也起來了這樣沒有從政的平民也有學習政治的而有了修身為本的政治學卻不一定有從政的機會於是乎從政的君子與大人漸演為修身立德的君子與大人小人也不再等於平民而成為醉心私利者的別名大學可解說為大人之學那小學也可說是小人之學嗎古代原有小學與大學的學制初入小學學習文字所以稱文字學為小學學習灑掃應對也就是對父兄賓客的禮節與日常家庭生活的學習等到進入大學近於孔子的六藝教育也就是德化為本的政治學小學與大學原是始終一貫的但學者不免有偏頗的趨勢孔子對子夏說女為君子儒無為小人儒這是分儒學為二小人的與君子的子游批評子夏說子夏之門人小子當灑掃應對進退則可矣抑末也本之則無如之何大抵子夏是重文學的他的門人也都是重文學與禮儀的孔子警告他子游批評他想必他的學風犯了忽略自修其身的大學精神而專在文學禮儀上著力子夏自辯說噫言游過矣君子之道孰先傳也孰後倦焉譬諸草木區以別矣君子之道焉可誣也有始有終者其唯聖人乎子夏的意思是這是一般的根性如此也許有停滯於初小而不能終進於大道的但這是沒法的事如草木有大小一樣能一貫的有始有終那是聖人的事了我怎麼做得到呢這種重文學重禮儀的學風風行於三晉其後荀子韓非子李斯都從這一學風中出來從重禮儀而發展到重法治甚至離棄了修身為本的儒學這應該是小人儒學君子儒學的差別所在不過子夏的話也極有道理有始有終原是不容易的始小而不能終歸於大結果會背棄儒學而偏重尊德性的離小說大如理學的演化到空疏媕陋也不一定是君子儒的真面目吧與此有同樣意義的就是佛法的小乘與大乘了大學是大人之學大乘也就是大人之乘龍樹十二門論說諸佛大人乘是乘故故名為大又觀世音得大勢文殊師利彌勒菩薩等是諸大士之所乘故名為大佛法本是平等一味的無所謂小乘與大乘為了人的根性不同方便適應不能沒有大乘與小乘的差別所以說一地所生一雨所滋三草兩木各自生長在佛的本懷這是一貫的始則為實施權終乃開權顯實一切同歸大乘的實道也就是有始有終其唯聖人了可是由於根性不同學風的好尚不同佛教也就有滯小而不知歸大的小乘大乘與小乘的主要差別是一小乘是重律的律與儒家的禮相近偏重的學派流行於錫蘭緬甸等國都是偏重制度拘泥形跡大乘是重法的重於義理的鑽研法性的體證二小乘是著重己利的大乘是著重自利利他的所以佛教的大乘學與儒家修身為本的大學是比較接近的不過在大乘佛教的流傳中也有些忽略三乘共學小乘不能始終條理成為偏重心性冥證的空疏學派與佛的大乘本義也就多少出入了三大道之二階與二類修身為本的大道可以略分為二階我們的身心是不清淨的思想有錯誤行為多有不妥當由於自己的身心不淨所作都成為生死邊事煩惱與不淨業招感了種種苦果所以學佛應先將自己的身心轉變過來使成為清淨的超過一般的這叫自利也叫般若道因為凡夫都是情識衝動的缺乏正智以致一切是顛倒雜染這非要有般若智慧才能轉化身心這是第一階利他為第二階也叫方便道自己學習成就才可以利人如自己還墮在水裡不會浮水這怎麼能救別人呢至少要學會游泳的本領才得依大乘的真義來說菩薩是應該先利人的也就是利他為先從利他中去完成自利所以說自未得度先度他菩薩以是初發心可見成就自利的般若道決非專顧自己而是在力量未充分時隨緣利他而著重自利等到真得自利那就專重利他了佛法依此自利利他的先後程序分為二階儒家的大學過程也是一樣修身為本這要從致知誠意正心中去完成就是完成自己的初階雖然己欲立而立人己欲達而達人時刻不忘仁民愛物而修學過程非先完成修身不可能修身然後能齊家治國平天下這是第二階這樣為學以修身為本要成賢成聖必先從修己做起儒佛大致相合佛法是完成自利的可以廣度眾生莊嚴國土儒者說修其身而後能齊家治國明明德於天下大道平等不二但在人修學起來就有不同的風格依佛法說眾生的根性千差萬別所以應機說法也就有不同有的一心一意先要修治己身急急的成就己利做到身心清淨自由自在這是以修身為本的專重修身的依儒學說當然是大人之學了但佛法稱他是小乘即使他終歸於大乘而現階段到底還不能與佛的本懷相契合另一類為了利益眾生而發心自利利他這稱為大乘大乘也有二類一智增上的雖念念不忘眾生卻著重於智慧的體證二悲增上的著重於慈悲益物這二類都是發心學佛以自利利他為宗只是初學時著重不同而已大乘學的自利利他可說是窮深極廣說修身要把從我見而來的生死徹底掀翻了生死得解脫儒家的修身意趣相近而深度不夠至於大乘的利他論對象不只是人類而遍為一切眾生論時間不但是現在而盡未來際論空間遍為一切世界不捨棄一個眾生而儒家呢著重於人類拘限於現在局促於這個小天地儒者不大注意到這種深度與廣度的差別反而以小乘的專重修身為佛法這是不對的如儒學不能以小人儒來代表那佛法也當然要以大乘學為正宗了或者見到大乘的智增上者就評為自私不肯為人不知道在修學的過程中自修其身是必要的如儒者儘管欲明明德於天下己欲立而立人己欲達而達人到底非先從修身做起不可而且在行不通的時候也只能退到獨善其身的立場像孔子那樣的熱心政治努力教育以天下為己任但在道不行的時候也會想到乘桴浮於海欲居九夷這可見或是個性不同或是環境所限佛法與儒家都有此暫且著重於自修其身的人佛法應機設教所以老實揭示這先自利與先利他的二類儒者淵源於大人君子的政治學所以自始就以利天下為先以人事為本但事實並不能盡如理想那也只能獨善其身或明哲保身再說總之佛法與儒學以修身為本是大致相近的如過分熱中於政治不自修身而只是開口閉口為人這是儒者所感慨的今之學者反以佛門的自修其身為自私是錯誤的在利他以前徹底的修身一番僅是修學階段如人到六七歲時就進學校去讀書從小學中學而大學在這專心修學階段豈可批評學生為自私為無益於社會難道要像共產黨那樣驅迫學生去勞動生產才算不自私嗎利他必以修身為本真的要徹底的修身克己一番應有這自利的階段二道之宗要及其次第一學道之要在知修身之道是有宗要與次第的如大學之三綱領與八條目無論是綱宗或是次第都以知為必要大學明明的說在明明德在親民在止於至善下手工夫是止於至善這先要知止於至善而後才能得又說物有本末事有終始知所先後則近道矣知是那樣的重要修身以道不外乎道的學習道是不曾離開我們的如經說一切法不出於如中庸也說可離非道也道雖不曾離我們而我們卻沒有與道相應不曾能明道而體現出來這當然有了障道的東西障道的是什麼可能說得不一定相同但不能不修身以明道不能沒有修道之謂教到底是大體一致的道是無所不在的但卻是不可思議不是概念的知識語言文字所能表達得了的老子說道可道非常道又說視之不見聽之不聞搏之不得佛法稱為超越根量而只可強名為道儒者不大深說他但也有無聲無臭等說其實這不但佛法道家儒家世間儘多有這樣的宗教與哲學向這裡摸索由於修驗者的個性不同承受的文化熏習不同所以見仁見智見淺見深或偏或圓有似有真有的夾雜了天帝神鬼的幻影不免愈說愈迷正確的是道不離一切不離我們自己所以可從現實的身心世界深入而體悟他所以不在乎描寫那道是怎樣的從當下的身心去修學從什麼處下手經什麼樣的修學歷程才是主要問題這便是不能不知道的宗要與次第的真義所在如不知宗要不知次第儘他說得玄之又玄都無非是卜度擬議如畫鬼的一樣人人說好其實是毫不相干儒者以修身為本而齊家治國平天下為末以致知也就是知止於至善為先以平天下明明德於天下為後物有本末事有終始知所先後則近道矣在佛法修治身心為本這是不消多說的阿含經以正見為先大乘以般若慧為導正見或般若都說明了知為進入佛道的要門道的宗要與次第怎樣才能知呢這就是聞也就是學了孔子說朝聞道夕死可矣佛在法句中說若人生百歲不聞生滅法不如生一日而得見聞之道的內容淺深可能不完全一致但從聞道的重要來說完全同一口吻聞是入道的必備條件所以佛說四預入聖人流支首先就是親近善友明師多聞正法聖龍樹說從三處聞從佛聞從佛弟子聞從經典聞聞就是從師長及經典去學習的意思孔子也說吾十有五而志於學吾非生而知之者好古敏以求之也吾嘗終日不食終夜不寢以思無益不如學也十室之邑必有忠信如丘者不如丘之好學焉總之好學雖不是專在考據訓詁中作活計但修身或修道是不能不學不能不聞的中庸舉博學審問慎思明辨篤行五項佛法說聞思修三階雖開合不同而修身為本的道都認為必須從學聞中得來古聖先賢依著自己的學歷經驗為了誘誨後學雖然道是不可思議的而不得不以語文來詮表他由於個性及文化承習不同教誨的對象不同說得或深或淺甚至可能有是有非但這終究不失為修學的指導莊子以為表現於文字章句的早成為道的糟粕這是離文字而說解脫的我們雖然不可以盡信書拘泥固執但應從前人的寶貴經驗中咀嚼精英化臭腐為神奇有些空談心性儒者不重視六經學佛而不究三藏自以為直探本源而不知容易流於邪僻古聖先賢的遺文為悠久廣大的學者所應用正像走成了大路一樣佛法每比喻為如大王路雖不一定只此一路或者這還是落在半路或者漸入歧途在修學過程中不妨修正得直捷些平坦寬廣些但到底是值得重視的道路那些一開始就想出不由戶抱著路是人走出來的意見橫衝直闖即使他沒有走上絕路沒有墮落深坑懸崖歷盡千辛萬苦居然闢成新路也不一定就超勝舊路因為唯有認識舊路才能闢成更好的新路從前子路說有民人焉有社稷焉何必讀書然後為學孔子說是故惡夫佞者子路是重於實行的為政而何必讀書與近人所說的社會大學革命第一讀書第二同一想法這是似是而非的所以受到孔子的譏嫌不但從政如此那些說心說性而認為何必讀書的也一樣是孔子與釋迦的罪人二道要與道次之略說儒者的大學之道有三綱領宗要在明明德在親民在止於至善這三要可以作多種解說但應特別注意那三個在字在指出大學的宗要所在更一層層的推究到下手處在明明德就是下文的明明德於天下大學是政治學這是大學的最高理想所在但怎樣才能明明德於天下這就在乎親民了親民就是安人安百姓親親而仁民以親九族平章百姓協和萬邦怎樣才能親民呢這就不能不歸到自己在乎知道止於至善了止是安住不移於止知其所止就是安住於應住的境地這個應止的至善分別來說是仁義禮智等總相的說是良知所以止於至善就是致知心住於善使善心擴充而到達究極就是致知功夫致知的本義應該是住心於道德意識的自覺而引使擴充這到下面再說程朱著重了人人以修身為本的大學所以撇開政治理想以明明德為顯發己心的明德然後推己及人叫新民而後自明與新他達到至善的地步這也許是可以這樣解說的以明明德為先止於至善為後這是受了禪宗影響的新說但探求大學的本義必須注意在字一定要著落到知止於至善為下手處才能與下文相呼應說到八條目就是修學的次第大學的下手功夫在止於至善知止而後能得所以大學的進修歷程是物格而後知至知至而後意誠意誠而後心正心正而後身修身修而後家齊家齊而後國治國治而後天下平對於這一學次想說到幾點一八條目實是七因果系格物為因致知為果致知為因誠意為果治國為因平天下為果因七果七合起來是八項這如佛說的十二緣起支實在是十一因果系一樣二因果的定義是有果一定從有因而來如說欲明明德於天下先治其國但有因可能有果而不一定有果的如家齊而後國治但齊家的並不一定就能治國要在齊家的基礎上加上其他治國的因素才能治國佛法說因果最明白徹了因緣是無限眾多的說某因得某果大都約主因說這還只是可能性而不是決定性更有助緣和合才能成果這所以如固執為致知的一定能誠意齊家的一定能治國那就不免大錯特錯了三致知為先修身為本依大學初章可略分二段第一略示大學之道在明明德在親民在止於至善為什麼要止於至善因為知止而後能得點出致知為先這才結說知所先後則近道矣第二廣說先從古之欲明明德於天下推論到致知在格物然後反過來說物格而後知至而後天下平這正如十二緣起支的逆觀順觀一樣這才總結到修身為本四以修身為本來說致誠正是己利的至德功夫齊治平是利他的盛業古人每讀為格致誠正修齊治平不免忽略了修身為本的關要性五相依相攝修道次第不可作機械的隔別看法如知至而後能意誠致知為誠意所依誠意是不離致知的所以誠意也就含攝得致知但這是誠意相應的知比前階段的知更殊勝又如意誠而後心正正心是依於誠意更遠依於致知的這樣的正心就含攝得致知與誠意當然正心相應的知又殊勝多了這樣修身完成也就是致知誠意正心的完成這一相依相攝的道理極為重要大乘與大學相近也有三綱領稱為三金剛句如大般若經說一切智智大菩提的別名相應作意大悲為上首無所得為方便聖龍樹的寶鬘論也說不動菩提心堅固如山王遍際大悲心不著二邊慧這三者就是菩提願大悲心無我空慧以此三心而修一切都是大乘法如離了這三者那所學所行的不是小乘就是世間法了一菩提是無上菩提佛果以佛為模範發願希欲成就佛一樣的菩提廣度一切眾生名為發菩提心也叫願菩提心這與自立立人欲明明德於天下的願欲相近二大悲心是利他拔苦的惻隱心成佛要從大悲心行中來所以在修身歷程中不但要自心清淨也要利益眾生使眾生的身心清淨這近於大學的親民了約政治說是親民是促進人民進步和平安樂約德化說是新民就是使人心向上向光明人格健全身心淨化三無我慧就是體達性空的般若想自利利人本是人人共有的德性但人人有我見不離自私一切從自我中心出發有了我見不但擴展私欲易於作惡就是行善也不徹底一般的善心善行都不是至善唯有無我慧才會徹明真理能徹底的利他無我慧是佛法特有的至善為一切出世法的根源此三心是大乘學綱也是次第我曾依聖龍樹的五菩提而略明學程首先發起大菩提願誓願上成佛道下化眾生然後廣修十善行積集十王大業為大悲心行末了慧從定發徹證不生滅的空無我性就是體達了無漏的至善以上是般若道這一無漏至善的現證在向上的方便道中也名為菩提心勝義菩提依此體證的菩提心來說華嚴經十地品等譬說為菩提心寶眾生心是性本清淨的也是本性光明的發菩提心就是使自心的本淨與本明顯發出來經中比喻說眾生的菩提心寶如來藏佛性在生死煩惱中好像寶珠落在糞泥裡發心修行就像取出寶珠洗淨磨光恢復晶瑩的寶性一樣這與理學家的明明德說相近這是承受佛化的新儒學依於勝義菩提心的自證然後大悲廣度眾生如說成就眾生莊嚴國土等到一切圓滿名為成佛也就是絕對善的圓滿顯發稱為最清淨法界佛法的進修次第有此二階一分圓頓的佛教如禪宗等大抵忽視前階而想直入勝義菩提心這一學風影響儒學而成為理學然在完整的道次中始終條理是不能忽視先後的佛法遍為一切眾生所以如廣說修學次第是非常複雜的最大概的分別為三一五乘共的人天乘二三乘共的二乘三大乘不共的佛乘如儒家的大學一般說來是人乘通於天乘的善法佛出世的時代人類的厭離心很深所以依於人乘的善法而趨入無漏至善的聖法以後才回小入大依佛法來說本著良知良能生得善擴而充之救人救世是偉大的但是容易的五乘共法如獨善其身專心修證達到身心淨化的無漏至善如小乘那樣徹底根治世間的迷根當然是不容易的但也還不是最難的著重人世間事或著重出世都不算太難如在身心淨化中同時利人利世在利人利世中同時體達至善無漏那就被稱為火裡蓮花難中之難的菩薩了佛陀出世本意在以人來為階梯通入大乘的究竟道如依大學三綱領而深化為大乘三句就直通無礙但由於時機的厭世心深所以方便開示了偏重出世的小乘這雖然回小向大也還是悲心薄成佛的進度很慢如依人乘而直入大乘才是佛法的真宗這就是太虛大師所說的人生佛教三格物以致其知信成就一約儒學說修身為本的大學在乎先致其知致是得到的意思儒者所致的知依大學孟子中庸看來雖含得理智成分但著重在善是性善的良知如大學開宗明義初說在明明德在親民在止於至善接著就說知止而後能得次廣明說先致其知其後解說止為為人君止於仁為人臣止於敬為人子止於孝為人父止於慈與國人交止於信不遠處就說此謂知本此謂知之至也至就是致所以知止於至善仁等就是知止學習到得而勿失就名為致知古本大學中文義一貫極為明白致知的知是至善的良知初學者要安住止他進而得到他試引中庸及孟子來說明中庸說回之為人也擇乎中庸得一善則拳拳服膺而弗失之矣又說誠之者擇善而固執之者也佛法說思擇抉擇都是知慧的作用擇善就是知善思擇善固執勿失就是知止於善慮而後得的致知起初此雖是一善一端的善但能固執勿失止就能充類至盡而廣大起來如中庸說其次致曲致曲即致一端的善能致曲就能有誠能化了孟子說性善說良知良心把致知作致良知解是儒者的一般見地依孟子說人所不學而能者其良能也不慮而知者其良知也孩提之童無不知愛其親也及其長也無不知敬其兄也這是約孝弟說孝弟為仁之本舉出愛親敬兄的善德以例明性自有之的良知又二次說到惻隱之心羞惡之心辭讓之心一作恭敬是非之心是人人所固有的孟子所說性善的良知實在是道德意識每人都是會或多或少流露出來的只是平日蔽於物而陷溺其心這才使良心放而喪失梏亡了愈來愈少有的竟似乎沒有善性一樣所以孟子舉牛山濯濯的比喻來說明這良知的消失依佛法說善心是可能在一期間喪失而不現起的稱為斷善根這只是一期的不起如受到苦難的逼切或善友的激發又會倏的善心現前稱為續善根斷善根的是絕少數在一般人善心都是或多或少現起的所以致良知不是得到什麼高深的悟境不在乎良知善心的生起而是怎樣使良知念念相續展轉增長如源泉的渾渾而來流成長江大河像星星的火使他旺盛而不息只此一念良知孟子說求則得之思則得之重在一個得字得是勿失知至約佛法的術語說是成就不退良知是人人固有的但要致知或者說得之勿失這可要一番修持功夫孟子提出了求與思中庸說拳拳服膺固執大學說在格物而格物致知要經止定靜安慮得六個過程現在以格物為主來說明他什麼叫格物儒者的異說極多有的是越說越遠了如鄭注以為格猶來也物猶事也其知於善深則來善物其知於惡深則來惡物言事緣人所好來也大學明明說物格而后知至致知在格物格物為因致知為果而鄭注卻顛倒的說成知至而后格物了這些也不用一一料簡良知的所以喪失是蔽於物而陷溺其心的關係對於這孟子有一段重要文字如說耳目之官不思而蔽於物物交物則引之而已矣心之官則思思則得之不思則不得也孟子分官能為二耳目之官是眼耳鼻舌身五根是色法物從五根而發生的五識是不能思擇善惡與義理的佛法中的一切有系也這樣說如眼等根識作主就會蔽於物而喪失良知心之官就是意根從意根引發的意識孟子是看作本性善的如意識作主能思擇依於義理就會離惡而向善從物質官能引起的根識觸對外境名物交物外境如約法假說是色聲香味觸及五塵落謝影子的法塵等約取假說是複合物即外而山河大地草木叢林內而身家國天下的一切事物觸對這些事物時如純依生理官能的活動沒有良知的思擇就會為物所引轉起貪起瞋起癡起慢了這便是物交物則引之的蔽於物不能為善去惡而陷溺其心了從意根而起的意識是能思擇的在意識觀察事物時思擇善惡就能為善去惡漸得良知而勿失孟子將習成的惡心歸源於物質的官能性善的良知屬於能思擇的心這種心物善惡二分法實在籠統之極但為物所轉蔽於物而習於惡能思擇才能致良知到底不失為修持的方法有人釋格物為格物欲以格為格拒的格物為物欲似乎訓詁有問題大學說物有本末中庸說不誠無物物是身家國天下的具體事物並不是格除的對象而且儒者只是欲不可縱養心莫善於寡欲如儒門心傳的人心惟危也還是允執厥中並沒有棄絕人心欲大概宋儒在佛法的熏習中習聞佛法的離欲說又不曾深究離欲的真正意義這才會有格物欲的解說而宣傳人欲淨盡天理流行的新儒學陽明釋格物的格為正從論語的有恥且格孟子的惟大人能格君心之非來說訓詁是對的但陽明說物乃意之用格物乃格意之不正而歸於正不免偏於心理的解說其實大學的物有本末孟子的物交物蔽於物都就是格物的物物是一切事物身家國天下等在根境觸對而生識時能思擇佛法名明相應觸不起貪瞋等而引發惡業就能不為物所引不為物所蔽能得其正止於善這就是格物於事物而能正格物不起染心善念現前能保存良知而漸漸的長養成就儒學在平常日用間用力觸境生情能中節待人接物能守正隨時格物常止於仁敬孝慈信愛親敬兄親親長長不失仁義禮智修身之道就從這樣的格物知止入門平常踏實這便是人人能學人人應該學的大學知止格物的入門功夫是人人所能學的但要圓滿成就就不大容易修身圓成才是致知的圓成這與佛學的慧一樣是首先的也是貫徹始終究竟圓成的從初學到究竟成就大學歷舉止定靜安慮得這與孟子所說都包含了止與觀的修法止與觀佛法中有儒道印度教等都有這與佛法有什麼差別呢這就從所止所觀的不同而分別所以應注意止在那裡觀個什麼如從博學到篤行可說是從求知到實踐的方法但所學所問不同所行的也就不同決不因學問思辨行的方法歷程相同而所學所行也成為一樣因此如但見止觀的學程相同就把儒佛攪成一團弄得儒不成儒佛不像佛那真不免被譏為望見生鬚的就認為是老父了然而世間卻儘多這樣的附會圓融的大家大學的止定靜安是屬於止的慮得是屬於觀的佛教說修止不外乎九住心住心的九個過程這與止定靜安雖開合不同而大致一樣今先依佛法說明住心的歷程再來說明大學與孟子九住心是一內住我們的心經常是向外馳散的被稱為心猿意馬跳躍騰踔瞬息不住開始修止時必須收攝此散心繫念到裡面來止於要止的境地依儒學說止於仁止於仁義止於仁義禮智止於仁敬孝慈信但可總名為仁即性善的良知二等住修習稍久動心漸息心也清淨多了能前後相續的等流下去還不是長久的如止於仁就一直住於仁心三安住以前有時會失念而散亂到別處等到發覺已散動久了現在偶爾失念心向外散能立刻攝回還住於要住止的境地四近住心愈來愈安定了不但不會散亂太久就是偶爾散亂幾乎是一動就攝住到此住心已達相當安定的境界這四住相當於知止而後能定孟子稱此為求放心一般人總是逐外物而流動散亂如雞犬的放失到處亂跑不知道歸家一樣人心也是如此所以稱為放心孟子說學問之道無他求其放心而已矣又說求則得之求放心就是攝亂心使心不散而住於良知住於良知而攝持不失也就是孔子的操則存如能安住淨善的良心因定力漸深而愈明愈淨展轉增長就是長養再修習下去五調伏美色妙聲等一向是因而散亂動失的現在心被調伏了對於這些境相不再散亂而起貪瞋等了六寂靜障定的欲貪等靜中最易現起的不正尋思都漸能不起不因之而流散七最極寂靜這不是涅槃的寂靜千切不可誤會如偶爾失念瞥然現起貪欲及惡尋思能立刻息滅到這障定的煩惱不起了如中夜的寂無聲息一樣心地是清明平靜極了從調伏寂靜到最極寂靜大學總稱為靜所以說定而後能靜止定靜的過程姑以譬喻來說如人乘船在波翻浪轉中動亂不停船停了如止人上了岸不再有動搖的感覺如定但是心有餘悸或者氣喘汗流休息過後心平氣和如靜再修習下去八專注一趣心住所止的境地進到沒有缺失沒有間斷安定的相續下去但還要用力去控制九等持不必再加功用這叫不勉而中自然而然心地平正而相續到那時不但心地安定而且特別明淨功候成熟會發生輕安身心獲得從來沒有的愉悅這也許就是孔顏樂處而且充滿了力量大學的靜而後能安就是這樣的輕安輕安發生才算修止成就這種修止過程佛法與世間學都是一樣的止於明淨的善心仁經定靜而引發輕安這就可以進而修觀了這不是說以前完全沒有審思觀察反而在修習的過程中止的安住觀的明察一向是互相交替推進的不過在止沒有修習成就思慮就只是散心的分別如風中的燭光一樣所以止後修觀是修止成就才能修觀成就的意思大學說慮是止後起觀中庸說擇孟子說思都是通於散心的什麼是觀梵語毘鉢舍那經上說能正思擇最極思擇周遍尋思周遍伺察若忍若樂若慧若見若觀是名毘鉢舍那儒者止於至善良知怎樣的思慮觀察呢簡單說是譬類推度的思察我們知道儒者以修身為本從反求諸己身做起所以是從切近的自己充類至盡的推而大之論語說仁者己欲立而立人己欲達而達人能近取譬可謂仁之方也矣近取譬就是近取諸身以自己為譬而類推到別人這是儒者為仁的一貫方法又說博學而篤志切問而近思仁在其中矣近思也就是近取譬的類思孔子多為門人說如說己所不欲勿施於人我不欲人之加諸我也吾亦欲無加諸人施於己而不願亦勿施於人所惡於上毋以使下此之謂絜矩之道這也就是一以貫之的忠恕以己度人想他人與自己一樣是恕盡己的心是忠以自度他使自心的仁做到充類至盡就是忠恕這在佛法中稱為以己度他情的自通之法這是人乘善法如深化起來就是修菩提心孟子也徹底使用這類推的思慮但多為政治領袖們說或名為充如說凡有仁義禮智四端於我者知皆擴而充之矣苟能充之足以保四海苟不充之不足以事父母人能充無欲害之心而仁不可勝用也又稱為推如說老吾老以及人之老幼吾幼以及人之幼推恩足以保四海不推恩不足以保妻子古之人所以大過人者無他焉善推其所為而已矣無論是擴充自己的良知或是以己推人的仁心都不外乎類推甚至說齊王好樂好貨好色都不妨只要推此心而與百姓同之就得了但要推而充之先要從類推的思慮中求得這推己及人的良知這是一以眾人推自己如說人人有貴於我者勿思耳思則得之二以聖人推自己如說聖人與我同類者聖人先得我心之所同然耳三以己身推己心如說指不若人則知惡之心不若人則不知惡此之謂不知類也四以物推己如說豈愛身不若桐梓者弗思甚也類推的思慮法孟子是繼承了近思的方法而擴大了些再擴大就是類萬物之情而通神明之德了安住於明淨的善心良知作以己推人的審思類推而擴充到一切名安而後能慮等到止觀相應觀心成就就是不違仁孔子說君子無終食之間違仁造次必於是顛沛必於是這可能是夫子自道而回也其心三月不違仁應該是顏淵向孔子的修驗報告要知道良知是德性的端緒經一番修持功夫止定靜安還不能仁心普洽必須再經近思功夫也就是忠恕彊恕的力行達到不違仁慮而後能得才是致知的圓滿成就上來說明大學的知止到能得是格物致知的圓滿學程上面說格物是在對境時心得其正正於物是適宜於解說修止的因為攝持亂心求放心無非是止於至善不為物所引不因貪欲尋思而散動然在修觀時格物就應解說為類推於物格可解說為度量如平常說的格量儒者稱以己度他的類推法名絜矩之道絜是度是量長短的矩是三角尺是用來畫方形的要使物長短適宜方正不偏要用絜矩來格量對於人長幼上下都要以己心去推度他人心是同樣的只要以己度他就能恰恰好正推度審思的絜矩就是自己的良知所以叫近思格也可解說為譬類以此譬彼以此類彼還不是絜矩一樣兩晉時佛法有格義派以儒道的義理來比配佛法宋初慧琳撰道生誄說徵名責實惑於虛誕求心應事芒昧格言格言就是喻說所以格有比類的意思也就是推度的意思譬類的推度是格以己度人家國天下就是格物這樣的格物能使良知成就而不失所以說物格而後知至關於格物致知說得多了這與佛法的無量等至大致相近這與孟子的養氣等留到正心段去解說不外乎世間的人天善法但在古代漢學家在訓詁中過活似乎不知道孔孟的修持法宋明的理學家在佛法的熏染中意識到了可是心中先存著一種禪思徹悟的境地所以雖自以為反求諸六經而得之其實得到的是糅禪於儒不儒不禪的理學陸王不消說了程朱也不能例外程朱不知格物致知的意義反以為大學有了缺文這才照著自己的意思混禪於儒的新見解補上一段如說欲致吾之知在即物而窮其理即天下之物莫不因其已知之理而益窮之以求至乎其極至於用力之久而一旦豁然貫通焉則眾物之表裡精粗無不到而吾心之全體大用無不明矣一旦豁然貫通宛然是禪者口吻依儒學說及其至也雖聖人亦有所不知而對於大學始教入門下手功夫朱子就要人去做到眾物之表裡精粗無不到而吾心之全體大用無不明真是好大口氣格物致知為修道的下手功夫而理學家卻說得那麼高妙這真是道不遠人人之為道而遠人了二約佛法說儒者以致知入門學佛的以正見為首見就是知是深徹的知儒者重於道德的良知佛法雖也是道德的但更富於理智的成分這所以佛法從道德的確認而進入如所有性盡所有性的事理正覺至善的知見不僅是仁心而要能契合於事理的真實因此佛法的修得正見不只是儒者那樣的格物而要從無限時空一切眾生中如實正觀死生的歷程心識的性相染淨的樞紐等得到如實的正見也就是真正的良知的體認先約共世間的正見來說可略分四句一知善知惡依心識而展開的身語活動都是有善有惡的知道有也就確信是有這是道德的確認而使自己的身語意業有所遵循去惡行善陽明說知善知惡是良知佛法的正見也確是以知善知惡為出發的但人類的道德意識知善知惡不一定是正確的我們無始以來受煩惱惡業所迷亂今生又為環境習俗所熏染每每習非成是不能自覺如理學者口口聲聲不離天理良心而目對纏足等惡習女子未嫁而殉節等誰也不覺得背理所以知善知惡而離惡向善要從尊重自己尊重真理尊重世間不斷學習去漸漸完成二知業知報知道善與惡要行善去惡這不但是應該如此而認為是事實的確如此因為行善或作惡時當下就引發或善或惡的能力潛在的業力善惡的業力一定會招到安樂或苦痛的果報為了自己的福樂而行善附有功利的動機不能說是最高的善不過只要是行善不論是為了自己的福樂而行善或是覺得應該行善而行善終究是有福樂果報的作惡的一定有苦報善惡業一定有果報應該去惡應該行善的努力這才有了著落而確信為非如此不可三知前生知後世善惡的業力會影響別人家庭社會但重要的還是自己自己的行善或作惡對影響自己來說就等於自己在準備向上或向下向光明或向黑暗有的自己現生受報有的來生受報上升或者墮落人的生命不是唯物論式的死了完了而是一生一生的相續所以業力是決不落空的說到這儒者就不同了雖信得自己現生受報或報在兒孫卻不說有來生受報所以如沒有兒孫的或行善而受苦的多數會動搖道德的信念不是說天道無知就會慨歎為堯舜與盜跖到頭來都是一樣落入懷疑論四知凡夫知聖人凡夫是一般平常的人眾生行善或作惡受福或受苦一生又一生的常在上升或下墮的輪迴中活像世局的治亂無常家庭的貧而又富富而又貧一樣所以平常的生命就使是非常安樂如上生天國也不是究竟的還是要墮落的如能除去那輪迴的癥結達到徹底解決永恆自在那就是聖人與儒者的聖人含義有點不同如能確知確信有超越庸常的向上淨化就能策導自己邁向高明的境地如上所說的正見從知善知惡而來由淺及深由近及遠不但知有善惡禍福更知生命相續絕對永恆打開了出世法的大門約佛法的共世間正見來說就有些是儒者所不知的了出世三乘法的正見是以上說的正見為基礎而為更深廣的悟入身心的行為善惡業報的延續這一切是緣起的依因緣而存在依因緣而現起自與他身與心眾生人與國土現在與將來彼此間有著密切的因果關係儒者不大深究這些只是以自心量度別人知道人心是同樣的從此而獲得明德進業的正知但佛法要深觀這些知道一切是緣起的一法如此法法如此自己如此一切眾生也如此儘管眾生的根性好樂不同異見異忍異欲儘管世間的因果無限差別但一切是緣起的存在那是最普遍的軌律法法的定義是軌持意思是不變失的軌律從此而獲得進修解脫的正見從自己而觀察到眾生從眾生而觀察到自己發現一切眾生都在依於因緣的輪迴中生而老老而死死而生知道這緣起因果是以心為主為導的以心的傾向而轉移的眾生的心無始以來就惑亂了不能契合於緣起法不合真理叫做無明依無明而有煩惱依煩惱而造業依惑業的輕重造成了升沈輪迴的苦樂果報發現眾生的生死以無明為本而有無明緣行生緣老死的十二緣起或簡化為依惑造業隨業受報這生死的必然律叫做緣起支性這是一切眾生所同的佛只是發現他而不是造作他這樣如心能契合緣起得正知見不再迷惑顛倒就能破除生死的癥結而得解脫了聖者的解脫都是遵循這正見般若明為本而起修正見正定的八聖道或簡化為依戒得定因定發慧這解脫的必然律叫做聖道支性這是一切聖者所共同的古仙人道佛也只是發現他而已向迷的緣起支性轉悟的聖道支性都依於心為主導的緣起而得正見一切是依因待緣的存在深刻的觀察起來到達一切緣起法身心自他國土等的底裡緣起寂滅性體現得萬化的平等一如稱為空性真如等空性不是沒有而是緣起法的本性普遍的永恆的絕待真實由於一切法性的本空本寂本如所以顯現為前後的推移沒有常恆性稱為諸行無常現為彼此的關涉沒有獨存性稱為諸法無我雖現為時空中的萬化生滅而終歸於空稱為涅槃寂靜這就是緣起三法印三大真理其實絕待的真理那裡會有二有三這不過從現象去把握他從不同的角度去體認他而作不同的說明如從法法本性說只是一切法空性一實相印觀緣起廣觀一切法中不廣不略觀身心要略觀自心法性而得這樣的深見才是出世法的正見知善惡因果知業報相續是五乘共的正見依此而知緣起緣起的空寂性是三乘共的正見大乘正見也還是這個只是更深徹的更切要的確知確信而已從更深徹來說善惡身心依正這一切都是緣起的存在稱為假名有假名是有特性有形相有作用有因果關係的假名的意義是依於因緣而存在施設而有不是永有的自有的實有的存在這樣稱為假名的緣起有當體就是空寂空是無實自性的意思所以一切法是假有也就是一切法空空有無礙這一即有即空的深見使共三乘正見中或者離有說空離生死說涅槃離差別說平等的可能誤會一掃而盡開顯了圓滿的中道正見就因為這樣即空即有的緣起身心自他依正等都不是永恆孤立的存在而是無礙的相融相即一法依於一切法一切法依於一法所以不但空有無礙身心依正自他迷悟心境眾生與佛一切都融通無礙從空有無礙中這樣的一即一切一切即一開顯了圓滿的中道正見從更切要來說緣起法是依心而為轉移的心為一切法的樞紐依心而得正見最為切要心也是緣起的也就是假名有的本性空的即空即有佛處處說空寂但有的誤解了引起誹毀所以佛又處處說淨如法性本淨心性本淨淨實在就是空的別名所以深見心性是心本空寂的心本清淨的心清淨性心光明性就是眾生心的至善德性約真說是心的真實約善說是心的至善眾生無始流來的至善明心就是具無量功德相的如來藏性佛性成佛就是究竟圓滿了究竟清淨離垢清淨了心性學佛就是怎樣的顯發了怎樣的體見了心性這切要的心性正見在大乘修學中稱為發菩提心也叫做起大乘信心所以說菩提心者謂如實知自心大乘正見從知善知惡始經重重的深入而到光明清淨心性如單說知善知惡與自心清淨菩提心大乘信心好像與儒者的良知相近我國的先哲也歡喜說他一致其實是淺深不同的如佛法成立於三世業果的緣起而儒者卻不然如儒者的良知是人之所以為人的是人與禽獸所差別的而佛法的本心淨性卻是一切眾生所共同的如儒者的良知舉人人知道敬兄孝親等來說是人人所現起過的而佛法的心本淨性卻要脫落習成的分別才能顯發所以儒者的致良知如保持草木根芽而使他長養而大乘正見菩提心卻如污穢中的摩尼珠礦藏中的寶性地下的水源要經過極大的功力才能掘發出來的因此儒者的致良知無論功夫如何總不過是有漏現量心有漏無分別沒有隨念分別計度分別善心的等流相續而佛法中勝義菩提心的顯發卻是脫落塵習無漏現量的覺性現前古人以致良知來比擬心性的徹悟勝義菩提心現前是不適合的但與初修世俗菩提心卻大有相同處無上菩提是佛所圓滿了的究竟清淨了的極真至善的大覺這雖可說一切眾生本來如此但在無明蒙惑下卻從來沒有體現過如以此為究極理想修慈悲心聞思本空本淨空有無礙的正見慧以確立成佛的大信願就是世俗菩提心這與致良知一樣都要經思擇觀慧才能得能成儒者的修法是格物以自心而類思他心重在類推如上面已說到了而菩提心大乘知見的修習古來有推換二法什麼是推首先深念慈母的恩德而起報恩心這與儒者以孝為德本的精神極為符合在三世因果的觀察中知道一切眾生在過去世中都是我的慈母所以從現在的慈母推及與我有恩的再推及與我無恩無怨的再擴大而推及與我有怨的都曾是慈母而生起懇切的報恩心想到這恩中怨一切眾生有苦難而想拔濟他想到眾生的沒有福樂而想給予他見到眾生的得到福樂而生歡喜心於一切眾生起平等心總之觀一切眾生為母而起慈悲喜捨心但這必須通達一切法空性圓滿菩提才能完成利濟眾生的大願由此慈悲心聞思的空性慧而引發菩提心達到成就什麼是換設身處地自他互換也就是將別人想成自己這樣別人的苦痛就是自己的苦痛別人的幸福就是自己的幸福這種看一切眾生如自己的思擇一定能引發懇切的慈與樂悲拔苦心而為引發菩提心的方便這樣的修習成就名為菩提心相應也叫一心常念菩提就是不違菩提心了所以佛法的成就正見或起大乘信心發菩提心都是從自己自心而類推到究竟深廣的如儒者的致良知如局在現在此地人類那只是人乘善法如由此而推及一切眾生盡未來際而知有究竟的聖果可得那就通入菩提心由人乘而入佛乘了四誠意戒成就儒者的修學次第是致知而後意誠依佛法由於正見正信引起戒行的修學意是意欲意向的願欲誠是真誠無妄由於格物而致良知引發出真誠的意欲止惡行善在平常實踐中表達出來如果說心說理頭頭是道而所行的卻不是這樣或者想為善而毫無力量這說明了那是僅有空虛的知識不曾化為自己的見地不曾成為自己的信仰內心空虛無力就是不誠不誠就會自欺說應該行善吧卻不肯行等待明天將來或者原諒自己不能做說應該止惡吧卻不能止惡而總是把自己的過失推向外面別人不好環境太壞這種自欺由於缺乏真誠的意欲沒有誠意也就沒有至誠無息的不斷向上努力了佛法依正見而起的學次也是一樣如佛說的八正道中正見以後就有正思惟或譯正欲就是審思決定而要求實踐這依內心的思欲而表現出來八正道中是正語正業正命正語是語言文字的如法正業是身體行動的如法正命是合法的經濟生活這表現於外的戒行由內心的正精進來策動精進是止惡行善的努力依經論的分析精進是一沒有生起的惡心要不使他生起二已生起的惡心要斷除他勿使他繼續下去三沒有生起的善心要使他生起來四已生起的善心要使他不失使他增長這種止惡行善的精進由正見正思而引發出來強而有力正像大學說的誠其意者毋自欺也如惡惡臭如好好色精進的止惡行善時時警策自己約不自欺說名不放逸使為善止惡的意欲大有不得不止不能不行的情況所以經上說見小罪而生大怖畏見微善而生大歡喜修學到心行如此才可說誠意或說精進不放逸了依大學所說的誠意應該有止惡行善的表現止惡行善本可說人人都有過此心的卻大家都不能完滿的實行儒者說致知的才能誠意說明還嫌簡略如應用佛說的心理分析這有信為欲依欲為勤依的次第也就是誠意的心理過程有正見而成立信心的致知那一定會引起實現的欲求唯有內心的堅強信願才能策發自己去努力實行為善止惡的力量來源要從這裡面去發掘出來誠意的學習大學揭出了慎獨功夫理論是你在無人處做了不善以為沒有人知道總想掩飾起來可是大家看得清楚不過怎麼也掩飾不了所以說人之視己如見其肺肝然故君子必慎其獨也十目所視十手所指其嚴乎因此不但不可彰明的作惡連閒居獨處也還是放逸不得絲毫不可不善做到表裡如一才得能這樣的慎獨就能誠意了這種功夫或稱為居敬時時警策不放逸如臨深淵如履薄冰戒慎恐懼的功夫存誠非常有意義儒者應該有功夫做得很好的但佛法的理論與方法更有效率為什麼不可閒居為不善呢大學說因為是瞞不了人的人人的眼睛是雪亮的但事實上儘多的非法逃過了法律的處罰也避過了輿論的制裁古人有詩說周公恐懼流言日王莽謙恭下士時若使當時身便死一生忠佞有誰知人心難知甚至有海枯終見底人死不知心的慨歎一般人總覺得有些是可以掩藏起來的所以但憑瞞不了人的理由來做慎獨誠意功夫不但力量不強而只能為少數人說法依佛法說我們的一舉一動一善一惡當下就留下業力的熏習可說是錄下了錄心帶通俗的說有俱生神一一的記錄在薄子上善惡一定有報無可躲避無可掩飾什麼都可欺還能欺自己嗎其實無意識的錯誤都有某些不良影響所以佛弟子止惡的誠意不是怕人知道而是自己知道了就感到憂悔所以不敢覆藏隱瞞立刻要懺悔這樣的隨犯隨懺時時保持清淨精進行善心地就自然純淨起來這有心理學的根據在宗教信仰中強而有力而且是多數人可以因此而止惡行善的儒者說別人會知道這是局於人倫道德的立場若在宗教的領域內那就是列祖列宗會知道天神知道地祇知道佛與菩薩知道楊震說天知地知汝知我知何謂無知這就是有了天神地祇的信仰而能夠不欺暗室西人相信上帝知道耶穌知道也有同一作用依佛法說十方諸佛與大地菩薩悉知悉見什麼都知道自己的起心行事什麼都顯露在佛菩薩前怎麼可以無慚無愧的作惡呢不善心起了怎麼可以覆藏不趕快懺悔呢但佛法與神教不同懺悔不敢行惡不是怕佛菩薩來刑罰我而是確信不善心行的生起不懺悔一定要受因果律的決定墮落受苦沒有人能代替得了在清淨莊嚴的佛菩薩前越發感到慚愧見賢思齊而增一番力量使自己力求清淨慎獨誠意佛法的戒行清淨是從身語的如法推究到起心動意的清淨在三寶加被佛菩薩護持下謹嚴戒行懺悔清淨這應該比上帝知道更為合理比起別人知道更為有力五正心定成就依誠意所成惡止善行的戒學進一步修定原是順理成章容易成就的因為心地善淨雖是散亂也如池水的微波蕩漾很快的就會安定下來沒有誠意的思想不正動機不純行為邪僻內心動亂得波翻浪湧一樣如想修禪定那就難怪不易成就有的反而會顛倒錯亂失心入魔所以戒為定學基礎如經所說戒則不悔不悔則心樂心樂則得定誠意而後能正心正心就是定先從字義來說梵語三昧三摩提意義為等持也譯為正定正就是等正定是平等持心不浮不沈不昏不散又梵語質多義譯為心可泛稱一切心理現象重在心理的統一性心的特殊的意義就是定如三增上學的定學名為增上心學心是定有七名的一名修心與修定的意義相同這樣說正心就是平等持心的定決非附會的解說再從內容來說一心不正就是心不定什麼叫心不正大學舉出了身心有所忿懥有所恐懼有所好樂有所憂患心就不能得其正這只是重要的舉例佛法說得更詳明些佛說心要離五蓋貪欲瞋恚惛沈睡眠掉舉惡作疑才能得定一般的心識活動佛法稱之為欲界心他的特性是瞋恚與愛樂五欲的貪欲離了這才能得定得正心名為得色界善可見大學的好樂是對於色聲貨利的愛著忿懥當然就是瞋恚了我們的情緒經上分為五受苦憂喜樂捨如能得正定那就一定沒有憂與苦憂受苦受及五蓋中的惡作悔悔必有憂苦熱惱或恐怖就是大學所說的恐懼與憂患了必須離去這些心才能正能定這是大學所說與佛說的定學相合的二心不在焉視而不見聽而不聞食而不知其味這是正心定的描寫我們的心除了熟睡悶絕等而外意識在不斷的活動意識是常與眼耳鼻舌等五識相應成為見色聞聲等作用修定是攝心而不使他向外馳散學習到心能安住時純意識的內在活動代替了與五識相應的意識約世俗的道理說這是由於自心的暗示自己使自己的視聽等神經末稍減退或暫停作用也就是心依意根心緣內境而不向外不在眼耳等五根上轉這叫心不在焉那時心於內住明徹寧靜就有視而不見聽而不聞的定相現前說到修定有依坐修歷緣對境修二類但修習的不免偏重重於坐中修的會得到更深的定定心深起來連呼吸脈搏心臟等活動都會停止十天半月中可以更久些不動不起不食不便利那怕雷轟山崩也不會感覺如在行住起臥語默動靜中修叫歷緣對境修六祖以下的禪者都著重於此修習到在一切生活中隨著大眾起身吃飯搬柴挑水來去出入連自己在做什麼都不管只是心念成片驀直的這麼一念萬年去旁人看來兀兀騰騰現在叫呆瞪瞪而內心卻淨念不動這不是不視不聽只是無關心的瞥然過去不加分別實在說來這是五俱意識的一味相續還不是不見色不聞聲的定中意識呢古代禪者在徹悟以前都曾經歷過這樣的定相定前由於偏重的不同中國禪宗行者定心不及印度禪師的深切但活潑潑的禪風不會陷入枯寂的禪行儒者的正心也是屬於動中用功的一類孟子有一番養氣功夫至大至剛塞於天地之間這是定的一種境界也許漢儒失傳了宋儒又專在語錄禪悟中求消息缺乏定的經驗也就不能充分明了這回事養氣守氣與不動心有關不動心是心志堅定不會因思想紛雜情緒衝激得失存亡而疑惑憂悔變異孟子稱此不動心為勇是可從不同的方法來達到而內容的淺深不一如孟子所舉的北宮黝他是不管對方是誰王公諸侯在他的心目中也是你是什麼東西以輕視鄙視一切的方法養成一往無前的勇氣孟施舍的方法不同他是視不勝猶勝也最後勝利終歸於我不問成敗總之是能為無懼而已矣曾子的勇就不像那種武俠氣派如自己不對就謙退柔和如確認為合法合理那就雖千萬人我往矣勇氣從理直氣壯中存養得來形形式式的不動心宗教徒的臨終心念不亂不怖不畏等也是都是心志堅定坦然無畏而這不動心的修得孟子與告子就都與氣有關孟施舍的勇孟子也稱他為守氣這可見不動心與養氣有關養成堅定的勇氣方法不同淺深不同遲速也不同北宮黝孟施舍是武俠派如日本的武士道在切腹時有的要能做到在腹破腸流血盡力竭時保持心不驚怖身不動亂神智清明到死去儒家與佛弟子的不動心當然是不會以此為理想的但也能做到而且更高的境地說到遲速這與個性及身心有關學習同一方法而求心意專一不亂有的一天二天有的十天半月就能成就有的三年五年還沒有上路呢大抵意性怯弱的癡行人什麼都沒有決心什麼都鼓不起勁思想紛亂的尋思行人大都患有神經衰弱症學習就困難得多告子的修成不動心比孟子早些儒者就推論出一番道理以為是方法問題實在並無根據與修習的實際經驗不合孟子說性善荀子說性惡告子也說性但說性無善不善孟子說仁義告子也說仁義但說仁內義外孟子得不動心知言養氣告子也得不動心也說言說氣可見告子與孟子是相近的不同學派以不動心來說重要的不同原因是告子的仁內義外說孟子以為仁人心也義人路也仁人之安宅也義人之正路也仁義都是根於心的我固有之所以說在內但告子以為仁愛是以我為悅的是適合自己的自然情感而產生的如敬親愛兄弟可以說在內義是適合社會關係而決定的行為軌範如敬長等所以是在外的由於仁內義外說的不同所以告子修得不動心的方法也與孟子不同告子的方法是不得於言勿求於心不得於心勿求於氣言是輿論學說以為應該這樣那樣的對於這些言告子以為不能憑主觀去判斷而應從外在關係中去審定他是否合宜怎樣才是合宜義在沒有獲得確定不得於言時就不可探索引發求內心而作出主觀的決定對於這孟子完全反對他說不得於言勿求於心不可因為孟子是主張義內的所以言的是否合宜如不能辯論明白儘可反求其理於心本著主觀的道德標準行為軌範去審決他反求於心就可知義與非義怎麼可說勿求於心呢告子以為心志是心理決定的主動傾向氣是見於行為的動力如內心還不能決定就是理不得心不安這是不可輕率的探索引發求行為的動作所以說不得於心勿求於氣這點孟子以為還可以依上來的解說告子是一多探討外在的是否這樣應該怎樣要有客觀義理的強力支持加深信仰才決心去實行二告子是不會輕率的動心動氣使心與氣常能保持安定如依客觀義理推動心去實行那就心到氣到全力以赴絕無變悔猶疑的餘地告子也是依於理直氣壯但著重義外依此修習而成不動心告子所說的話不得勿求上下語法完全一樣可是古人的解說卻上下相反如朱子說告子謂於言有所不達則當舍置其言而不必反求其理於心於心有所不安則當力制其心而不必更求助於氣所以批評告子為殆亦冥然無覺悍然不顧云爾但這是上下矛盾的解說因為如不得於言被解說為當舍置其言那不得於心就應該解說為則當放舍其心既解說不得於心為則當力制其心而不求助於氣那麼不得於言為什麼不解說為則當力推其理而不求理於心上下文的語法一致而解說得上下相反這是難於使人同意的而且告子是義外的如不得於言就舍置其言那怎麼能構成行為的標準怎麼知道合於義而決心去行動不疑不悔而不動心呢近見徐佛觀先生新說也是將語法一致的上下文作完全不同的相反解說大概是告子的本意所在儒者並無解了的興趣只是將當時盛行的禪宗拿來比附一番而已至於孟子是一位唯心論者對言與氣都是從心本的立場去處理的所以說我知言我善養我浩然之氣孟子是義內的所以不一定要探求言的時代性社會關係的決定性儘可照著內心自覺的義理標準來作主觀的判斷先有了義理的標準在心裡對於那些言真好像是非分明一目了然的這是本著自心的義理去知言的所以認為如不得於言那就反求於心好了孟子的養氣也是本著自心的性善去養氣似乎修習得比告子要高深得多這只是想像因為告子對於氣的修養並沒有說明傳下來孟子說到守氣養氣平旦之氣夜氣氣在後代的儒學中是說得不大分明的所以先來介紹一些佛法的說明來幫助這一問題的了解氣佛典中稱為風風是什麼是一切成為活動的因素在人身上呼吸是不消說了就是血液循環便利排洩筋肉活動新陳代謝或上行或下行或旁行都是風而最根本的是物質存在的特性最特出的是呼吸也叫做息呼吸由口鼻出入是肺的作用但呼吸的根源在臍下中國人稱為丹田這是古今中外的修驗事實關於風的說明一從特性的分析來說風輕動為物質存在的特性之一在人身中係屬於根身生理的但非常微妙可說是介於身心間的如呼吸依身而活動也依心而活動由身體而引心如外來刺激而起根身反應促成心理活動由心而動身如依意思的決定而引發身語的行為生理影響心理心理影響生理風便是處於中介的地位又如健康的身體就有健康的呼吸如呼吸存養合宜風力增強身體也會強起來道家的吐納胎息等都不外遵循這一原則對心來說呼吸粗浮心也就粗動呼吸安和心也就安和反之心動亂呼吸也粗動心安定呼吸也就細長安和心與息有不同的特性卻有密切的相互關係由於風息為身心相關的要點所以修風即修息為定學的重要項目但也有不同的修法有的不注重呼吸不是完全不問調息是修定的先決條件著重繫心觀想心如安住了呼吸自然會調柔有的從呼吸下手如安那般那但如息細長安和心也會跟著定下來有的以心調息以息安心而修二從相關的內在來說差別的現象界有著無礙相通的內在性如說六大地水火風空識無礙常瑜伽瑜伽是相應的意思心與息風是相應的所以有的說心動時有動息心靜時有靜息心怒時有怒息心歡喜時有喜息心善時有善息心不善時有不善息心與息是相應的簡直是同一內容的不同顯現由此修心或修息終歸一致從心息相依到心息不二如向於善純善的心就有純善的息身也成為善淨的了還是來說孟子的養氣吧孟子的養氣當然與佛道等不盡同但不能說沒有共通的部分一般外向的老是向外馳求當然不知道如重視德性身心的修養有安靜的思擇達到心志專一那就不問古今中外都會體察到氣息的勝妙至大至剛的浩然之氣孟子所說的也不外乎從修驗中發見出來首先孟子說氣體之充也口鼻等氣息出入這是人人都知道的但專心致志的真的能住心不散一旦風道開通就會覺到一呼一吸間息遍於身氣息氤氳無處不到孟子那個時代學者都有類似的修習如老子的專氣致柔莊子的真人之息以踵更說出了氣達全身貫徹足跟的事實有了這種經驗才知道氣充全體而為身體行動的力量來源孟子的不動心從養氣得來方法是持其志無暴其氣志是心之所至孟子說必有事焉心一定要有繫著處如止於仁止於浩然之氣持心於此而不散與佛法的繫心勿令馳散一樣氣呢孟子說要無暴這是呼吸的安和調勻身體的自然安和依孟子說雖然志帥焉氣次也心志居於領導的地位但不能單是專心致志偏於養心還要養氣因為志壹則動氣氣壹則動志動是引發的意思不但心志專一能引發氣心到氣到氣息如能專一也是能引心的心與息有相互關係所以不但是養心而且要從養氣中來成就養心得不動心這與佛法所說相同以息修心本是修持經驗所充分證實了的至於說今夫蹶者趨者是氣也而反動於心不過舉一顯見的事例證明氣能動心以說明持志以外還有養氣的必要孟子是心息相應論者如說其為氣也配義與道是無餒也氣是與義理相契應的心是固有仁義的氣也與道義相應本是至大至剛而無餒的在這點上孟子與告子完全不同孟子是義內的所以與道義相對應的浩然之氣是集義所生者非義襲而取之也襲取是從外在的事物得出合宜的義這樣的義是外鑠的依此而發為行動即使認為是合理的也由於義在心氣以外不能成為唯義所在的大勇佛法說心是積集滋長集起的意思所以孟子的集義可解說為滋長於心而生的義由此固有仁義的知引發與道義相契應的氣所以能至大至剛沒有絲毫的虛餒而表現出最高的勇氣如或基於親族愛而作的戰鬥或僅因嚴格的軍令而作戰那種勇氣的程度是完全不相同的所以孟子批評告子未嘗知義而不能贊同他那種不動心的修養法與道義相應的氣是固有的所以不是怎樣的使他發生而是怎樣的使他長養養氣依孟子的比喻來說萌蘗也是木森林也是木牛山濯濯不是沒有木而是不知道養傷害過甚了只要保養他讓他得到合理的生長就會林木茂盛起來因此孟子的本有說不是什麼都完成了而是具體而微在生生不息這是儒者的見地的機運中存養而使他成長本具仁義的良知是這樣浩然之氣也是這樣但為什麼會損害呢因白天的接物應事不能格物而為物所引良知梏亡了與道義相應的浩氣也消散了這樣夜晚的睡息就是休息長養的時機的確一早醒來身體也輕健些心智也清明些呼吸也調和得多初醒時不但身息安和心識也多起五俱意識分別心不強聲色貨利恩怨是非等雜念也還沒有叢集的湧上來有時直望外界好像近在目前連空間的距離也不大明晰這種有漏現量的五俱意識大抵是善性重視身心修養的都會利用這種心境道家或佛法都說從半夜到早上是修持的最好時機孟子也說那是夜氣長養而平旦之氣還沒有大損害的時候在那時修心養氣確是比較容易成就的孟子所以提到夜氣平旦之氣無非是由於養氣得來的經驗孟子對於養氣有穩妥的方法就是直養順其自然而得合理的長養他提出了必有事焉而勿正心勿忘勿助長也的扼要方法這段文句古人有不同的句讀有的說勿正心就是勿忘二字的誤寫這方法的主要條件是一必有事焉無論是致良知養氣都要心有著落止在事上二勿忘即佛法的不忘念要念茲在茲念念不離所緣不能忘失而馳散到別處三勿助長任其自然的長養不可性急矯揉造作如心住一處心會漸漸的安定切勿過於壓制息會漸漸細長也不可勉強孟子不像深修禪定的人對於調心調息有種種巧妙的方便而只是一任自然繫住一處而已這也許平庸一點但卻毫無流弊孟子不動心的特長勝過告子的就是養氣但他不是為了身體健康而養氣而是從心良知的長養去養氣與本著內心的義去知言一樣孟子所養的氣讚歎為難言也浩然之氣難言是妙不可說的意思浩然就是至大至剛至大是遍一切處至剛是充滿了力量什麼都不能阻撓他一般人覺得氣是微而無力這也如牛山濯濯一樣如直養而無害則塞於天地之間塞是充塞充實無餒無欠孟子從養氣中經驗到不但氣遍全身而且充塞天地間可說與宇宙萬物呼吸相通這種浩氣的修驗與良知格類有關致良知與養浩氣是相對應的由於良知的類推擴充達到仁心普洽沒有一人一物不在仁心的化育中與此相應的氣也就達到充滿一切處仁心普洽與浩氣充塞為孟子修養生活的一體兩面如拿佛法的修持來對比孟子的養良心與養浩氣近於無量等至佛法別有風遍處修到遍一切處都是風氣但那是為了鍊心自在而修習與孟子的養氣不合佛說的世間定法勸一般在家人多修習的是慈悲喜捨四無量定特別是慈心定梵語三摩鉢底譯為等至是定的一類慈悲喜捨無量定稱為等至修習慈心等漸漸的廣大廣大到於一切世界一切眾生而起慈心所以叫無量這與儒者的擴充仁心大致相近但這不是散心的推想而是在定修習如儒者在止定靜安得定以後再作類推的思慮抉擇成就了定自有氣息遍身等經驗依此再修發慈無量等慈悲等無量息也就無量依此而得不動心的大勇是一點都不會錯的得定的得堪任性湧出身精進心精進的無限力量何況仁慈心相應呢孟子由於這樣的養氣達成不動心的大勇依佛法說無論是求放心養浩氣都不過是世間法但孟子到底有過浩氣的修養不像後代儒者止於說性說理而已六修身慧成就現在要說到修身了上面說過道學的修習次第儒佛是大致相近的如從致知誠意到正心與佛學的依正見成正信修正戒得正定一樣現在依正心而進到修身也等於佛法的依正定而修慧到此淨化身心的自利工夫才能完成修身與慧學一致這是需要說明的請先從大學的修身說起什麼叫修身修治自己大學從反面說這樣就不能修身人之其所親愛而辟焉之其所敖惰而辟焉故好而知其惡惡而知其美者天下鮮矣這是什麼意思呢簡單的說自己有了積習所成的私見為習見所蔽就不能如實了達一切修身要不受習成的私見僻辟執所蒙蔽如實了知一切能如實了知一切才能恰好的處理一切我們面對的一切人中原有可敬畏的可親愛的可厭惡的可哀矜的如應敬畏的敬畏他應親愛的親愛他恰到好處不太過不及這就是修身可說是發而皆中節謂之和了可是人都不是那樣的如對於敬畏的自己所敬畏的就被敬畏所拘蔽所親愛的就被親愛所拘蔽有了拘蔽如敬畏的過分就會忽視不值得敬畏的地方就是見到了也不敢說或者還要為他文過飾非又如自己的兒女是人人所心愛的就被愛拘蔽了誰也以為自己的兒女好如與鄰居的小朋友爭吵等做父母的即使知道自己的兒女不好心裡還是在怪別人所以大學引俗語說人莫知其子之惡莫知其苗之碩這就是不能修身的問題所在人都是自我中心的總是以主觀去認識一切決定一切處理一切只要是我的我所敬我所愛我所哀矜的便不能不偏僻固執不能如實了知一切因而判斷是非應付人事都不能恰到好處人都是這樣的不能修身不能修身而又要治人也就難怪世局如麻不能齊家治國平天下了這裡所說的身不修與上面說的心不正不同有了貪欲瞋恚等依中庸說是不能中節心就不能平衡寧定叫心不正有了固蔽僻執心就不能如實了知不能君君臣臣父父子子叫身不修再從中庸與論語來說中庸說修身以道修道以仁齋明盛服非禮不動所以修身也從這可以知道修身的內心是仁修身的行為是禮但中庸又說知斯三者則知所以修身所以修身以道道不但是仁而是以仁為本其實含有知與勇三達德的這與論語對讀起來意義就非常明顯如論語說克己復禮為仁請問其目子曰非禮勿視非禮勿聽非禮勿言非禮勿動克己就是修身修身的方法是復禮能克己復禮就是仁的實踐中庸與論語相同差別在中庸說修身而提到仁與禮論語說為仁而談到了克己與復禮修身的內在是仁表現於外行是禮仁與禮是儒者的大本在古代儒者的見地中仁是人與人仁就是二人間的同情禮是人與人間的合適行為禮雖是因時因地而有損益的但認為是人與人的適合的關係方式為社會所應共同遵守有軌範人心而使人類家國天下達到和樂與治平的同時人是有親疏有愛惡有喜怒的也唯有禮才能軌範人情而使他適中的所以論語說禮之用和為貴和不外是喜怒哀樂的中節君臣父子間的各盡其分所以在儒學中禮是有著非常重要的地位人的一生生冠婚喪葬以及在家的孝親友兄弟在鄉的敬長在國的事君有關政治軍事祭祀可說一舉一動都被納入禮法的範圍如做到視聽言動一切合於禮制那就是孔子所說的克己修身了為什麼說復禮在孔子看來當時社會通行的禮儀從王室諸侯到士大夫都是亂七八糟的不是太過的僭越如季氏的八佾舞於庭就是不足如短喪有些更是失去了孔子景仰於西周的文明不滿春秋時代的禮制崩潰所以以古禮為教有的說他託古改制他還說先進於禮樂野人也如用之則吾從先進禮失而求諸野要人的視聽言動依西周古樸的禮法而行就是復禮禮為維持社會關係於合理的節制人類情感於適中的制度禮雖由國家天子制定卻不像刑與政以權力來強制執行而只是化民成俗無論是私人生活公共關係都造成一種社會的共同意識覺得那是人人應該奉行而成非此不可的社會制裁力量如不依禮俗就會受到社會大眾的評擊依儒者看來善良的禮俗使人做到人類和樂情感適中比起刑政的統治成功要高明得多但禮制一經流行便形式化教條化不是守舊而拘泥不通就是虛應故事繁文縟節奢侈浪費成為社會的陋習不知道善良的禮制是要本於人的仁心而表現為人情中節人類和樂的方式如只是奉行故事而沒有人類和樂人情中節的內容那有什麼意義呢這點孔子說得明切如說禮云禮云玉帛云乎哉人而不仁如禮何為禮不敬居喪不哀吾何以觀之哉儒者的學本是仁從立志起修學歷程始終重於德性的存養與此相應的政治也是情勝於法的一方面是充此人同此心的仁德做到常與仁相應的不違仁一方面是視聽言動居家治國一切合於古聖的禮制依於仁復於禮才能達成修身的自利修有修正修治的意思所以修身就是克己克也就是克制克治人雖被孟子看作性本善的孔子說性相近但實際是人心的內在活動到表現於身語的行為從來都是不完善的如不問一切率直的照著自己的性情做去那無論是從個人德性或從社會的和樂著想都是要不得的所以不妨說率性之謂道而又不能不說修道之謂教雖應該遵循本有的善德去做也不能不修治克制己身的過失應修應克的是一切不道德的不能符合人類共同利益的一切儒者統稱之為私欲多少推究到根本上所以與仁相反的不只是殘暴冷酷仇恨等不仁而說是私欲這與佛法是更接近了再回過來看大學為什麼不能修身只因為人之其所敬愛而辟焉之其所敖惰而辟焉辟是偏僻固蔽依於自己而起私蔽這才不能明達是非好惡而有不仁非禮的行為所以依仁復禮的修身要旨在乎沒有偏私固蔽論語說子絕四毋意毋必毋固毋我孔子的絕四正顯出了依仁復禮一位完美修身者的心境意是想當然自以為應該如此必是必然自以為一定如此固是固執非如此不可我是自己自己的意思自己的利益總之自己高於一切一切非依我屬我不可如有此四病還能與仁不相違嗎還能視聽言動合於禮嗎自我中心的情見一定是偏僻而不當中道的固蔽而不契真理的如不能絕此自己的私蔽就不能克己修身當然也就不能居仁復禮這點佛法更深徹的決定宣說除了通達無我離去我見或譯身見為本的煩惱是不能成就自利的論語有一段文可看出孔子絕四的無私的實踐如說吾有知乎哉無知也有鄙夫問於我空空如也叩其兩端而竭也一般的病根是自己心裡充塞了無邊的情見意必固我不能虛心到空空如也孔子絕四應該是伏滅吧不存成見不先入為主而以自己的意見為意見所以說無知也不要說哲人大學者就是鄙夫來問問也就是問難也還是那個態度如佛法所說的虛心應物洪鐘待扣那樣然孔子並不曾跟著別人舌頭團團轉反而是從他所問的種種方面兩端推究審辨而到達究竟徹底孔子雖說無知也而其實這才是大知這與中庸所說舜其大知也歟舜好問而好察邇言邇言就是鄙近之言執其兩端而用其中同一意趣叡公說以中為名者照其實也中是究竟盡理的真實是無私的大知所能徹了的近於不落兩邊善處中道的慧學後世儒者偏於仁本而重人情這才中庸之道流為模稜兩可或折中主義從上來的論證大學所說的修身似乎簡單卻非常扼要修身是要依於仁復於禮的但心要卻在無私無蔽孔子歎舜為大知是最確當的因為無私無蔽不落兩端的中道正是慧學的內容儒者以仁為本但真要復禮為仁修身克己的切要工夫卻在無私蔽的大知佛法以三菩提正覺為宗也就是大智為宗唯有知覺才能成就修身從成就自利的修身來說要有無私蔽的大智慧這不但佛如此說重仁的儒學也還是如此不過一分小乘學者由於不重視慈悲而流入枯寂的理智生涯一般儒者偏重仁德的存養忽視了甚深法性的悟入結果就老是停滯於世間善行的階段唯有大乘法依深智而起大悲悲智兼融的大覺才完美的開顯了究竟的修身正道無我的平等大慧為佛法所以超越一般世間學的特色有關於慧的正見如前正見中所說從知善惡起解了到三世因果了達世間的現實相確立人生進善的正道進一步深入到三乘的慧學抉示了我見為生死的根源為世間一切苦難的癥結所在如果說私欲這是私欲的根本了依佛法說為什麼會有私欲或一切煩惱這都由認識的迷謬無明黑暗而來因此除了慧光的勘破得到如實的知見是不能解決問題的上面說過一切是緣起的存在是存在於前後延續同時依存的因果系列中可是我們的認識卻並不能如此在覺到自己覺到與自我相對的一切時先是片段的孤立的靜止的感知而後經意識的推比才組成一般的知識這所以雖發現有相關的變動的意義而那種孤立的靜止的錯亂覺識始終是潛在於一切的知識中間因而我們的一切了知都帶有錯亂的成分特別是在觸對一切時特出於一切的自我意識在直覺中不能覺了自己與相對境界的依存關係就是自己也不能直覺到這是身心的總和而有前後相似相續無常自他依存無我的因果性甚至在意識的認識中將自己實在化獨立化永恆化這是神教徒說靈說我的認識來源成為錯亂顛倒的我見我見梵語薩迦耶見應譯為身見這是執取自身身心為實自我的由此而有我的愛染攝取有關的一切我所而又分別取捨這一自我中心的實在感是世間一般認識一般行為所不能離的也就因此就是世間的善心善事也不離我見的控制不是完善的這唯有正觀緣起的大慧通達無我才能超越自我中心私欲中心才能無私無蔽徹見一切真相成就修身的自利功德眾生無始以來的我見執取身心造成自我中心的特性這是無明迷蒙的知為一切煩惱不仁私欲的根源佛的正覺就是破除無明的大智說起無私無我世間學者儒學等也有部分類似的提示如說毋意毋必毋固毋我但世學者就是儒學也總是向外觀察見到自己與人類萬物的依存性或在幻境定境中覺到天地與我同根萬物與我並生萬物皆備於我等因而推演出一本的哲理仁慈的道德但都不知道私執的根源我見卻在執取自己身心的實在感不能內觀身心的無我所以說仁說博愛不出乎自我中心的擴展一般叫做大我這雖然是難得的但是不究竟的從前佛在過去生中是一位外道名善眼大師他修習慈心無量也以此教人生在三禪天論地位比創造神還高出多多但沒有徹底時移勢變終歸徒然一般小乘學者是深切理解這點所以集中力量內觀緣起的自我身心而通達空無我性這才勘破無明我見體達真如而得身心清淨的究竟解脫這是超出世間一般的是正確的但偏重自己身心的內觀悟入多數不再去理會身外一切的緣起性所以又不免有忽視慈悲的傾向這還不能徹了佛說無我的究竟深義略於慈悲所以被稱為小乘大乘慧是比三乘共慧更深徹的大乘慧不只內觀自我身心而通達無我還更廣泛的觀察外在的一切法內外一如都是緣起的空無我性所以一切法空一切法不生為大乘慧學的宗本向內執取的我見與向外執取的法見錯亂的性質是一樣的都是自性見不能明見緣起不能徹了無常無我的空平等性或者叫本清淨性所以執取身心為自我的我見在大乘法中雖同樣的確認為生死根源但不像小乘學者那樣將自己從一切中分離出來專於返照自我的空性大乘是從內外自他身心的一切關涉中觀一切為緣起性而通達法界一相的大乘是從無限時空無限人法的緣起幻網中去通達空平等性所以不只是向內為己的而是內外交徹能從甚深智證中湧現同體的大悲心明白了這點世間學出世的聲聞學出世而入世的大乘慧學所有淺深差別就可以清楚地分辨出來世間向外觀察了解萬化同體重於仁愛聲聞向內觀察通達空無我性重於智證佛菩薩內外交徹遍達人法空無我性即智起悲悲智平等修大乘慧學是依定修慧而到達現證無生成就自利功德這裡不再去詳說了如儒者的克己修身一定是內依於仁外復於禮佛菩薩的自利究竟雖是智證法性但也一定是住於慈悲而表現為持律的生活律一般以為只是禁戒的其實佛教的律行意義非常深廣與儒者的禮相近律是依法法是真理是智的證境與儒者的禮依於仁不同而制訂的有軌範出家眾的身心陶冶品德正法住世等大用凡出家受戒集會懺悔獎勵懲罰以及日常生活一切都為律所規定律的精義也與禮一樣的重在和大眾共處的僧團出家眾的社會要怎樣才能和呢這要一思想一致名見和同解二法規的共同遵守名戒和同行三經濟生活的均衡名利和同均這思想的制度的經濟的和諧都要依律制才能達到有了這樣實質上的和表現於自他的關係上就能一和諧的共處成為同一僧團名身和共住二表現於語言文字能誠實和合名語和無諍三大家的內心能互相關切友好名意和同悅大眾的和樂都表現於律行而律是依法而制訂的所以凡真能於無我慧而有修證也一定會符合於律行的生活雖然儒者的禮法重在差等重在情感的中和而佛的律行重在平等重在事理的恰當儒者重仁是以情統理的佛法重智是以智化情的世間學與出世法不能說沒有實質上的差異但從人以修身為本修身的要內心無私無我外行有良好的私德公德依此才能達成人類的和樂儒佛的確是有著相同的見地七成就利他的道次齊家治國平天下儒者經過致知誠意正心的學程完成修身的自立自達學佛者經過信戒定的學程而達成慧證的己利這兩者的深度雖不相同而修成無私無我的明智作為利人利世的根本卻是一樣的說到利他儒者分為齊家治國平天下三階家國天下的現代意義是家庭國家與全世界但在孔孟的時代意義卻不一定如此天下是當時心目中的國際而天子王是天下的共主如三代的統一國是封建的諸侯如齊魯等家是家庭但又是大夫家如晉有韓魏趙三家孟子說萬乘之國弒其君者必千乘之家千乘之國弒其君者必百乘之家國與家對舉家是屬於諸侯或屬於天子的貴族有領土與人民有他的政治組織如一個貴族家還不能治理自家的封土以內他怎能治國如諸侯而不能治理封疆內的國政他怎能擴展而平定統一天下所以在古代齊家治國平天下確實是有一定次第的但到了布衣卿相平民天子出現的時代封國實際已等於不存在而家更局限於非政治性的家庭依後代及現代的意義對於齊家治國平天下的次第就會覺得不一定如此如唐太宗不能齊家弄到喋血玄武門而武后韋后以來一直鬧著女禍然在安史變亂以前唐代的國威遠振特別是唐太宗總不能說他不能治國吧所以齊家治國平天下的次第在現代看來雖不一定如此而在古代的封建政制卻有他一定的程序儒者的大學始終是政治第一學而優則仕所以自修其身只是實現政治理想的應有私德而目的是經齊家治國而達到明明德於天下那些沒辦法而窮則獨善其身的也許是不能看作救人救世的學佛者要從自利而能利他雖與儒者的精神一致而利他的方式與次第卻與儒者不同這一主要的差別在乎佛法並不是政治至上的依佛法來說如發心利他真能透過悲智去做一切一切都是可以利人的利人的事什麼工作都有意義不像儒者那樣偏以政治為大人之學而以農工商為小人之事這可以舉經典來證明一華嚴經中的善財童子普遍的參訪大乘善知識這些善知識以不同的身分而做著弘法利生的事業除了宗教師佛教的比丘比丘尼及外道的苦行僧而外有語言學者藝術家精通數學的工程師救濟工作者醫師國王有重刑政的也有德化的製香師航海家法官交際女郎家庭主婦等二維摩詰經的維摩詰長者他是適應不同的場所從事不同的工作他通達世間的學問也修學異教的典籍他做過當地的法官經營農工商業他參加政治活動提倡學術講演辦理教育有時也出入淫坊酒肆他不論從事什麼工作在什麼場所總是引導人趣向佛法體達人生的真義所以他無往而不是救人救世也就走到那裡受到那裡人的尊敬大乘行者的利他不出於家國天下而工作不偏於王公宰官或者教育從現代的意義來看這樣的利人利世是更確當的儒者重於家本位的德化政治後代又多少拘泥了齊家治國由親近而疏遠的次第所以對利他的不定性尤其是佛教的出家制不能理解同情依佛法來說對於父母兄弟朋友親的疏的就是不說過去生中的關係現在也每因思想性格等不同不能一概而論如對父母的忤逆不孝當然是不對的但對自己父母缺乏深厚的孝心而非常孝敬妻的父母並不一定是不好的因為這可能是由於愛妻過於父母而來但也可能是岳父母的性格更適合於自己或者岳父母更愛護更扶助了自己而自然的生起孝敬心又如不能友愛自己的弟兄依儒者說不可能愛朋友否則就被批評為悖德然而事實上對自己的弟兄不友好而對志同道合的朋友卻不妨非常友好這正如老教師不能教好自己的兒女卻可能教育了多少好學生我們知道人與人間不僅是血統的自然關係更有種種複雜的關係說恩德也有不同意義的種種恩德何況人與人間過去生中有著或順或逆非常複雜的因緣呢所以道德的擴展利他的層次是不應該拘泥於親疏次第的家國天下的次第是存在的但也是不定的有的著重家庭有的著重國家有的著重人類一切眾生人的根性不同思想不一所以志業的著重也不能一致儒者重於家庭特重對家庭的責任把孝父母看作最先與最要的道德家是社會組織的基層雖是非常重要的但過分偏重也就不免有專為榮宗耀祖愛護妻兒著想而漠視國家與全人類的利益如偏重國家利益也往往犯了忽視個人與全人類利益的偏差過分偏重都可能引起副作用但由於志性及思想不齊有特重的傾向也是不能一筆抹煞的如以人類眾生的利益為目標而不局限於家庭及國家為了除去家的負擔牽累而過出家非家的生活這不但是佛教還有天主教等為哲學科學而獻身的也大有人在這焉能以逃避現實不孝有三無後為大的儒家思想去責難他學佛也不一定是要出家的出家僅是根性適宜而願意專心修習佛法弘傳佛法的少數人真心出家的正是心胸廣大不拘於家庭圈子而願為一切人類一切眾生而奉獻身心的人儒者囿於傳統的觀念不能理解同情是很可遺憾的從前陽明先生在杭州見一位僧人在坐禪問他想念父母嗎心裡安不安結果使那僧人還俗回家這在儒者看來陽明先生的問答盡了倫常教化的責任然而如有兵士在前線問他想念父母嗎心裡安不安如引起他對父母家庭的憶念開小差回家這又該怎麼說呢在現實的國家制度國家利益前面儒者早已修正他的觀點如移孝作忠大義滅親之類只可惜還不能更進一步移家庭的責任而作為一切人類一切眾生而獻身心的大業而已儒者的大學是著重政治的佛法由於釋尊的放棄王位出家修行成佛每被誤會為學佛是應棄絕政治的但實際並不如此現出家身而修學以宗教師的身分來說法利他只是學佛利他的一種重要方式而不是全部以佛來說吧釋迦佛現出家相而佛的真實法身毘盧遮那卻是在家相這意味著在家為佛的正常道而出家化身是因時因地的方便道而且有些佛土根本沒有出家眾天王佛也是在家的身分所以佛法決不以出家制而輕視在家漠視政治在大乘修學的過程中華嚴經與維摩經已明白表示了菩薩的政治生活依大乘經說不但不輕視政治大乘行者菩薩多居於政治領導者的地位這就是著名的十王大業在政治活動中王領袖是更有推動政治的作用一般人看作權力而發生爭奪儒者看作淑世利民的大道而毅然以治平為理想由於儒者以卿相自居所以不敢作帝王想而只想致君於堯舜佛法卻看作福慧熏習的殊勝因果王政治領袖在古代是世襲的這雖然有的昏庸淫亂禍國殃民但也有他的福報生在王家不求而自然得來如從臣宰而進登王位或從平民而登帝位如劉邦等或者經民眾選舉出來的總之要有政治的智慧毅力組織力感召力知人善任才能成功這一切不僅是現生的學識經驗也是往昔生中的福慧熏習所以在菩薩的學程中常常出任國家的元首經上說初發大心修十善行的菩薩起初是得粟散王小王的果報功德增勝了得鐵輪王報這是以武力而統一南洲的大王十住菩薩得銅輪王報十行菩薩得銀輪王報十迴向菩薩得金輪王報統一四大洲本著慈悲心來修菩薩行利人的功德越大福報所得的王權也越來越大因為菩薩修行一定要以布施愛語利行同事四攝法來攝導眾生也就必然與群眾結緣受到群眾的信任與擁戴這樣修身成就後從事治國平天下的大任佛法豈不是與儒家完全相合只是佛法以為不一定要從政才能利益人群而已儒者重視禮教的德化輕視刑政的法治所以說導之以德齊之以禮有恥且格導之以政齊之以刑民免而無恥然而在佛法如當政者從慈悲心出發那德化也得刑政也得全依現實社會情況的需要而決定華嚴經中多羅幢城的無厭足王代表了嚴刑峻法的政治妙光城中的大光王代表仁慈的德化與民同樂相反的措施收到了同樣的治平成果都是菩薩的利他方便這可見佛教的政治觀是不反對刑政的不獨不反對刑政也不廢武力如鐵輪王就是以武力而統一的輪王治世的必備七寶中除了理財專家的主藏臣寶而外還有軍事領袖主兵臣寶而輪寶與近代核子彈相像從千里萬里外飛來使敵人立刻低頭降伏輪王也稱法王是以正法治世的武力的目的不是奴役掠奪而是推行五戒十善正法的德政經上說菩薩成就己利以後更沒有別事只是為了嚴淨國土成熟眾生而進修嚴土熟生無疑的含攝了齊家治國平天下在內不但菩薩行如此有的學菩薩而失敗了敗壞菩薩由於慈悲利物的關係也多得政治領袖的果報不過這不一定賢明有的賢明有的善惡參半有的是驕奢淫亂誤入歧途如是惡王這雖然是福業所感對未來說不免是罪業深重了凡修身成就而能利他的儒與佛都是稱之為聖人的中國古代的聖人如堯舜文武等古聖就是賢明的君主後來孔子也被尊為聖人也被稱為素王而聖與王不必合一這才有內聖外王的說法但到底要怎樣才稱為聖人中庸說聖人亦有所不知亦有所不能這與一般宗教的全知全能是不同的如說聖人與人同耳聖人人倫之至也可見儒者的聖人只是擴展人性到達人性的最極完成完人不曾有飛躍的進化到超人的思想怎樣才算是人倫之至呢中庸說不勉而中不思而得從容中道聖人也孟子說始條理者智之事也終條理者聖之事也智譬則巧也聖譬則力也所以如知止於至善向上進修修習到不用勉力不必作意自然的合於人倫的至道就是聖這如射箭一樣不但知道標的瞄準而且功力足夠能射達目標百不失一中庸雖盡力讚歎聖人說聖人能盡己性盡人性盡物性而可以贊天地之化育但從孟子看來聖人也有種種不同還有值得批評的地方如說伯夷聖之清者也伊尹聖之任者也柳下惠聖之和者也孔子聖之時者也伯夷隘柳下惠不恭所以修身完成的聖人由於個性也應該是見解不同風格是那樣的差別不一定是盡美盡善的孟子的聖人說是更合於人中聖者的佛教所說的聖人比起儒者所說可說是更寬泛的又更高深的更圓滿的儒者重於人倫要進修到人性天性明德的徹底開發唯善心行的任運現行天理流行人欲淨盡才是聖人這是不可多得的但依佛法來說這是難得的卻是不徹底的因為經過修持使內心純淨雜染的不起現行或者修習到超作意位不勉而中不思而得這在定力成就而又是淨定的話就能有此心境如是修習四無量定那與儒家聖者的心境更為一致不過這還不會勘破無明根源定力衰退了還是要生起雜染心行的所以佛法從另一定義作凡夫與聖人的區別我們的心行不問他性善性惡總之是充滿煩惱的煩惱的根源是無明以我癡我見我慢我愛為主要的特性有了這就蒙惑而不能契會宇宙人生的真義也就不能無我而有純善的德行既不能解開生生不已的死結他就無限延續於生死死生的狂流永遠是愚癡的凡夫在這生死漩流中不要說人中聖人就是天國的神也還是糊糊塗塗的不自主的生來死去如能依戒定慧修習修習到勘破生死根源徹證無我性才是聖人這不是一般的善淨心識的任運現行而是無漏無我慧也稱空慧無相智無分別智等的顯發有了這無漏智證的體驗才能截斷煩惱的根栽從此一得永得決不退轉必然能到達無限的法性海獲得永恆的大自在有了無漏無我慧徹證無我法性就稱為聖者不一定有神通還有煩惱現行身語方面也不一定清淨比起儒者所說不勉而中不思而得從容中道從心所欲不踰矩的心境好像差得多然而卻是道地的聖人了這如大樹已截斷根本雖還有生芽發葉開花的現象比起斫枝摘葉樹幹光禿禿而毫無生氣恰是徹底得多如是著重己利的小乘行者有了這一證悟最低的稱為初果充其量也只七番生死而已就是到了四果自利完成但還有習氣有的會罵人有的很固執雖有這習慣所成不經意的過失並不妨是聖人了有的慧解脫阿羅漢四果沒有神通根性闇鈍的不會說法所以從表面看來佛教的聖者好像比儒者所說要寬泛些但其實是更深刻的如是利他為重的大乘行者不但徹證無我法性又有廣大悲願為了嚴淨國土成熟眾生長劫修行福慧圓滿而成佛那不是儒者所可比擬的不再是有所不知有所不能的聖人了儒者與佛教的聖人本質上雖有不同但約聖者的風格來說也有近似處如小乘是聖之清者菩薩是聖之和者任者大地菩薩到佛位隨機利見適化無方那當然是聖之時者了又信願增上的近於和智增上的近於清悲增上的近於任由於根機性習不同修學而成聖時風格也不能一致當然聖之時者是最理想的但在自我中心的凡夫對此還是不模倣的好因為是最容易落入模稜兩可與投機的死谷總之儒與佛的聖者都建立於修身自利成就的立場所不同的儒者囿於人格的盡善而佛法有進一步的解開生死死生的死結而到達以無漏慧為本質的聖境所以扼要的說儒者是世間的佛法是出世的小乘是出世而又入世世出世間無礙的大乘
