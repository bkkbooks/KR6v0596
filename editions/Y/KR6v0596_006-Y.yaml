body:
  text: 六上帝愛世人的再討論去年海潮音七八月號刊載了我的讀經心得上帝愛世人在我的想法與名佈道家兼作家吳恩溥牧師的看法相近對於基督教可能起一些漣漪都沒有但出乎意外的遠在香港的吳恩溥牧師竟在百忙中撰文護教題為斥印順和尚上帝愛世人篇的謬妄基督教研究主編龔天民牧師竟說對印順之文非予以痛擊不可這使我感到非常的榮幸與興奮因為即使沒有別的漣漪而吳龔二大牧師確已被震得波浪洶湧了所以不問吳文的價值如何看在香港遠來的那番盛意非得虛心的請教一番一上帝與人的主奴關係一奴隸終究是奴隸吳恩溥牧師為了駁斥上帝愛世人的謬妄寫了一萬五千字的長文我拜讀了以後覺得廢話多了一點但我要緊扣主題根本立場是主奴關係主要方法是盲目無知識分散無組織先來依次論究三項主題的正確性然後清除那大堆廢話送入垃圾坑去最根本的主題是上帝與人的主奴關係吳牧師引用了我的話要信你們的主必須站穩奴隸吳文誤作主奴立場認清耶和華與自己的主奴關係高等的奴隸也不及貧窮的自由不過習慣於奴隸的思想生活如耶和華的忠實僕人們又當別論你們要站穩自己奴隸的立場認清人與上帝的主奴關係這才能打開進入天國的大門他認為印順嬉笑怒罵無所不用其極罵基督徒是奴才是高等奴隸習慣於奴隸生活而龔天民也說我用了極惡毒刻薄的字眼把牧師信徒都罵成是奴隸二位誤會了我那裡會罵人我是老實人說老實話試想奴隸就是奴隸說奴隸是奴隸能說是惡毒刻薄嬉笑怒罵嗎作為一位宗教師最好是冷靜些沈著些不能為了面子問題而叫囂起來我倒不妨問問二位承認基督徒是主的奴隸嗎如果說是的那怎麼說我惡毒怒罵呢如說不是的那先請龔牧師檢讀你主編的基督教研究第一期頁林異雷牧師的研究僕人或使女原是奴隸的意思是當時社會的一種階級他們猶如動物在市場上被賣奴隸所有之一切連他們的妻兒子也是主人的所有物他們不但沒有主權連自由意志也沒有基督徒就是主的僕人基督徒不是屬於自己是主所有的先要認清這事林牧師所說的奴隸與我所說的奴隸及先要認清人與上帝的主奴關係一模一樣難道林異雷牧師可以說牧師說的是真理印順和尚就說不得說了就是罵人龔牧師你倒說說看吳恩溥牧師用了上帝的兒女原來是大群奴隸的動人標題駁斥我說的你們要站穩自己奴隸的立場認清人與上帝的主奴關係他到底怎樣的駁斥呢首先儘說些文不對題的話大罵印順和尚他自己發問上帝的兒女是奴隸嗎又自己解答教會初期不少奴隸因信了耶穌他們與上帝其他的兒女是平等的次說羅馬及英美各國就因基督徒的反對而不准奴隸制的存在吳牧師說得太保留了應該說到美國的基督徒總統林肯為了反對基督徒的擁護奴隸制而引發南北戰爭不過我得提醒吳大牧師我只說上帝與人是主奴關係人在上帝面前應該是奴隸我沒有說上帝與耶穌先生的信徒主張人類應有主奴關係應該維護奴隸制度基督徒反對人間的奴隸制度對於我說的主題確認上帝與人為主奴關係有甚麼相干難道就因此而駁斥了我的主題嗎而且所說的奴隸們信了耶穌與其他的上帝兒女是平等的話也許不錯但並不能因此而否定上帝與人的主奴關係因為不是別的平等而是大家平等的甘心的去做主上帝的奴隸現在中國人心目中的奴隸不能完全表達新舊約中的奴隸僕人或使女意義所以我在原文中說說到奴隸也有他自己的人格這種鬆弛了的東方式的奴隸不可以拿來解說一神教的奴隸在中國在印度的佛教說到主奴關係即使有階級性義務也是對等相互的奴隸在中國的地位決與耶和華及耶穌先生所想像的不同這所以獨斷的唯物論者馬克斯也不能不承認亞細亞的生產樣式我的意思是古代社會奴隸制是到處存在的西方式的奴隸雖如林異雷牧師所說的那樣而中國及印度佛教說到的奴隸卻多少不同主奴間有相互應盡的義務奴隸有他的自由的意志奴隸為家庭中的低級成員所以東西方的制度在社會上經濟上影響到政治上都並不相同我附帶的說一點給吳恩溥牧師長些見識佛教的四姓出家同姓為釋是徹底否定了婆羅門宗教的階級性在律制中僧團根本不許有奴隸佛與信徒是師生關係所以稱釋迦佛為本師自稱為弟子而不是自稱為僕人或使女對當時的一般社會主張主奴應有相互的義務而主奴是以行為及經濟而演變這樣鬆弛了主奴的限制銷融了階級的尖銳對立這在中國由於道德意識的增高有的認為奴隸制不合理政府也制法來廢除他奴隸早已是家庭中的一員大家都是人而不像西方主奴階級的尖銳對立把奴隸看成純經濟性的物品所以在和平演進中中國的奴隸制消失了而不像西方那樣的要大力反對即使基督教的國家也非發動戰爭來達成不可解放黑奴這麼久了黑白合校等還要基督徒來操心我為了說明希伯來的一神教連耶穌先生的福音在內正是淵源於奴隸社會現實世間的主奴關係被反映而鑄成宗教意識就是上帝與人的主奴關係但這是西方式的奴隸而不是鬆弛了的東方式的奴隸所以在上帝愛世人中說了那一段並不想討論東西方的奴隸制度可是吳恩溥牧師也許是故意弄錯了對中國與佛教大發妙論不但文不對題而且是血口噴人他竟然根據我這一段文字推論出印順對於印度對於中國的奴隸制度卻十分欣賞佛教國家的奴隸是平等的民主的自由的佛教一點不反對奴隸制度這樣的纏夾廿三信口雌黃真使我不敢相信這是大牧師而且是名佈道家兼作家大牧師不是口頭爽快就得了試問你這樣的推論了挖苦了對於人在上帝前應有奴隸的立場我的中心論題有甚麼關係憑這樣的惡意推論一番就能否定了人與上帝的主奴關係嗎二甘心作上帝的奴僕吳恩溥牧師知道廢話無用根本沒有討論到主題這才又以三點來駁斥我主要的理由是基督徒甘心作上帝的奴僕基督徒做為上帝的奴僕是甘心的不是被迫的妙論妙論說來說去奴隸還是奴隸卻加上了甘心的美麗字樣意思說這是志願奴隸是有自由意志選擇的奴隸這樣的奴隸也許是光榮得多但我得提醒大牧師我只說在上帝面前要站穩奴隸立場才能蒙上帝的喜悅我幾時說過上帝強迫你做奴隸而且甘心的奴隸難道與上帝就不是主奴關係嗎看看他的三點意思吧一他提出連串的反問想否定基督徒的奴隸身分先問試想上帝的兒女如何給上帝做奴隸據我的讀經心得真正的上帝兒子也許不止耶穌一人但決輪不到你們憑什麼資格說人是上帝的兒女呢在這點上天主教說得好是契子這是主人對於忠實奴隸所給予的特別恩寵如李克用他們收認了大批養子又如有些國君以國姓來賜予忠貞有功的大臣其實並不因此而真的成了金枝玉葉這一類兒女也就是奴隸兒女與奴隸並不一定不同從這一反問看來吳恩溥連自己的身分都不明白這樣的佈道家對耶和華與耶穌先生來說真是危險極了他又問上帝如何役使這麼多的奴隸這問得太可笑上帝是萬能只要上帝願意甚麼都能做難道就不能役使這麼多的奴隸嗎他又問役使這麼多奴隸去榨取些甚麼這可見他不知奴隸的用處多得很呢根本不知道奴隸的主要屬性上帝是主宰一切自由一切由我支配意識的神化唯一絕對的主宰意欲所以一切要服從上帝接受上帝意思的安排一切依上帝的意思而行才合乎上帝的意思本著這樣的主宰意識所要求於人的便是吳牧師所說的順從聽命也就是林異雷牧師說的基督徒不是屬於自己是主所有的一切不屬於自己一切為了主服從主我所說的奴隸奴隸意識就是這樣至於從他們身上榨取利益那只是著重經濟的部分奴隸而已這連串的發問說了等於不說那裡能否定上帝兒女的奴隸身分二他說聖經提到人和上帝的關係有主僕等這不過照著人所能明白的能領悟的教導人怎樣與上帝來往及怎樣事奉上帝而已真希奇吳恩溥讀了我的上帝愛世人卻不知我所說的主奴關係正是要人養成一切屬於主服從主的奴隸意識站穩事奉上帝的奴隸立場難道我說上帝與人的主奴關係會說上帝把人當動物一樣去出賣嗎到這裡吳恩溥牧師的奴隸意識奴隸妙論才毫不隱飾的吐露出來他說極其希奇的主僕之稱是出於聖徒所自稱上帝是創造主是宇宙的主宰人算得甚麼人能夠在上帝面前作為上帝的奴隸難道委曲你們的身分嗎這等於說人與上帝拉得上主奴關係做上帝的奴隸是非常神聖的光榮的這樣印順心眼黑闇輕重倒置偏說做上帝的奴隸不可以豈非是該罵與非痛擊不可其實我不願做上帝的奴隸是真的但沒有干涉別人做奴隸的自由不願做上帝的奴隸是我的自由正如做上帝的奴隸是吳恩溥的志願一樣現在甚麼時代竟敢因我不願做上帝的奴隸而惡罵起來好大膽的牧師關於志願作上帝的奴隸容我提一點意見來貢獻吳牧師上帝與人的主奴關係早就確定只是耶和華的信徒才有此自覺罷了如亞伯拉罕接待耶和華時創十八摩西懇辭作耶和華的代表時出四都明白的有過主僕的稱呼從創世記來說上帝創造了一切又造了人要他們治理這地也要管理海裡的魚空中的飛鳥和地上各樣行動的活物創一在上帝的宇宙裡人的意義就被這樣的規定了如主人有田園礦場橡樹園等就要有奴隸來經營管理一樣所以人在上帝的宇宙裡是不容規避的法定奴隸上帝與人是鐵定的主奴關係可是奴隸不聽上帝的吩咐不守奴隸本分吃了禁果這真是該死於是人就失去了地上的樂園從來耶和華上帝的信徒就是意識到自己不守奴隸本分的罪惡這才確認上帝耶穌先生為主確認自己的奴隸身分這才將來有被安置到天國的希望人在上帝面前是當然的奴隸基督徒認清了自己的身分甘心樂意的做奴隸這才恢復了上帝與人的主奴關係打開了人與上帝的往來之道所以我在上帝愛世人裡認為應培養奴隸意識站穩奴隸立場認清上帝與人的主奴關係甘心樂意作上帝的奴隸只是確認自己的奴隸身分認清奴隸的應盡責任而並非新接受一項偉大而神聖的任務如將志願奴隸看得太神聖了在主人眼中怕是一位狂妄不安分的惡奴呢三他揭示了基督徒甘心作上帝的奴僕是甘心的不是被迫的與印順所謂的養成奴性有如霄與壤絕無相同處關於作上帝的奴隸有偉大的意義說不完的好處這是要做了上帝的奴隸才能經驗出來我不願作上帝的奴隸所以無法信認也無權否認不過多少可以推想出來世間的主人有了廣大田園壯美房屋一望無際的橡樹園如奴隸肯承認奴隸身分參與主人的經營發展工作這叫同工那就可以吃主人的飯穿主人的衣欣賞主人的田園樓閣如絕對服從聽命勤勞在主人眼前蒙恩派作奴工的管理者賞賜許多好處那就更好了如真能擠到主人面前站在旁邊那是最高等的奴隸會覺得無比光榮我想上帝創造了大地動植物當然也需要奴隸來治理與管理他的創造人類應有他的一番經營計劃所以志願作上帝的奴隸與上帝同工總是有好處的不會錯的這都可以從世間的主奴關係推想出來問題