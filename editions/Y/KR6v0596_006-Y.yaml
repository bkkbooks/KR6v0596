二次說到洩露天機是確認人與上帝為主奴關係據基督教研究林異雷牧師所說吳恩溥牧師所說都證明了這一論題的正確只因我沒有認清時代現在是二十世紀的六十年代用了奴隸二字未免傷人尊嚴同時我又說破天機不免碰到痛處抓到癢處害得吳牧師面紅耳赤這才大罵特罵起來但如以為大罵特罵就可以蒙蔽人的眼目否認我說的不是天機那就想得太天真了另一次說到洩露天機是我對上帝愛世人的三項主題指點為西方真傳的一貫統治學起初耶和華為神權政治祭政合一的主宰他其實是他的代表們是希望通過祭師而直接領導人類的要人類直接向上帝負責的這才不願人類的眼目明亮反對人類的巴別建塔以色列人的建國由於這是政教合一的主宰意識所以宗教或政治凡有極權的奴役的人類非服從我不可不服從就該死意識沒有不合於這三項原則的根源於主宰意識的三大原則深入西方人心我又一次的洩露了天機吳牧師如認為不是天機算不得洩露天機那問題非常簡單只要吳牧師或由教會宣布這是基督徒所週知的事實也是一向向社會宣揚的福音那我真的是十足十如假包換的愚民政策了再不然對我的三項主題在忠於聖經的前提下一一駁斥也就證明我說的不是洩露天機可惜吳牧師捨正途而不由以叫囂怒罵及歪曲神意捏造神意製造民意為唯一辦法這等於證明了印順和尚確是洩露天機所以才干犯天怒神的忠實奴僕們怒了我是這樣的洩露天機而吳牧師不願面對問題只是抓住洩露天機四字拉扯到別處去大罵他費了十分之一的篇幅在洩露天機原來是舊貨新裝的標題下大肆叫囂說五四運動的號角吹響以後這個時候夏娃忽然大走紅運夏娃乃人類智慧的徽號這樣印順不過摭拾人家幾十年前的話渣兒煞有介事般來進行欺騙勾當吳牧師的手法高明極了但憑這幾句話就將我洩露的天機三項主題西方真傳的一貫統治學就否定了嗎那不僅是廢話簡直是笑話了說到亞當夏娃的吃禁果我說本來人在吃了分別善惡樹果以來眼睛就明亮了大家的眼睛雪亮誰也了解這一故事的意義用不著我來多說只是有些人迷戀伊甸園的盲目生活關在思想鐵幕裡成為有眼睛的瞎子所以不免再來解說一番我說的何等明白依我的意思只要是人是現代的人肯好好讀經忠實讀經不問甚麼樣的人沒有不明白的唯有迷戀伊甸園生活的才一口咬定這只是說奴性開始敗壞吳牧師五四運動是代表甚麼以夏娃為人類智慧的徽號是左派嘍囉的天機嗎你這樣一說我的洩露天機三項主題與西方真傳的一貫統治學就是繼承左派嘍囉嗎好高明的手法只是險毒了一點七組織力與知識這裡所要說的也是吳牧師扯到了旁邊吳牧師從今日基督教國家的組織力知識的發達來證明上帝所喜悅的人決不會是盲目無知識分散無組織反之以今日中國的一盤散沙東方佛教國家的落後情形以推定不重組織不重知識的恰好是佛教吳牧師的反擊論法不適用於探討真理我說上帝所喜悅的人是盲目無知識分散無組織這唯有根據聖經闡明真意為並不如此我的論題才失敗了否則不敢面對論題連上帝的話那人已經與我們相似能知道善惡也熟視無睹又捏造神意說甚麼如有遠見的父母鼓勵年輕一代的四海為家那是不能駁斥我的不能駁斥我的論證反擊就毫無用處如射擊一樣不能避免對方先發的一擊那你就是迅速反擊而且是中了但先躺下去的還是你呀所以為了探討真理要能針對論題而無須作那些不必要的論辯國家民族的興衰有非常複雜的因素或內在的或外來的宗教是文化的一端而非全部以我們的看法流行於世間的都是相對的凡是相對的偏頗發展都會有副作用的所以世間的任何宗教政治哲學常在波浪式的起伏中放眼而觀古今中外中國隋唐時代的隆盛不正是佛教最隆盛的時代嗎日本自亞洲強國而成為世界強國那時不也多數信佛教嗎今日菲律賓不也是基督教國家嗎基督教獨佔了整個歐洲自西元五世紀到十三世紀不恰好是西方所說的黑暗時代嗎不看看從前不望望旁邊就想以基督教國家的興盛其實有的正走向沒落今日中國等的衰落來證明基督教的優越證明上帝所喜悅的不是盲目無知識與分散無組織有點近於胡說了今日西方文化的隆盛有種種因素重要的有希伯來宗教傳統的信仰羅馬政治傳統的組織力希臘民主傳統與愛智的學風我從來不曾輕視希伯來宗教的特殊價值特別是我所敬愛的耶穌先生但對於組織力的堅強知識的發達如吳牧師那樣的看作基督教的光榮那就有點缺乏常識了如希伯來的信仰羅馬的組織希臘的民主與愛智看作遺產的話那吳牧師所代表的基督教顯然犯有侵佔與竊取的罪嫌吳牧師這些都不外乎題外閒話還是把握論題探討真理吧八拋紅帽子吳牧師說現在印順在反基督教的事上也一樣盡力拋共產黨紅帽子這未免說得太離譜了亂拋紅帽子如查無實據在現在的自由中國是犯法的遠居香港的吳牧師說話得負點責任哪吳牧師說我向基督教拋紅帽子而照他自己的看法又說揣摩他印順的語氣上帝不過是數十世紀前的帝國主義頭子或者共產黨頭子又是帝國主義頭子又是共產黨頭子這可見印順和尚所拋的帽子並不是紅的而是紅的白的青的黑的都合適只要對方的頭寸合適這頂帽子都會戴得恰恰好這頂帽子是根據聖經的三項主題所表現的西方真傳的一貫統治學只要是主宰意識的神化極端化叫做上帝也得國家也得民族也得人民也得都合適這頂帽子這一定是把自己這一套看作最完善的真理自己與自己這一套看作唯一的拯救者這一定要別人服從他跟著他走才是生存救了你違反了必然滅亡這是信仰第一服從第一不管知識是否正確必須服從於信仰實現這項神聖的使命必須從分散分爭中達到集合到自己這一邊來破壞別人來團結自己這是我拋的洋帽子合適不合適看對方的頭寸如何吳牧師你也戴戴看吳牧師的眼睛有問題以為我拋的是紅帽子他也就照拋不誤而且大拋起來他在吃禁果問題上說我偶爾跟左派嘍囉巧合抑是還是原文有點毛病印順和尚早已聽人家說過這是虛拋一頂在論巴別建塔時他說團結就是力量這歌聲早已聽過現在印順還不忘情甚麼人類要團結要進步就是上帝從中破壞叫他們分散叫他們無組織這些罪名香港人若干年來聽得很熟這雖然說得含糊卻是一頂沈重的紅帽子從吳牧師的話而推測起來團結就是力量不是共產黨的老牌貨色一定是共產黨新近向聯合國申請了專利所以我說了團結就是力量無形中已套上帽子吳牧師又是老香港若干年來聽得很熟那還有什麼話說不過上帝要人類分散那是摩西先生寫在聖經上牧師們都讀得滾瓜爛熟將來連摩西先生怕也有被拋紅帽子的資格這年頭真是人心大變啦不過吳牧師慢拋過來讓我去帽莊查查團結就是力量是否共產黨出品或者申請專利在案吳牧師又說如果印順有機會一定會力竭聲嘶地引吭高歌著團結就是力量一定會帶頭控訴上帝非把上帝鬥倒不可這是一頂怪帽子是預備我將來戴的吳牧師我又不是帽子收藏家接來丟入垃圾坑多了也就有點乏味我還戴不上這頂怪帽子還是你自己收起來將來在香港如有機會也不妨試試看他說我罵故主耶穌其實我沒有罵問我印順的罵是不是也學了人家投機分子一旦加入共黨大罵自己從前的黨的樣這一問倒引起我的話來了從前有些和尚道士為了吃耶穌飯而信耶穌現在也都負起罵罵佛道的責任是否也是學了人家的樣這種不成帽子的帽子還是少拋的好拋呀拋拋到自己頭上去呢吳牧師這幾手老實說不像耶穌先生的門徒我所敬愛的耶穌先生這是你豢養的羊還是披著羊皮混在羊群中的狼九大罵特罵我不是基督徒覺得這種主奴體系的宗教對我不太合適但我一向主張迷信比無信仰好所以我不反對神教的信徒反而希望他們真正地信這才說明上帝是怎樣的愛世人人要怎樣才能為上帝所喜悅我論究的重心是希伯來的耶和華上帝所以讀慣了四福音的感到有點生疏但這確是我忠實的讀經心得我不是基督徒所以有時也偶然謔而不虐的幽他一默但說到罵那是不會的可是龔天民吳恩溥他們不知為了甚麼也許是罪入人心認為我大大罵起基督教來用最挑撥的詞句最惡毒的字眼來侮辱汙衊基督教印順嬉笑怒罵無所不用其極這使我感到意外為此把自己的文章讀了五遍還是覺得沒有罵人對於這我不能不申明兩點一我並沒有罵奴隸本文已交代清楚我討論古代的宗教而這確是古代的事實林異雷牧師也這樣說說我沒有認清時代奴隸二字有傷現代人的尊嚴是可以的說我罵人我不能承認我說張獻忠那是對神愛世人的比較研究而且我也說耶和華高明得多說到拋紅帽子那是吳牧師的眼睛有毛病我這頂帽子是沒有色彩的只要對方頭寸合適紅白青黑都適用吳牧師你們細心研究上帝愛世人我到底罵了些甚麼二罵基督教的不是別人正是吳牧師他說印順在上面所描寫的上帝是個老頑固老封建在這裡所描寫的耶穌卻是個鬥爭分子是個家庭制度的破壞者又說揣摩他印順也的語意上帝不過是個幾十世紀前的帝國主義頭子或者共產黨頭子啊喲我並沒有使用這些惡毒刻薄的名詞用這種刻薄惡毒名詞來罵耶和華上帝與耶穌先生的是吳恩溥牧師我在上帝愛世人中或說奴隸或說奴僕我覺得相差不多吳牧師討厭奴隸看中了奴僕那就奴僕好了他卻硬說印順罵基督徒是奴才其實奴才是他自己罵的這些是可以取原文來查勘的我說伊甸園的生活還過著畜生一樣不知羞恥的生活吳牧師不說是猩猩人猿惡意的硬性規定我說的是蠢如豬玀吳牧師亞當夏娃是你們的老祖宗就是為了罵我也不應如此忍心非罵自己的老祖宗為蠢如豬玀不可我說人與上帝為主奴關係據我的讀經心得在耶和華上帝的宇宙王國裡人類是法定的奴隸在上帝的心目中我印順和尚還不是奴隸我不承認是另一回事我說的是全人類而吳牧師將基督徒從人類中分離出來認為我臭罵基督徒天主教徒都是奴隸成性的奴才將主奴關係局在上帝與基督徒而又硬說基督徒是奴才也許吳牧師沒有讀懂但這決不是我的意思吳牧師製造一些惡毒刻薄的詞句加在耶和華上帝耶穌先生基督徒身上不夠再罵罵自己的老祖宗吳恩溥牧師你護教的心太切了太衝動了衝動得有點神識不清自己大罵耶和華耶穌先生基督徒老祖宗卻咬定是印順和尚罵的世間竟有這樣的荒唐牧師我還能說甚麼呢怪事怪事我沒有罵吳牧師倒著著實實的罵了如說多麼無賴的騙局做夢般當作天機不要還在白日夢囈進行欺騙敲詐的手段只是夢囈未免太大膽太狂妄了印順瞎著眼睛亂說亂嚷輕重顛倒心眼黑闇狂言欺世吳牧師這一回應該罵得開心了如有興趣不妨多罵不過對於耶和華耶穌先生基督徒老祖宗以後可不要再罵了吳牧師非常會罵除了罵得性起時連耶和華耶穌先生基督徒老祖宗一網罵盡而外對於罵我也著實下過不少功夫他不但罵到我的未來給我一頂將來有機會再戴的帽子還會罵到我沒有出生以前吳牧師的罵人學著實可觀我願意節略轉抄讓大家奇文共賞我說我不願作誰的奴隸他就這樣的罵距今不過半世紀中國人能夠進到皇帝面前的大臣們看他們俯伏跪拜惶恐萬狀還不及一條狗如果印順活在那個時候如果前生有修能夠做得一個御前大臣當他指印順而說能夠像狗一樣爬到皇帝面前時他一定不以為恥反而認為不凡之遇這簡直是空前絕後可打二百五十分的妙文他的意思說你印順現在說漂亮話放空砲看你那個時候做不做奴隸這麼一來印順似乎就真的做了奴隸從此說不響嘴吳牧師也就可以大大方方的甘心做上帝的奴僕了其實這是你的羞恥心在作怪是否罪入人心何必想入非非的拖人落水呢不過話得說回來如果是牧師罵人也應該有個分寸如跪在地上何必一定要說狗一樣天主教友見了大主教們也得跪下來基督徒跪著禱告直喊主呀主呀的我也見過不少如跪在地上就一定像狗話就不好說啦吳牧師看在耶穌先生面上少罵一句吧十清道夫的煩惱吳牧師以過半數的篇幅用於閒話痛罵不睬他那我是挨罵了清理呢等於向吳牧師看齊也說些不相干的閒話不但浪費筆墨真的殃及梨棗這如住民不講公共衛生垃圾盡向門外亂拋不理呢臭氣熏蒸蚊蠅亂舞一旦引起傳染病問題更大衛生當局不得不出動清道夫來清理可是如清者自清拋者自拋清道夫永久清不了實在傷感情之至我想吳牧師罵也罵過了也應該罵得開心了俗語說得饒人處且饒人吳牧師歇息吧
