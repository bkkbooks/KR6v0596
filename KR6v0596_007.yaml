牛犢但一旦發起性來特別是野牛老虎也要怕他三分摩西為約瑟祝福也説他為牛群中頭生的有威嚴他的角是野牛的角用以抵觸萬邦直到地極申卅三牛的角象徵威武勇猛又牧牛的要養一隻特別強大的牛牛王作為牛群的引導者這種引導的牛王極容易聯想到人類一切的引導者神牛象徵了繁榮威武引導的上帝印度教中的神就有稱為牛王的還有牛是雲的代名遊牧民族的意識中盡是些牛與羊見到天空烏雲的推移迅速的運行就想像到神與牛一樣的在行動所以印度的梨俱吠陀以牛來比喻雲有時就索性稱雲為牛中國人叫做蒼狗雲的運行可能帶來了風雨吠陀喻為牝牛流乳雷電但主要為象徵神的運行顯現雲每是迅速的忽然而有鑒顧萬民所以以色列的神以利是動物崇拜與天象崇拜的合一從牛而想見超自然的神成為以色列的上帝犢牛崇拜從希伯來與印度的音義一致來説這是極古老的信仰了三耶和華與上帝的合一一人為的結合以色列的上帝是舊有的而摩西引入了西乃曠野的耶和華使耶和華與上帝合一上帝與耶和華的神性常然有共同性但如上面的敘述上帝重於慈愛繁榮而耶和華重於嚴厲懲罰對當時的以色列民族來説無比嚴厲的耶和華是最理想的神了所以摩西將耶和華引入以色列的信仰中認為大家雖不知道耶和華是誰而確實就是祖宗的神亞伯拉罕的神以撒的神雅各的神祖宗的神現在叫耶和華曾允諾以色列人取得迦南流奶與密之地現在要拯救以色列人脫離埃及人的手進入迦南故鄉在耶和華的領導下要殲滅敵人這就是摩西所宣揚的耶和華的救恩摩西巧妙的將耶和華與上帝合一在曠野四十年的流浪中完成了新宗教也養成了民衆適應戰鬥的宗教意識而後威嚴正義是非分明慈愛道德綜合的新信仰在耶和華你你們祖宗的上帝的口號下展開了希伯來宗教新的一頁二自然的對立合一意義著內在的矛盾摩西的新舊合一當然是成功的但結果卻引起了內部的分爭對立也許不是摩西與耶和華所意想得到的吧現在從二點來説一不得造像與造像摩西新宗教的十誡中説不可為自己雕刻偶像也不可作甚麼形像倣佛上天下地地底下水中的百物不可跪拜那些像也不可事奉他出草耶和華是看不得接近不得説也説不得的神聖到充滿危險性的當然不能以形象來表示的如照著摩西時代的耶和華而表象起來一定是令人驚心動魄的忿怒像但是以色列人意象中的上帝有明確的意象當然也可以具體的形態表現出來這就是上帝與耶和華的一項矛盾前面説起過摩西上西乃山去了摩西是代表耶和華領導大衆的一旦好久不回來民衆對耶和華的抽象信仰便沒有著落所以對亞倫説為我們作神像可以在我們前面引路因為領我們出埃及地的代表耶和華的摩西我們不知道他遭了甚麼事出草二亞倫不會巫術不能以神祕現象來證實耶和華就在這裡那只能順應民衆的要求為他們造一隻久在以色列人心目中的上帝牛犢等到摩西回來毀壞牛犢像進行宗教整肅成為耶和華與上帝之間的一項嚴重衝突耶和華就是上帝漸成為以色列民衆的信仰了在十二支派中猶太從大衛以來一直繼承摩西的精神而進行拯救以色列擴大以色列統治外邦人的工作宗教方面也是耶和華的熱信者大衛立願為耶和華造殿所羅門王完成了這一工作但等到以色列分立耶羅波安王起來他不可能繼承摩西為耶和華造法匱大衛父子造聖殿的傳統另立分殿那只有適應民衆的上帝意象牛遵循亞倫路線而鑄造金牛犢了猶太與以色列的政治對立宗教也就對立起來表面看來大家都信仰耶和華上帝而在不知不覺間實際傾向於耶和華與上帝的分化二獨占與均沾以色列舊傳的上帝雖在創世記裡也有些過分嚴厲的措施但對亞伯拉罕家族來説不斷的指示不斷的祝福真是愛護備至上帝與他們父子家人一樣的親和誰也可以直接向上帝祈求摩西新傳的耶和華嚴厲神聖得那樣不可接近非有祭司不可祭司要經特殊的宗教儀式使他成聖作為神與人間的聯繫耶和華往來的約匱會幕也是祭司的特區非一般人所能到達在造成宗教的神祕性來説是有效的摩西經常以幕覆面也加深了神祕性但與以色列舊傳的宗教不合拿十二支派來説摩西是利未支派他的哥哥和兒子都成了祭司而且規定了利未支派的祭司特權這那裡是神的意思説破了這不過摩西假借耶和華的威嚴利用家族集團以統治全以色列人而已問題就來了首先是亞倫與摩西的磨擦難道耶和華單與摩西説話不也與我們説話嗎民十二這是對摩西的神聖特權最先表示了異議結果到底是一家人説過也就算了米利暗譏毀摩西有罪大淋瘋是罪的象徵被摩西關鎖在營外七天算事暴風雨式的抗議接著又來了利未的曾孫哥轄的孫子以斯哈的兒子可拉和流便子孫中以利押的兒子大坍亞比蘭與比勒的兒子安並以色列會中的二百五十個首領就是有名望選入會中的人在摩西面前一齊起來聚集攻擊摩西亞倫説你們擅自專權全會衆個個既是聖潔耶和華也在他們中間你們為什麼自高超過耶和華的會衆呢民十六這不僅是利未支派的自爭教權而且包括了各支派繼承以色列人在上帝前的平等立場而提出了抗議他們責備摩西家族的專斷把持大家一樣憑什麼而居於特權階級呢理由是夠充分的但二百五十個首領與可拉黨全家一夜間都被殲滅了到了明天摩西受到了全會衆的攻擊説你們殺了耶和華的百姓了民十六但耶和華支持摩西又死了一萬四千七百人了事這是耶和華宗教問世以來宗教整肅的第二大回合這種意義的矛盾等摩西死了就淡化下去約書亞繼續領導進入迦南大家忙於經營分得的産業忙於抵抗外族的不斷壓迫連耶和華的神聖約匱被非利士人虜去大家也顧不得等到大衛家作王耶和華的信仰再度昂揚起來但一到猶太與以色列分立宗教的意境也完全對立耶羅波安王造了以色列人的上帝金牛犢與猶太耶和華的聖殿相對抗而且耶羅波安在邱壇那裡建殿將那不屬利未人的立為祭司王上十二耶羅波安徹底反對利未族的宗教特權不許他們供祭司職分事奉耶和華代下十一以色列與猶太的對立當然是政治的但在宗教方面以色列代表了以色列人固有的上帝代表了以色列全體在上帝面前大家平等而猶太利未代表了摩西創傳的耶和華獨裁的階級的宗教以色列國的宗教不但反對摩西的制度更反對摩西不得造像的宗教摩西完成了耶和華上帝二位一體的宗教雖有過短暫的光輝而內在的矛盾對立終於衰落下來末後以色列被亞述毀滅了猶太也跟著為巴比倫所滅亡人民都被虜去七十年後猶太人部分歸來重建耶路撒冷與聖殿極端嚴格謹守摩西的律法可是羅馬的鐵蹄又來了耶路撒冷也被毀滅了以色列是耶和華上帝的長子選民在耶和華上帝看來這是最優秀的但神聖到充滿危險性的耶和華壯健而會咆哮的牛犢都沒有能拯救自己的選民免於遷移滅亡的命運這唯有寄希望於羔羊耶穌先生了
