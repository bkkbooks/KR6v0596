body:
  text: 七上帝與耶和華之間一摩西傳揚的耶和華一耶和華是誰我讀新舊約時最使我景仰與同情的莫過於耶穌先生使我感到震驚的是耶和華上帝耶穌先生的福音是離不了耶和華上帝的所以想信解這個宗教對耶和華上帝有認識一番的必要否則便是迷信了但這非從多方面去認識不可現在先寫下耶和華與上帝之間向大家報告猶太教天主教耶穌教真耶穌教誰也認為上帝神就是耶和華耶和華就是上帝但我在舊約裡得到了一個明確而不容懷疑的認識那就是上帝是以色列人舊有的信仰耶和華是摩西向以色列人新傳揚的救主耶和華與上帝或譯為神合一奠定了摩西時代的新宗教雖這麼説二位一體的新宗教還是含有矛盾的成分不免衝突要到猶太與以色列同歸於盡這才消泯了對立的形迹從創世記看來到以挪士時代才求告耶和華的名創四亞伯蘭也曾在伯特利築壇求告耶和華的名創十二耶和華的名字在創世記中到處都是好像早就是全世界至少是以色列民衆所公認的了但事實並不如此摩西以前的事情本沒有文字記録僅是一些口傳的民族故事還有一些創造神話洪水傳説摩西傳説是摩西還待考究托拾這些傳説編為創世記所以創世記所説的耶和華是後代的追記而不是當時的實際情形因為事實上那時是不知道耶和華名字的這點出埃及記記得非常的明白摩西對神説他們若問我説他叫甚麼名字我要對他們説甚麼呢神又對摩西説你要對以色列人這樣説耶和華你們祖宗的神就是亞伯拉罕的神以撒的神雅各的神打發我到你們這裡來耶和華是我的名出三法老説耶和華是誰使我聽他的話容以色列人去呢我不認識耶和華出五神曉諭摩西説我是耶和華從前我向亞伯拉罕以撒雅各顯現為全能的神至於我名耶和華他們未嘗知道出六從摩西的親身經歷親自敘述來看耶和華是誰也不知道的一摩西不知道向他顯現的神是誰二埃及的法老也不知耶和華是誰三向亞伯拉罕等顯現的被稱為亞伯拉罕的神以撒的神雅各的神而他的名字叫耶和華竟然誰也不知道根據這三條經文特別是末後一條證實了耶和華是以前所不知道的創世記的耶和華是追記上去的那就不能不説是摩西的新發現新宣傳了二耶和華是何烈山的神摩西以宗教來號召以色列人來達成民族獨立的目的所以摩西傳揚的神當然要確指為祖宗所信仰的也就是一向祝福與保護這一民族的對以色列人來説就是一再提到的你們祖宗的神亞伯拉罕的神以撒的神雅各的神了然而被指為祖宗的神而名叫耶和華的卻是亞伯拉罕以來從來不曾知道的這是多麼離奇摩西到底從什麼地方發現這位素不相識的耶和華呢查考起來耶和華是何烈山的神證據是一摩西首次見到耶和華的是在何烈山如説摩西領羊群往野外去到了神的山就是何烈山耶和華的使者從荊棘裡火焰中向他顯現出三二耶和華向以色列大衆講話的是在何烈山耶和華早就對摩西説過將百姓從埃及領出來之後你們必在這何烈山上事奉我出三以色列人在神山事奉耶和華的經過摩西在晚年重申誡命時曾簡略説你在何烈山站在耶和華你神面前的那日耶和華對我説你為我招聚百姓那時你們近前來站在山下山上有火焰沖天並有昏黑密雲幽暗耶和華在火焰中向你們説話申四耶和華我們的神在何烈山與我們立約耶和華在山上從火中面對面與你們説話這些話是耶和華從山上火中雲中幽暗中大聲曉諭全會衆的申五三摩西兩次上山去見耶和華就是何烈山如説你們在何烈山我上了山要領受兩塊石版就是耶和華與你們立約的版那時我在山上四十晝夜申九耶和華吩咐我説你要鑿出兩塊石版和先前一樣上到我這裡來我又像從前在山上住了四十晝夜申十據上面的引述耶和華是何烈山的神是很顯然的這一直到以色列與猶太分立的時代先知以利亞逃避耶洗別的迫害時還説到了神的山就是何烈山王上十九但有關耶和華與會衆立約的事出埃及記作西乃山如説耶和華要在衆百姓眼前降臨在西乃山上出十九摩西兩次上何烈山去出埃及記也説是西乃山如説耶和華的榮耀停於西乃山摩西進入了雲中上山在山上四十晝夜出草四又説照耶和華所吩咐的上西乃山去摩西在耶和華那裡四十晝夜出卅四那到底是何烈山還是西乃山呢我認為出埃及記雖説是西乃山但在摩西初見耶和華時也説神的山就是何烈山出三申命記雖一再説是何烈山但也説耶和華從西乃山而來申卅三所以何烈山與西乃山應為同一地點的不同名稱這可能是一是希伯來語一是當地人的方言或者西乃是這一帶山地的總稱所以又説西乃野或稱西乃半島而何烈是摩西遇到耶和華上山二次與耶和華同住的地方三耶和華的原始面目耶和華是何烈山的神這是什麼意義耶和華的神格是怎樣的呢一個人見到耶和華那或是宗教經驗或是神經失常是不足為據的摩西領導的以色列會衆大家見到耶和華降臨應該有事實根據可據以想見當時耶和華的真相耶和華降臨的情況是這樣我要在密雲中臨到你那裡叫百姓在我與你説話的時候可以聽見出十九在山上有雷轟閃電和密雲並且角聲甚大營中百姓盡都發顫西乃山全山冒煙因為耶和華在火中降於山上山上的煙氣上騰如燒窯一般遍山大大的震動出十九你們近前來站在山下山上有火焰沖天並有昏黑密雲昏暗耶和華從火焰中對你們説話申四以色列全會衆在西乃何烈山所見的據迹象來判斷那時的何烈山還是偶爾會噴火的山火焰沖天煙氣上騰與燒窯一般正説明了噴火的情形山頂突然冒煙火又逢到天氣的反常暴風疾雷閃電密雲引起的震動這種昏天黑地驚天動地的大自然災變威力能不顫栗嗎不震驚於神的降臨嗎雖然現代的知識進步了也許耶和華的信仰者遇到這一情勢還有人會想到天地末日主耶穌的乘雲而來了從大自然災變的情況而聯想為宇宙大威力者耶和華威靈顯赫的傳説流行於西乃一帶的山野稱何烈山為神的山可見耶和華是一再這樣的在這裡顯現的依自然災變而想像出來的大威力者耶和華當然是不可接近的火山噴火時暴風閃電時你敢接近嗎如説不可闖到我面前觀看恐怕有多人死亡出十九祭司和百姓不可闖過來上到我面前恐怕我忽然出來擊殺他們出十九連耶和華的山也不可隨便接近如説不要近前來要把你腳上的鞋脫下來因為你所站之地是聖地出三你們當謹慎不可上山去也不可摸山的邊界凡摸這山的必要治死他出十九從自然災變的恐怖而想像成的耶和華是那樣的嚴厲嚴厲到使人震驚如摩西要去傳達耶和華的救恩為了沒有受割禮耶和華遇見他想要殺他出三大祭司亞倫的兩個兒子也是祭司為了火的不潔耶和華就把他燒滅了利十摩西的姊姊女先知米利暗耶和華也罰他長了大淋瘋民十二作為親近耶和華的祭司們還隨時有生命危險何況衆人呢這難怪以色列人對摩西説我們死啦我們滅亡啦凡挨近耶和華帳幕的是必死的我們都要死亡嗎民十七不但如此連耶和華的名字也不能隨便説如十誡中説不可妄稱耶和華你神的名出二十這種看不得接近不得説也説不得的神嚴厲到使人驚心動魄在印度宗教中也是有的但那是毒龍暴惡的夜叉羅剎都與暴風冰雹雷轟等有關被看作惡性重大瞋毒熾然但在摩西所傳揚實在是與摩西的個性有關的宗教中卻另有一番意境在這點上看出了東方宗教與西方宗教的根本歧異他認為耶和華是完全的聖潔而人類是惡性重大不聽教誡耶和華的神聖與罪惡不相容所以在耶和華的神聖中充滿了火藥氣味耶和華是忌邪的神是非分明對人類的罪惡看到了必給豫懲罰甚至於不惜毀滅一切有時也眼不見為淨免得一時怒起而毀滅了出卅三以洪水來毀滅一切只剩下挪亞一家創七章對於一向祝福的以色列人也曾想我要用瘟疫來擊殺他們使他們不得承受那地叫你摩西的後裔成為大國民十四這比起中共希望以核子戰爭毀滅半數人類從廢墟中再建人類文明的精神還要徹底得多如火山熄了風朗氣清那是耶和華離開了這裡這樣耶和華的慈愛何在耶和華是聖潔你在耶和華眼中真是渾身罪惡罪該萬死而你竟然還在吃飯穿衣還在成家立業還在掌握權力這怎能不感謝耶和華的寬大容忍無限慈愛四摩西新宗教的來源以色列民族當然一向有他自己的信仰但僅有割禮的遺傳別無顯著的熱烈的宗教活動摩西也是以色列人那他怎會有獨到而熱烈的信心呢這就不能不説是得力於長期的宗教環境的熏陶了原來摩西在少壯時代為了躲避埃及法老逃往米甸地居住出二到了米甸祭司那裡甘心和那人祭司共住那人把他的女兒西坡拉給摩西為妻出二摩西回埃及與法老交涉的時候已八十歲了出七足見摩西在米甸的寄居生活是一個相當長的時間住在祭司的家裡不問什麼宗教都會引發一些宗教情緒學到一些宗教禮儀同時他在嶽父祭司家裡牧養嶽父葉忒羅的羊群一日領羊群外去到了神的山就是何烈山出三米甸與何烈山相近摩西的牧羊生活經常往來於附近山野對於耶和華的山耶和華的神話而流傳於曠野的摩西應該早就知道了日常牧羊處身於充滿神祕可怖的山野寄住於宗教生活的祭司家庭育養起宗教的內在熱誠自會突發宗教的經驗如在何烈山從荊棘的火焰中聽到了耶和華的聲音有了這種經驗狂熱的耶和華信仰在拯救以色列人的行動中火一樣蔓延起來摩西領導以色列人到了西乃山時摩西的嶽父米甸祭司葉忒羅聽見了出十八就帶著摩西的妻子和兩個兒子來到神的山就是摩西在曠野安營的地方出十八葉忒羅稱讚耶和華比萬神都大而且把燔祭和平安祭獻給神出十八這可見葉忒羅雖不一定信仰耶和華但確是知道耶和華他的燔祭與平安祭也就是摩西教以色列人的主要祭禮葉忒羅還向摩西建議組織民衆分層負責據民數記十説摩西非常希望嶽父與他同行雖在摩西離開西乃山野以前就回本地本族去了但對於摩西在西乃山野完成的約法約匱祭禮祭司制度等都可能有所貢獻也就是提供米甸的祭司制度宗教儀式讓摩西作參考這些雖似乎推論但相信與事實不遠二以色列舊有的上帝一這就是領你們出埃及的神摩西將西乃曠野的耶和華革新強化了以色列民族的宗教但以色列人早就有自己的信仰就是叫做以利的上帝或譯為神以色列舊傳的上帝是怎樣的呢由於現存的史料全部舊約都是摩西以後耶和華與上帝合一為耶和華的特性所蒙蔽所以在沒有知道耶和華名字以前以色列信仰的上帝缺乏了明顯的記述但根據兩個事實可以明顯的抉發出來百姓見摩西遲延不下山就大家聚集到亞倫那裡對他説起來為我們作神像可以在我們前面引路亞倫對他們説你們去摘下你們妻子兒女耳上的金環拿來給我百姓就都摘下他們耳上的金環拿來給亞倫亞倫從他們手裡接過來鑄了一隻金牛犢用雕刻的器具作成他們就説以色列阿這就是領你們出埃及的神出卅二耶羅波安王就籌畫主意鑄造了兩個金牛犢對民衆説以色列人哪這就是領你們出埃及地的神他