body:
  text: 八我怎樣選擇了佛教在人生的旅程中到處是黑暗的陰影所謂不如意事常十九然而黑暗不會永久困難終要克服我們生在人間就不能不依此人身而進向於光明的領域我們要保有健全而和諧的身心有理智有熱情充滿光明的信願不落於空虛的失望這對於宗教的信仰是有必要的缺乏宗教的熱信或非宗教者常是自暴自棄憂鬱失望或陷於變態的虐待狂自殺狂或患著嚴重的歇斯的里症惡化與腐化的人生可怕極了特別是近代由於人心的向外追求內心空虛缺乏充實的生命道德也就越來越墮落作為醫治人心的宗教在現代是顯得尤其重要了說說我自己的信教經過吧我在民國七年開始了宗教的追求末了我選擇佛教並進一步的出了家我怎樣的選擇了佛教呢說來是有點不可思議的我生長於農村為了經濟早就失了學我學習中醫醫道通仙四字引發我對於仙道的仰慕神農本草與雷公泡製說到某藥可以延年某藥可以長生特別是奇經八脈的任督二脈對於長生的重要性仙道教的信仰激發後讀過了抱朴子呂祖全書黃庭經性命圭旨慧命經仙術秘庫這一類仙經而且旁求神奇秘術如奇門符咒之類我進過同善社也學過靈子術與催眠術那時候我雖沈浸於巫術化的神道教著重於個體的長生與神秘現象然對於我目光的擴大真理的追求還是有著良好的影響我對於神道教的仰信暗中摸索了兩三年終於為父親發覺了當然是不贊成我這樣做的要我出去教書我受了師友的啟發開始研究老莊同時閱覽一些近代書物我的宗教觀開始變了老莊與道教的修煉不能說沒有關係的老莊的哲理非常深徹然而反造作的回復自然返歸於樸的理想始終是不可能的熟練人情的處世哲學說來入情入理而不免缺乏強毅直往的精神獨善的隱遁生活對社會不能給予積極的利益雖然老莊的思想為我進入佛法的助緣而道家的哲理道教修身的方法也獲得我部分的同情然我不再作道教的信徒從仙道的美夢中甦醒過來道教的信念動搖了我雖不曾棄絕他而又徬徨地追求回復到讀過的儒書這與道家的充滿隱遁色彩個人主義的宗教大大相反儒家有一番身心的修養功夫更有一番政治的大理想平常切實重人事尊理性確為我國文化的主流然而我儘管同情他讚美他卻不能充實我空虛與徬徨的內心別人覺得我更實際而我卻自覺得更空虛了到現在想來這不外別的儒家雖不是沒有宗教的因素而並不重視宗教平常的現實的就此一生而止於立德立功立言的這對於一般人不能織成一幅莊嚴燦爛的光明圖案缺乏鼓舞攝引力不易使一般人心安理得得失不變苦樂不變死生不變而邁向光明的前途這樣的出入老莊孔孟有四五年之久在空虛徬徨中經朋友介紹接觸到基督教並且發生了濃厚的興趣這是富有社會性的宗教從基督教中我體會得敬虔而純潔的信心對於宗教的真正意義有信有望有愛的基督教有著儒道所不曾有的東西我研讀新舊約閱覽真光靈光基督徒等雜誌我實行禱告參加過奮興會然而我終於不能成一基督徒外緣是那時掀起反基督教運動雖無關於基督教義自身而基督教會憑藉國際背景不免有文化侵略的罪嫌主因是某種思想的難以接受如信者永生不信者永火不以人類的行為內心與外行為尺度而但以信我不信我為標準順我者生逆我者亡有強烈的獨佔的排他性除屬於己方以外一切都要毀滅階級愛的底裡顯露出殘酷的仇恨又如靈是神那裡來的從神而來的靈經肉的結合而成人照基督教義重生才能得救看來走向地獄是大多數全知全能的神歡喜被稱為自己兒女的人類如此這可說是莫測高深也可說豈有此理我不能信賴神是慈悲的所以也不信耶穌可以為我贖罪不到兩年從基督教而來的短暫光明迅速消失空虛而茫無著落的內心又如狂濤中的小舟一樣情緒低落時時煩躁不安悶得慌以亂讀書為消遣偶讀到馮夢禎的莊子序說然則莊文郭注其佛法之先驅耶我心裡一動開始向佛法去探討可是佛法難聞經典難得我出入寺院東尋西找總算讀到了龍舒淨土文金剛經石注人天眼目傳燈錄法華經華嚴經疏鈔纂要殘本中論初學而讀這樣深的教典當然是不懂的可是因為不懂使我嚮往不知什麼力量鼓舞我耐心的讀著我活像小孩見大人的作為一切不懂而一切都感興趣又像處身於非常富裕的環境看不了聽不了吃喝不了我在半懂不懂之間感覺佛法的無邊深廣後來讀到太虛大師的居家士女學佛程序才從淺處學起讀了一些門徑書又讀了一分屬於三論唯識的大乘經論雖還不大明了而佛法成為我的光明理念信心不斷增長我相信三世因果觀最為入情入理由此而離惡向善由此而轉凡成聖即使不曾解脫或者墮落而終於要向上升進終於要究竟解脫的這不但有著究竟絕對的歸宿而在過程中也是山窮水盡疑無路柳暗花明又一村鼓舞我們安慰我們引導我們使我們通過這永不失望的旅程我覺得佛法是以行為善惡為凡聖的尺度而不光憑信願佛法重個己的解脫而更重利益眾生佛法重於徹底的覺悟唯有真的覺悟才有真的自由佛法是信願智慧慈悲的總和佛法的身心修持有儒道的長處更超過多多耶教誠信的悔改佛法中也有佛法有一切宗教的長處有究竟又有方便最能適應一切根機循循善誘我選擇了佛教為我苦難中的安慰黑暗時的明燈可惜我的根性太鈍讚仰菩薩常道不曾能急於求證然而從此以來我過著平淡安定的生活不知別的只是照著我所選擇的坦然直進民國十七年母親去世了十八年父親又去世該是我出家的因緣熟了於家庭再沒有什麼顧戀十九年夏天發心出離了家讓我的身心融化於三寶之中為這樣最高的宗教而努力
