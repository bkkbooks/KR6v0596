body:
  text: 四人心與道心別說一序起大禹謨說人心惟危道心惟微惟精惟一允執厥中這四句十六字在中國固有文化中是被稱譽為道統心傳的說到中國文化從黃帝堯舜以來經三代而凝定這是重人事的從人事而傾向於道志於道的本於人向於道的文化是本著不偏不蔽的中道去實現的人心道心執中扼要的表達了中國文化的特質這一特質不僅是儒家的也是道家的說是儒道諸子所共同的也沒有什麼不對只是春秋以來學術思想趨於自由百家各有所重所偏而已有關人心道心執中的解說荀子解蔽篇解蔽就是不蔽於一邊而得乎中道是現存較古的一種如說夫道者體常而盡變一隅不足以舉之聖人知心術之患見蔽塞之禍故兼陳萬物而中縣衡焉何謂衡曰道這是不偏蔽於一邊而衡以中道的意思但怎樣才能體道而中衡呢荀子提出了人何以知道曰心心何以知道曰虛壹而靜虛壹而靜謂之大清明這是以虛則入壹則盡靜則察為治心知道的方法其後又說昔者舜之治天下也不以事詔而萬物成處一之危其榮滿側養一之微榮矣而未知故道經曰人心之危道心之微危微之幾惟大清明君子而後能知之荀子說到了而中縣衡人心道心危微壹精於道與大禹謨所說顯然有關大禹謨是古典還是梅賾所釆竄雖然有待考證也許舜時還沒有如此圓熟的成語但從荀子看來人心與道心危微精壹都是古已有之不失為中華文化共通的特色荀子的解說在中國文化開展中屬於儒家重於人道的一流如從中國文化共同的根源書易詩都是古代傳來的而不同的開展來說儒家以外儘可有不同意趣的存在大禹謨為儒家所傳解說也都屬於儒家早期的孔氏傳說危則難安微則難明故戒以精一信執其中據此精與一屬於達成執中的方法與荀子說相同朱子以人心為人欲道心為天理而執中為人欲淨盡天理流行陽明以為人心與道心只是一心而有真心與妄心的別異這當然也歸於盡妄存真宋明理學盡人欲而存天理盡妄心而顯真心無疑是儒者深受當時的佛教主要是禪宗的影響然從老莊佛法大乘正宗的空有二輪來看應還有不同的解說危是形容人心的微精一是形容道心的依人心以向道心順於道心與道心相應體見於道體道見道而又不違不礙人心這就是允執其中這是本於人志於道的進展過程中所有恰到好處中的方針孔子曾說道之不行也我知之矣知者過之愚者不及也道之不明也我知之矣賢者過之不肖者不及也智者與賢者是重道的而太過了就會莊子那樣的蔽於天道而不知人荀子說愚者與不肖者每每是不及拘於人事而不知有道太過與不及都是偏邪而非中正的對人心與道心不能正處中道正是中國聖賢所慨歎佛教聖賢所呵責的在這中國文化復興的機運中對人心與道心的中道我願略加論列以祝贊中國文化佛教文化的復興這不是為了立異不是為了爭是非所以題為別說聊備一解而已二人心惟危大禹謨的四句十六字句讀是可以這樣的人心惟危道心惟微惟精惟一允執厥中以危來形容人心以微精一來形容道心對人心與道心二者應該恰當的執其中道因為偏蔽於道或拘執於人都是一邊而不是中國聖賢所用的中道荀子解蔽篇有道人與不道人可道之心與不可道之心依此來解說道心是可道合於道之心也就是道人之心人心是不可道不合道之心也就是不道人之心這樣人心是一般人的心人同此心的心人欲當然是人心但人心並不限於人欲如孟子說仁人心也仁也者人也仁仁義禮智正是人心的重要內容雖然從人心本性的立場古人有性善性惡性善惡混等異說然從現實的人心人類心理現象去著眼誰也不能否認心是有善有不善的人人如此的人心的確是危而難安的為物欲所陷溺為私見所固蔽作於其心害於其事作於其事害於其政那是不消說了被稱為性德的仁仁智信都不是完善的所以孔子說好仁不好學其蔽也愚好知不好學其蔽也蕩好信不好學其蔽也賊而且仁義的闡揚在人類歷史中多少也有些副作用莊子駢拇篇說枝於仁者擢德塞性以收名聲使天下簧鼓以奉不及之法又說三代以下天下何其囂囂也自虞氏招仁義以撓天下也天下莫不奔命於仁義這所以老子有大道廢有仁義的慨歎總之現實的人心是在善惡消長的過程中不善的會招致可悲的結果善的也並不完善並不徹底人心的性質如此的確是危而難安所以古代聖賢總是居安思危安不忘危而要從修道修身以道中超越這危疑難安的困境三人心惟危的辨析人心所以危而難安要從人心的辨析中去求了解這在儒道的著作中是簡略不備的對於這佛法有詳密的說明可以幫助了解人心惟危的問題所在人心實通於一切眾生心是一般人的心理現象心理活動心佛法或分別的稱為心意識與大學所說的知意心非常類似而內容不完全相同依佛法人類的心識能了別認識對象境這要依於引發認識的機構根才能展現出來如依眼根而色形色顯色境為眼識所了別依耳根而聲境為耳識所了別依鼻根而香臭境為鼻識所了別依舌根而味境為舌識所了別依身根而觸境為身識所了別這五識是屬於感官的知識眼耳鼻舌身等五根等於現代所說的視神經觸覺神經還有依意根而一切法境為意識所了別意識所了別的極為廣泛不僅了別當前現在的也通於過去的及未來的不僅了別具體的事物也通於抽象的關係法則數量等這是一般人所能自覺的感官知識以外的認識前五識與意識總名為六識意識實在也是五識所依的意根呢這可說是過去的認識活動或稱之為過去滅意而實是過去認識所累積形成潛在於內的意或稱為諸識和合名為一意現在意這是一般人所不易自覺的卻是一切六識的根源舉例說過去舉波浪所依的大海水喻六識如從山石中流出的泉水而意根卻如地下水源地下水是一般所不見的卻是存在於地下深處的地下水從何而來這是從雨水及水流浸潤而潛存於地下的意根也是這樣源於過去的認識過去了消失了卻轉化為潛在於內的細意識在大乘佛法中更分別為末那識與阿賴耶識過去意識總括六識所轉化的統一的微細潛在的意根在人心的了解中極為重要人心不只是一般的五識與意識而已人心的活動是極複雜的融和的綜合活動稱為心聚不論前五識意識或內在的微細意都有複雜的內容其中最一般的有三一受這是在心境相關中受影響而起的情感如苦樂憂喜等苦與樂是有關身體的感官所直接引起的喜與憂是屬於心理的對感官的經驗來說是間接的還有中庸平和安靜的捨受通於一切識儒者所說喜怒哀樂未發的境界就是捨受的一類二想這是在心境相關中攝取境相而化為印象概念人類的想力特強形成名言而有明晰的思想知識三思這是在心境相關中應付境相所發的主動的意志作用從生於其心到見於其事語言或行為都是思的作用這三者在心理學上就是情知意在人心中心的一系列活動中也有先受感受次想認了而後思採取應付的方法的顯著情形但其實每一念心都同時具備這三者也就是說這是內心不能分離的作用所以佛法通常以識為人心的主要術語而所說的識六識或八識卻不只是認識的人心是有善有惡的而且是生來就有善惡功能的所以說最初一念識生得善生得惡善為無量善識本惡為無量惡識本如加以分別可以分為善不善無記無記還可以分為二類名為三性不善中以貪瞋癡慢疑不正見六類為根本善中以無貪近於義無瞋近於仁無癡近於智為根本但有不能說是不善的也不能說是善的名為無記無記在佛法的解說中是最精當的部分善是道德的不善是不道德的這主要是與人倫道德有關的分類如當前的所起一念心沒有善或不善的心理因素也就是不能說是道德或不道德的也就不會引起果報那時的心心與心所一切都為無記的這不但一般的六識中有細心屬於意識的一類中也有而內在的微細意中從善不善心而轉化來的雖可說是善的潛能不善的潛能而在微細意中卻是極其微細難於分別只能說是無記的所以說到人心深處與善惡混說相近但在混雜混融如一中善與不善的潛能是別別存在而不是混濫不分的孔子說性相近也習相遠也雖說得簡略卻與佛法所說相近至於佛法所說的心性本淨那是一切眾生所同的是不局限於人倫道德的不是一般善心仁義禮智的含義可比不善的心所名為煩惱煩惱是煩動惱亂的意思只要心中現起煩惱無論是貪是瞋都會使人內心熱惱而不得安寧進一步說微細意中的微細煩惱雖是無記性的也有微細的熱惱如細煩惱發作起來會使人莫名其妙的不安引起情緒的不佳所以危疑不安在人心中是極深刻的這種微細意中的微細煩惱是生來如此的生得在前六識起粗顯煩惱時內在的細煩惱當然存在就是善心現起細煩惱也一樣的存在一樣的影響善心所以人類的善心善行被稱為有漏的雜染的並不是純淨的完善微細意中的煩惱佛法類別為四大類自我的愛染自我的執著自我的高慢自我的愚癡迷惑概略的說迷惑自己不能如實的理解自己是我癡從自我的迷惑中展為我愛生命的愛染我見自我神靈的執見我慢優越感權力意欲在微細意中原是極微細的一般人所不能明察的但在佛教的聖者深修定慧反觀自心而體會出來扼要的說人心是以自我為中心的自我中心的心行就是自心不安世間不安的因素例如布施持戒或從事於救國救世界的努力在人類的道德政治中不能說不是出於善的然在自我中心中我能布施我能持戒不免自以為善這樣的人越是行善越覺得別人慳吝破戒而善與不善也就嚴重的對立起來不但自己的善心善行失去意義而漸向於不善對慳吝破戒者也失去與人為善的同化力量招仁義以撓天下引起副作用也就是這樣在中國的漢宋明代儒學昌明而引起黨爭動不動稱對方為小人引起的惡劣結果是怎樣的使人失望救人救國救世界在自我中心中會發展到只有我才能救人救世只有我這一套主義政策才能救國救世界世界陷入糾紛苦諍的悲慘局面人心也就惶惶不可終日了人心是情感知識意志的融和活動人心的缺點長處都是通於這三者的如情感的不正常即使是正常的受苦會使人惱亂喜樂會使人忘形而不知是刀頭的蜜不苦不樂的捨受在流變過程中不究竟不自在還是行苦如知識有正確也有謬誤正確是有時空局限性的不宜固執所以孟子說執中無權猶執一也尤其是部分的正確如執一概全就陷於謬誤所以說如盲摸象荀子解蔽篇所說的蔽大抵是一隅之見意志的自我性特強可以善可以不善而終於不得完善知情意三者人心每不得其正而又互相影響這就難怪人心的開展危而難安了人心特別是人類的心知情意三者都有高度的開展經上說人有三種特勝不但勝於地獄鬼畜也勝於天國的神三特勝是一梵行勝梵行是克己的淨行是道德的依佛法道德依慈悲為本與仁為德本的意義相同道德是人類的特勝一般地獄鬼畜愈低級的越是微昧不明是生而如此本能的愛本能的殘殺難有道德意識的自覺天國中也沒有克己的德行越崇高的越是沒有二憶念勝人類念力強從長遠的記憶中累積經驗促成知識的非常發達這是鬼畜天國所不及的三勇猛勝人類為了某一目的能忍受一切苦痛困難以非常的努力來達成這在鬼畜與天神是萬萬不及的這三者是人類情知意的特長從好處說這就是慈悲智慧勇進中庸說知仁勇三者天下之達道也這是所以行道的三達德與人類的三特勝相近但依佛法說知仁勇都不就是盡善盡美的在人心中都不免有所蔽參孔子所說的六言六蔽也就都不免於危而難安的依佛法來說人心惟危要從五識中也要從意識中從惡心中還要從善心中要從情意中還要從知識中不但從粗顯的六識還要在一味的微細的無記心中深深去徹了才得四道心惟微惟精惟一如上所說道心是道人之心可道之心這不是一般而是希賢人希聖人以至人真人神人為理想進而實現為賢人聖人至人真人神人合於道的心要說明道心先要略明道的含義在中國文化中道是百家所重的所以古有一切學派同出於道家的傳說在字義中道是道路與梵語的末伽相當道路是前進所不可不遵循的如行不由徑不但不能到達目的地中途還不免遭遇危害這種意義被引申為人類居心行事的軌律如倫常之道仁義之道修齊治平之道有普遍性與必然性而為人生的常道更引申為自然天宇宙的軌律道是宇宙的本體到此道就有了形而上的色彩了在佛法中與法梵語達磨的意義相近法是合理的非法是不合理的所以法是善的德行及良善的習俗儀則法字引申為真理正法妙法與實相真如的意義相通但在法的實踐中聖者們所有理智一如的內容稱為法也就是菩提覺涅槃寂滅菩提是覺但正覺無上覺決不同於一般的知而是真理的體現古人譯菩提為道是不無意義的涅槃也不是客觀真理而表示實現真理所得解脫自在的當體玄奘譯末伽為道老子的道而不許譯為菩提不免拘於文字了然中國各家所說的道內容不必盡同與佛法的法菩提涅槃當然也不相同這裡只表示在某一點上意義有些類似而已在中國文化中道有天道人道天道是自然的人道是人為的道家是重自然的也就重於天道老子說天之道人之道主張法天道以明人事莊子更重於自然所以荀子說他蔽於天而不知人儒家是重人事的也就是重於人道子貢說夫子之言性與天道不可得而聞也孔子後人都重於人道而在闡明其本然性也稱為天道約人道約實踐說如孟子說誠者天之道也誠之者人之道也中庸也有此說總之在各家中都接觸到天道與人道而各就所重予以發揮在這人心與道心的對說中人心是人道道心是天道微精一三者本為道的形容詞由於道是微是精是一道心也就是微是精是一了一以微來形容道的如老子說視之不見名曰夷聽之不聞名曰希搏之不得名曰微此三者不可致詰混而為一是謂無狀之狀無象之象是謂忽怳所說的視之不見聽之不聞搏之不得在佛法中就是眼根所不能見耳根所不能聞身根所不能觸是眼識到身識前五識所不能了別的道心惟微是舉微為代表而實賅攝希與夷微希夷只是說明道是超越於感官經驗的微是隱微對顯而說中庸是重人道的也一再說到微如說鬼神之為德其盛矣乎視之而弗見聽之而弗聞夫微之顯誠之不可揜如此夫形容鬼神的盛德儒家屬於天天道的德相也說視而弗見聽而弗聞也說到微中庸末章說到知微之顯而結說為德猶如毛毛猶有倫上天之載無聲無臭至矣以如毛來形容微而毛還不免有倫次依佛法還有方分而以上天的載運天道無聲無臭為極則無聲無臭就是耳所不能聞鼻所不能嗅也還是超越於感官經驗的意思總之道不但道家在儒家天道的極則中也達到超越感官經驗的結論二以精來形容道的如老子說道之為物惟怳惟忽忽兮怳其中有象怳兮忽其中有物窈兮冥其中有精其精甚真龍興碑缺此句其中有信這段文中明確的以精來明道但要說明文義先類舉一些文句再作比較的解說老子曾說無狀之狀無象之象是謂忽怳易經說在天成象在地成形莊子說夫道無形無為有情有信這一段文最近老子如將其對列應如下象無象之象象無為怳忽中有物無狀之狀形無形道道精有情窈冥中有信有信怳忽與窈冥不同怳忽似有似無窈冥則深不可見老子說怳忽中有象有物與怳忽的無狀之狀無象之象對讀可見狀就是物易經說在天成象在地成形形與象相對可見形狀物都是同義詞物形狀與象相對又與有精有信相聯依此去讀莊子夫道有情有信無形無為情與精通而為無疑是象的訛寫了形狀物與象是相對的在天成象如古說天象示變之類在地成形形是有形的具體物這二者在物理世界中形是有立體感的具體物象是僅有平面感的如鏡中像水月影天地生人天地代表心與物的二大性質所以在地成形是物質的成為形體在天成象是心的成為意象也可說五識所得的是形物而意識所得的如聯想推想想像都只是心中的意象形與象略與佛法中的色與名相當形與象是似有似無的老子從道的德相說所以道是有無象之象有無形之物的莊子從道的體性說所以無象為無形如對形象而說體精與信是窈冥而不可見的精對粗說如米的糠糩是粗糠糩內在的白米是精所以對表相的形象說精是內在的實質中庸以人道說天道稱為精誠誠也是充實的內在的道體又說有信信是永恆的必然的孔子說天何言哉四時行焉百物生焉古人大抵從自然人事的必然性中想見有道體為萬物所以生成的根源而為人所應遵循的對形象而說道為精精是實體界形象是表象界以精形容道道是超越於形象的也就是不但感官經驗所不能得的物也是意識思惟所不能得的象精是實體是超越於心意識的三以一來形容道的如老子說得一天得一以清地得一以寧等又說混而為一抱一抱一以為天下式莊子傳老聃建之以常無有主之以太一常無有是虛無與妙有老子以此立說不立二就無從說起而歸宗太一太一就是大一老子說字之曰道強名之曰大是絕對的不二一與多相對佛法以二為相待相對的現象不二或一真為絕待絕對的真性然在名言中一是不離於多的沒有多是不成其為一不能稱之為一的所以一已落於名言落於數量所謂纔說絕待早成相待這所以老子以道為一而又說道生一一約常無說這裡應約太一說道是絕對的超越於數量為先於天地萬物而天地萬物從之而生的大原微精一老子從道體說惟微惟精惟一三者的句義相同所以不宜以微形容道而以精一為契道的功夫道心就是志於道合於道的心這不是一般人心所有的所以對人心而說為道心了五論儒與道的執中說明人心與道心的執中先要略說執中的意義在中國文化的開展中隱然的是以允執厥中為最高的指導精神雖然古人或不免偏此偏彼太過或者不及允執厥中不但見於大禹謨也見於論語堯曰論語又說舜其大知也與舜好問而察邇言隱惡而揚善執兩端而用其中於民孟子說湯執中立賢無方執兩用中為中庸庸就是用的原始意義或從用人說或從辨察事理說都要從相對的多方面兩端去求得正確的答案孔子說吾有知乎哉無知也有鄙夫問於我空空如也叩其兩端而竭焉這是執兩用中的具體說明自己沒有執見所以湯無方孔子毋意毋必毋固毋我就兩端不同的事理中深徹竭的理解而達致結論這真是大知智這必須空空如也的一無定執才得這一根本方針與佛法的離此二邊處中說法一樣離二邊的中法是被稱為空相應法的佛法的般若智慧學就是深徹的闡發了這一精神中庸就是用中老子的道是太一而從常無欲以觀其徼虛常有欲以觀其妙去說明雖然同出而異名而可以說虛無是道妙有是德或虛無是道體妙有是道的德用老子以虛無為道虛無就是中所以老子是用無的如說無之以為用又說道沖而用之又弗盈淵兮似萬物之宗大盈若沖其用不窮這是中用的一種說明沖或作盅是中虛的意思中與虛合一從中虛而有用老子又說萬物負陰而抱陽沖氣以為和這是中和的一種說明老子從相對關係中悟解虛無的道用萬物負陰而抱陽陰陽也只是相對的兩端深一層的悟解虛無也就是中了莊子的以無用為大用是依此而更進一步老子說道生一一生二二生三三生萬物這與易的易有太極是生兩儀兩儀生四象四象生八卦的說明有著類似的傾向太極就是太一也就是大中在道太極的開展為天地萬物時易是從陰陽的相對關係去說明所以說一陰一陽之為道一切從陰陽相對的變動去看也達到了虛無的意解如說變動不居周流六虛一切現象不外乎六位的推移而沒有實體所以稱為六虛從變動的觀點去看唯變所適變動不居中的恰到好處就是中就是二五不太過也非不及是此地此時此事的恰到好處人就是要這樣的善用其中易學近於儒孔子的君子而時中正是易意老易不完全一致但從相對關係中理解虛以用中為原則還是一樣的儒者的中庸重於人道以中庸來說中庸是修齊治平以倫常為本的常庸常道也就是最恰當的中道從夫婦之愚不肖也能知能行的平常道而引向廣大精微的聖人的大道由於重人道所以雖結歸於上天之載無聲無臭至矣而直從常人的心行說起喜怒哀樂之未發謂之中中也者天下之大本也沒有偏到的人心為中為本如依佛法說沒有喜樂憂苦時是捨受心地平靜安寧然在一般人大都是無記性在定心中也還是有漏善性雖應由此而階進道心但只是這樣不通過大智的中道是難於進入聖域以平和安靜的人心為中也略有虛靜的意趣中庸成書的時代與老子應有某種關係用中是中國文化的根本原則而在實際的理論與事行中能否完滿的允執其中卻是另一問題因為在自己當時當地的自己下例的立場是恰好的而從家的立場去看可能是偏了在家的立場是中正的如從國的立場說也許又偏了在國的立場是中正的而從全世界全人類的立場去看也許又需要修正了即使在全人類的立場是最恰當的而從全宇宙去觀察時或又只是人類的自以為是了所以在用中的原則下中國文化對人心與道心的是否已完滿的允執其中是應該的可以考慮的道家意解到自然宇宙的大道的惟微惟精惟一是相當深刻的然論到人心與道心的執中顯然的大有問題老子的無為化世以虛無為中是偏於無偏於靜的老子以無為用以柔弱勝剛強以靜制動以屈為申充分流露了反人為的自然精神理想的治世近於原始芒昧的社會老子的處世以樸救文以退為進缺乏光明磊落的剛健所以末流而重於用世的成為權謀的一流重於自修的成為葆真全我的一流末流而託於老子的每不免索隱行怪在中國文化中是不能不成為旁流了莊子以任性為逍遙以不齊為齊以無用為用分別為人之徒天之徒以道者為畸人畸於人而侔於天也就是不合人道而符合天道不能執中於人心與道心這是最為明顯的立場莊子曾說到不願用橰灌水而寧用甕提水因為有機械者必有機事有機事者必有機心機心存於胸中則純白不備吾非不知羞而不為也反對人心的機智可說到了極點而不知道如沒有機心機事又那裡會有甕呢莊子又說泉涸魚相與處於陸相呴以濕相濡以沫不如相忘於江湖這表示仁義的教化不如反樸忘仁義而契於大道而不知道正由於人心惟危人事凌奪而不能沒有仁義正如魚處陸地自然會相呴相濡一樣處於這一現實而高推畸於人的大道如魚在陸地命在不久而高談江湖一樣對人心道心來說這不是執中而是迷真背俗蔽於天而不知人荀子的評語最為精當儒者與道家相反重人道也就是重於人心所以以中用為中庸重於倫常庸言之信庸行之謹從極平常處下手所說良知良能是人類本有的知能夫婦之愚可以與知與能聖人也只是推而充之以喜怒哀樂未發為中是人人共有的是捨受人人所同的人心依佛法說是有漏善生得善生得慧中庸說及其至也雖聖人亦有所不知不能焉儒者所說只是生得的本能的開發生得有局限性的怎麼長養擴充也終於是人心而已儒者所說的聖人只是人倫之聖莊子說孔子行年五十有一而不聞道這當然不能看作信史然說朝聞道夕死可矣確實流露了瞻仰莫及的心境傳說孔子五十學易夫子之言性與天道不可得而聞焉大抵孔子專重人道到晚年也許有所涉及而後學都是重於人道的所以在中國文化中有人道天道自然的道初源於天神觀知人心以外有道心而各以為執中卻都不免蔽於天而不知人或拘於人而不知道人心與道心應該允執其中應樹為正鵠而有進一步的闡揚六佛法的允執其中人心人間是當前的現實無論是寄心大道天國或者現證涅槃依舊在人間佛與阿羅漢們也還是穿衣吃飯生活於人間經上說如來見於三界不如三界所見不如所見是超越一般的但並非不見不是取消了世間所以重道而輕視人心所實現的人事文物制度是不正確的反之人倫常道政治制度等在深入哲學宗教的領域中是永不滿足永不徹底這所以儘管儒家的現實難得而道家的思想永遠有誘惑力顯得沒有永恆的著落必須重視人心依人心而向道心與道心相應體道而不違人心回歸於人生才當得起允執厥中但這是談何容易舉例說人心所觸對的主要是感官的經驗意識也主要為前塵影事人心重於感性人是生活於感性的世界但是道是視之不見聽之不聞搏之不得超越於感性經驗感性經驗中的事物在科學哲學宗教中儘管有更深的理解而仍不能離於感性的生活例如太陽我們所見是早出東方暮落西到了科學研究理解為太陽不動而地球在動在哲學或理解為相對的動靜了到了道宗教的體驗中或證實為什麼都如如不動然而科學家哲學家宗教家如抬起頭來看看天色也許現在都看手上的錶了都是說太陽快要落山了還是面對那個感性經驗的世界所以日常的感性經驗如何才能通入超感性的經驗達到超感性的境地為什麼無礙於感性的經驗在理解中在實踐中應都有允執其中離卻二邊的中道五識所了別的是物意識所了別的是象人類的一切知識一切文化都通過人心的形象而開展出來人心是這樣的形象界名言界可是道可道非常道強名為道為大而實非形象名言所及的精這樣人心是名言不離名言如何能依名言而透出名言而得離言的現證見道呢同時現證不落於形象名相又怎麼能即真而俗無礙於無邊事理的徹了如量智或名盡所有智呢道家知道體無名因而輕視知識以古人的經傳為糟粕或者專在六經章句中論道都是一邊佛法聞而思思而修與儒家的博學篤行的方法相近而佛法的修行依名言而趨證離言證離言為如理智而如量智善達如幻名言這才是執中呢佛教在中國受道家影響所以也有呵教勸離偏談自證失佛法中道的流派人心是差別界有善惡有邪正仁義等道德是人類文化中的重要部分雖在不同的思想中見解不一而離惡向善離邪向正始終是人類的共同理想超凡庸而進入聖域也是宗教界的共同希望然而道是一在絕對真性中這些都難以分別不要說大道就是在物理科學的實驗室中人類文化中的善惡邪正也是一無著落反而有善就有惡有正就有邪偽道學更利用仁義來為私為我天下更紛亂了所以老子說大道廢有仁義莊子盜跖篇更盡情的醜詆仁義還有道是一不但是有情是人無情的草木土石在絕對中也都是一樣佛說一切法皆如也莊子說道惡乎在莊子曰无所不在東郭子曰期而後可莊子曰在螻蟻曰何其下邪曰在稊稗曰何其愈下邪曰在瓦甓曰何其愈甚邪曰在屎溺從宇宙的立場來說道是超越於人道的不過老莊都不免偏於天道在佛法中從離惡行善的進修中證於無善無惡的法性然在法性無差別中卻非廣修眾善不可如金剛經說是法平等無有高下以修一切善法故得阿耨多羅三藐三菩提這是人心與道心的折中這決非高談自證而放侈邪僻者可比同樣的真性是無分於有情無情也無分於天人鬼畜而佛教為人說人間才有佛法唯有人才能發大菩提心道心唯有人心才能通入於道心這是怎樣的允執其中佛法可說一切都是中道主自己修證而過著集團僧伽的生活這是與老莊的隱遁獨善根本不同處真性無二無分別而從精嚴分別的法相中去悟入佛法為什麼能真俗無礙世出世間無礙能處中說法而不落於兩邊呢這是真正值得重視值得研究的大問題如從佛的證覺說這是從菩薩不共世間中道妙觀而來從佛的說法說這是依緣起為最高準則緣起通於一切為一切法的普遍法則處於中道而說的緣故人心惟危道心惟微惟精惟一允執厥中這種依於人而向於道的根本立場我以為佛法是相同的在根本佛法大乘空有的法輪中才真正的完滿的顯示出來民國五十八年三月三日脫稿於星洲般若講堂
