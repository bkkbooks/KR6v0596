為信仰對象而認為是神或有神主宰這些事物如日神月神雷神風神水神火神山神地神泉源之神牛神猴神蛇神花神樹神穀神酒神灶神等等總之以自然界的具體事物為信仰的都可名為自然宗教社會宗教如我國的祭祀祖先祭祖本為種族繁衍的意欲表現一般人都希望兒女眾多家族繁衍祖父兒孫的相續不絕表現為祖先的崇拜若說祭祖只是為了追念祖德事實上決不但是如此的古代社會都有此種族繁衍的宗教祭祖並不止是中國古代家裡供有長燃的火象徵種族生命的延續而祖先的祭祀即在此舉行火供如弟兄分家種族析居即將此火分燃祭祖與此家族火的祭供完全是同源的中國的祭祖教是祭近不祭遠的一般家庭只祭祀三代宗親更遠也不過七代而猶太教基督教的崇拜耶和華論理也通於祭祖的宗教不過他們是祭遠不祭近的他們崇拜的耶和華是人類的父老祖宗天主教廷曾下令信天主教的不得祭祖宗可是禁了又許許了又禁現在又准許信教的祭祖了這只是為了減少我國民眾的反對便利推行宗教而已依宗教說這是矛盾的不合理的因為祖先崇拜所包含的宗教要求是種族繁衍到永遠而我國一般的祀祖大抵存有祈求祖先默佑的意義古代宗教雖是多神的自然宗教然都含有社會宗教的意義因為古代的宗教都是氏族的宗教耶和華是以色列人的上帝本是以色列的保護神與外邦人無關如日本的神教我國古代的帝上帝炎帝等印度的婆羅門教都是從多神中演化出的大神雖看作宇宙主但還是一族的祖先社會宗教的祖神成為團集一族一國的巨大力量所以社會宗教是極普遍的家族的國族的一鄉的一邦的一國的全世界的凡有家族或國家形態的神世界都有此意義不過中國式的祖先崇拜最顯著與自然自我宗教不同而已宗教進步到自我宗教時必有偉大的宗教家出來創新而使宗教成為全世界的如印度有釋迦猶太有耶穌阿拉伯有謨罕默德等我國的墨子孔子老子等政治的意味重對宗教不能有偉大的貢獻等到創新以後成為世界的宗教雖依舊不離社會宗教世界性的的內容而著重於自我的淨化自我的自由了自我宗教人類是要求自我生命的永恆福樂平等自由智慧慈悲的耶教回教佛教印度教中的吠檀多派等都著重於自我的淨化完成都屬於此類或稱之為精神宗教不一定恰當因為在高級宗教中的人類意欲不但是心靈的淨化而且還是自身的圓滿如佛教不但是法身的悲智莊嚴而還是色身的相好圓滿中國的道教有性命雙修的佛教是定慧雙修而密宗更著重於天色身精神與肉體的淨化都同等重視佛教是無我的宗教但緣起如幻的我不但不否定而且還依此以成立生命之流自我不但是心的是心色的總和所以稱為自我宗教該括得更完備些自然宗教為人類意欲表現於自然界的顯示了人類對於自然的態度社會宗教為人類意欲表現於社會界顯示了人類的社會性自我宗教為人類意欲表現於自己身心而顯示了怎樣的傾向於身心淨化自我完成自我宗教是最高的如傾向於個人自由與唯心會逐漸漠視社會的意義色無色界的梵我教與自心教明顯的說明了此點所以佛教的人間性人間成佛才從自我宗教的立場含攝得社會宗教的特性原始佛教的僧團組合便是絕好的例證由於佛教是無神論的所以社會觀是平等的民主的自由的基督教為一神教所以社會觀從天國及教廷制看來宛然是君主的模樣我以為英國式的君主立憲最能反映一神教的社會意義六宗教之價值強化自己淨化自己宗教對於人類究竟有什麼價值價值當然不止一種然宗教的真價值在使人從信仰中強化自己以勝過困難淨化自己以達成至善的境界他力的神教以依賴他而強化自己為主如希望豐收田作好於是祭社稷等出海航行或捕魚要免除風浪克服風浪的艱險於是祭天后等如有瘟疫而祭瘟神有蝗災而祭蝗神久雨求晴久旱求雨以及求財富求兒女求夫婦和好求戰爭勝利都以為外有主管此事的神或宇宙大神因祭祀祈求而可以得到問題的解決更有因信而治愈疾病因信而得脫災禍都以為從宗教的神力中獲得支持獲得援助使自己減少障礙勝過困難人類知識進步知道並不全由於神的意思神的力量需要盡著人為的努力於是祭祀的方法齋戒沐浴等都成為宗教內容如祈禱而需要心地真誠等等到知力更進步才明了宗教的真意義一切在乎自己不但自求多福就是某些外力的護助也是自力自善根熟或自心誠切的感召必須經自己而表現出來宗教引發人類堅強自己的力量異常強大如身體有了疾病家國有了危難每能從信仰中激發力量而渡過危險古代的戰爭每以宗教來鼓舞戰士所向無敵又如人作了錯事犯了惡習想改悔而不可能因為自己每是怯弱的因循的如發起宗教信仰即能堅強自己不再受惰性的支配不再受環境的牽制豎起脊梁來重新做人學佛的在佛菩薩前發願修學無形中引發強化自己的力量作不到的事也順利地完成了不容易戒除的也完全戒除了這是宗教對於人類的一種重要貢獻即從順從而來的力量有人說信仰宗教自心得到安慰這不過是自我陶醉而已甚至惡意的把宗教看成鴉片其實宗教對於失望悲哀者無論是名場利場情場種種場所的失望者給予安慰給予創傷的恢復使他堅強自己現起了前途的光明而從險難中渡入平安這不是鴉片而是維持生命的必要營養在營養不良者特別感到需要而已此外宗教於人類有淨化自己的力量這特別是自我宗教著重於超脫的宗教耶教說人是有罪的如覺得自己有罪而懇切悔改在耶穌的血中洗淨了罪惡得到重生從此能去惡行善愛人如己一直到永生佛教說無始以來眾生所作的善或惡業非常多所以常受生死的苦果而業由煩惱而來所以要從人的內心淨除煩惱把不正常的感情意志思想統統地淨化一番從根糾正過來這才能走向合理而光明的前途逐漸的圓滿而成賢成聖若但是祈求懺悔不從自心去淨化煩惱那雖然薰沐在宗教的生活中多少淨除內心的穢染而到底不能徹底不能實現宗教的最高目的宗教的信仰引導我們走向光明的至善境界即是不斷的淨化自己凡是高尚的宗教都重視這點都有此作用佛教不過更徹底而已一些世事順利生活豐樂身體健康而自以為滿足的對宗教不大熱心少能知道宗教的重要性唯有經歷了人間的苦難理解世間的不自在自己的缺陷太大才能誠信宗教於宗教中得新生命耶穌說他自己是為拯救罪人而來佛說是為了眾生有老病死貪瞋癡病而來對於認識自己有缺陷者對於失望悲哀者宗教更能表現其力量然從宗教本身說誰不需要強化自己淨化自己呢反宗教者與非宗教者只是失去了理性打腫臉充胖子而已七宗教理想之實現永生無生新生凡是高尚的宗教無不以自由平等福樂慈悲等為理想而要求實現要實現這些理想有一根本而主要的即生的實現生是生存世間的一切希望福樂都根源於生存沒有了生存一切都不存在了所以一切宗教所理想的也著重在這根本論題希望不是死了完了而是生之永恆道教說長生耶教說永生其他高尚宗教都以此永恆的生存為基本理想基於生的永恆延續而有自由平等福樂等為人類意欲所表現的宗教理想人生的最高理想這一切如世間而可以使人類滿足獲得那宗教就可以取消了否則宗教會永遠的存在有些人想以哲學美術來代替宗教宗教不是暫時忘我或自我陶醉這些那裡能代替得了科學無論怎樣的進步也不能滿足實現人類的最高理想從人類意欲中有意無意的流露此崇高理想使人嚮往而前進去實現的是宗教的獨特內容所以決不可隨便抹煞或以為科學進步宗教就會過時而用不著了在宗教中有一看來似乎相反而其實可通的問題如道教說長生耶教說永生而佛教卻說無生一般人聽到無生就有些害怕甚至誤會佛教是反人生的毀棄人生的不知道泛泛地說永生不見得就是理想的耶教說人死了有兩條路一是天國一是地獄生天國是永生墮地獄何嘗不是永生不過是生於地獄歷受大火所焚燒因而稱為永火罷了例如希望長壽如真的活到一百歲以外而沒有兒女沒有資財多病多痛多災多難這樣的長壽不死才是活受罪呢所以永生長壽的延長雖是人類的共欲而不一定是理想的依佛法說我們的生命從來就是延續的永久的是不需要希求而必然如此的可是我們永續的生命有著本質上的缺陷障礙不自由無始來的生命永續包含著苦痛的必然性一直在哭哭笑笑忽苦忽樂的過程中真是一種無可奈何的苦惱這樣的永續下去決非我們所理想的所以有此本質上的苦痛缺陷根源於內心存在的錯亂無始無明這才起惑造業招受苦果生的延續我們要得真自由真平等真福樂必須對於現實的生存徹底革新一番使自己的身心起一種質的變化從情識中心而轉為智慧中心的這才不會錯亂下去永遠繞著造業受苦的老路子因此佛教說無生是比一般宗教更深一層的是徹底否定那充滿苦痛不自在的情本的雜染生不是否定算數是實現為無限安樂自在的智本的清淨生我們平常說打得念頭死許汝法身活經上也說一切法不生則般若生古代的大德們都說要大死一番才得大活自在所以佛說無生不是死了完了是要在現實人生中徹底的來一番自我革命使自己實現為無限清淨的慧命這樣的無生新生要在現前去實現假使根基成熟的話並非一切都寄託在死後的未來耶教也有此種情形就是重生重生才能得救這不是一般的信仰就夠了必須深切的信仰徹底的悔改從禱告中引發內心的特殊經驗覺到受著神的恩典完成了人格的改造從此獲得了新生重生者才是將來天國的永生者這種身心轉變的自覺經驗佛教徒在受戒時入定時慧證時都可以引起得著淨化身心的經驗佛教的信行就是從不斷的新生中從淺而深的完成最高的人生理想現存的高尚的宗教都是反省自己的要實現自己身心淨化的殘忍化而為慈悲愚癡化而為智慧懦怯化而為勇猛矛盾與動亂化而為和諧安寧要實現此一理想耶回梵佛教都是一樣的不過淺深偏圓不同而已說永生容易誤會為現有生命的永續或者變質為庸俗的功利的天國享樂者說無生又每被誤解為毀棄人生從宗教的真實意義來說從現實生存的不斷新生中以進達究竟圓滿才是永生與無生的真意也就是宗教最高理想的實現自我宗教不是別的只是人類自己意欲的表現自己的要求新生雖有以為獲得他力的加被拯救而實是自力自救唯有自己才能救自己學佛而不能了解這點不過修集人天福德說不上了生死何況學菩薩成佛如不能理解這點專從儀式信條去著眼以為宗教的舉措充滿迷信浪費財物或者說欺騙幻想那是最大的錯誤在人類社會的發展中宗教能不斷的普遍不斷的成長即由於宗教是人類智慧的產物是人類理想的特殊表現印度是文明早熟的國家宗教界一向發展得極高有梵我唯心等高尚宗教不再是儀式作法與神權所限了釋迦牟尼佛出生於二千五百年前的印度由大徹大悟的自證樹立了偉大精深的佛教正覺的宗教一直提供了人類新生的最佳方法對於宇宙人生的見解從佛心正覺而流露出來的到現在永遠是嶄新而進步的平等民主與自由的合情合理的我從佛法來研究認為佛法是宗教但是宗教中的最高宗教而不能以神教的眼光去看他希望宗教同人對宗教有確實的信解從本身的充實淨化做起唯有人類自身的新生淨化才是宗教的真實意義才能促成社會的真正進步實現宇宙的莊嚴清淨
