body:
  text: 一我之宗教觀我是佛教徒我之宗教觀是以佛教的見地來看宗教看宗教的價值看宗教的淺深不同從世界史去看沒有一個民族沒有宗教信仰從古代到現在也沒有一個時代沒有宗教如宗教而沒有深刻的充足的根據與人類生活沒有密切的關係宗教是決不會如此普遍而悠久的宗教在人類社會中有著重要的地位這決不是那些反宗教者所能打倒也不是非宗教分子所可以漠視宗教於人類的正常生活可說是不可分離的人類的宗教信仰決不是閒家計不要聽到宗教就以為是迷信大家應以諒解的同情去了解他或者進一步的去接受他一宗教之意義自證化他一般反宗教者與非宗教者以為宗教是迷信是人類愚昧的幻想但在我看來宗教是人類的文明根源是人類知識發展以後所流出可說是人類智慧的產物一般動物鳥獸蟲魚牠們缺乏高度的明確意識豐富的想像也就不會有宗教唯有人類由於知識的開發增長從低級而進向高級宗教也就發展起來從低級而不圓滿的漸達高尚圓滿的地步這種從淺而深由低級而高級與一般文化及政治的進展都表示著平行的關係如政治從酋長制的部落時代到君主制的帝國時代再進到民主制的共和時代宗教也是從多神的宗教進步為一神的宗教再進展為無神的宗教古代與現代遺剩的低級宗教不免有迷妄與錯誤但不能因此而否定宗教正像不能因某種政制的不夠理想而就取消政治宗教是依人類知識的漸次提高而漸次改善與提高的所以我們應信受高尚的宗教佛教為人類最高智慧所成立佛是一切智者在一切宗教中像明月在星群中一樣在過去佛教為了適應部分的眾生有許多不了義的方便但這無損於佛教的真義正直捨方便但說無上道本是佛教應有的精神總之一切宗教都是有助於人類的於人類有過偉大的貢獻一切宗教都應以同情的眼光去了解他何況現代存在的高尚而偉大的宗教近代的宗教一詞由譯義而來西方學者依著他們所熟悉的宗教給予種種的解說現在我依佛法的定義來解說宗證與教出於楞伽經等意義是不同的宗指一種非常識的特殊經驗由於這種經驗是非一般的所以有的稱之為神秘經驗教是把自己所有的特殊經驗用語言文字表達出來使他人了解信受奉行如釋迦牟尼佛在菩提樹下的證悟名為宗佛因教化眾生而說法名為教我們如依佛所說的教去實行也能達到佛那樣的證入宗所以宗是直覺的特殊經驗教是用文字表達的依此凡重於了解的稱為教重於行證的名為宗這樣的宗教定義不但合於佛教其他的宗教也可以符合即如低級的宗教信仰幽靈鬼神這種幽靈鬼神的信仰其初也是根源於所有的特殊經驗而來又如猶太教基督教所信仰的耶和華也是由於古代先知及耶穌的特殊經驗而來基督徒在懇切的祈禱時每有超常識的神秘經驗以為見上帝或得聖靈等這就等於是宗加以說明宣傳使人信受就是教凡是宗教都有此二義反宗教及自以為非宗教者不能信解宗教的特殊經驗以為只是胡說亂道捏造欺人或者是神經失常幻覺錯覺不知道宗教決不是捏造的假設的心靈活動的超過常人起著進步的變化又有何妨宗教徒的特殊經驗說神說鬼可能有些是不盡然的然不能因此而看作都是欺騙各教的教主以及著名的宗教師對於自己所體驗所宣揚的都毫無疑惑有著絕對的自信在宗教領域中雖形形色色不同但所信所說的都應看作宗教界的真實即使有與事實不合的也是增上慢自以為如此而不是妄語如基督徒的見到耶穌見到上帝或上帝賜予聖靈等他們大都是懇切而虔誠的如佛教徒的悟證以及禪定的境界見到佛菩薩的慈光接引等都是以真切的信願經如法修持得來這在宗教徒內心是怎樣的純潔而真實決非有意的謊言以宗教為生活的當然有欺謊的報道唯物論者斷滅論者於宗教缺乏信解的同情以為決無此事或者如古人說聖人以神道設教而民從之古代確有利用宗教作為利用人民統治人民的事實然如以為宗教就是這些聖人造出來的那是太錯誤了二宗教之本質人類意欲的表現一般以為世間的宗教雖信仰不同儀式與作法不同但簡括的說宗教不外乎神與人的關係例如一神教以為神或上帝對於我們是怎樣的慈愛我們應怎樣的信仰他才能得到神的救拔然而這樣的宗教形式與內容不能該括一切宗教依佛法說宗教的本質宗教的真實內容並不是神與人的關係宗教是人類自己是人類在環境中表現著自己的意欲宗教表現了人類自己最深刻的意欲可說是顯示著人類自己的真面目然而這幅人類自己的造像由於社會意識的影響自己知識的不充分多少是走了樣的在人類從來不曾離開愚蒙的知識中將自己表現得漫畫式的雖不是寫生的攝影的看來卻是再像不過宗教是人類自己的意欲表現意欲是表現於欲求的對象上經自己意欲的塑刻而神化如在多神教中對於雨人類或希望他適時下雨或希望他不要淫雨但對雨都起著力的神妙的直感於是乎從雨是有意欲的活生生的像自己進展到有神在主宰雨一切自然現象社會現象都如此而且不但依照自己意欲而且依據人類的集合社會形態而山水城鄉的神世界逐漸的開展出來人類從無始以來在環境的活動中一向向外馳求所以起初的意欲表現都表現在外物而不曾能表現自己也就不曾能清晰地表現自己還有天真的兒童知識不曾發達等到長大了社會影響下的世故也深了在社會中有不能不隱蔽自己的苦衷覆藏自己的真意覆藏自己的錯誤覆藏自己的罪惡久而久之真的連自己也誤會自己了這在高尚的宗教中才著重自己清晰地將自己表現出來人類在宗教中吐露了自己的黑暗面佛教稱之為煩惱業基督教等稱之為罪惡而自己希望開展的光明面也明確地表達出來高尚宗教所歸依所崇信的對象不外是永恆的存在完滿的福樂絕對的自由無瑕疵的純潔這在基督教信仰的上帝即說是無始無終的永恆絕對自由完善的福樂圓滿而聖潔的在佛教中佛也是常住的妙樂的自由自在的究竟清淨的可以說凡是高級的宗教都一致的崇信那樣的理想這究竟圓滿的理想如佛陀又是最高智慧的成就者有廣大而深徹的慈悲勇猛的無畏這都是人類希望自己能得到的人決不甘心於死了完了永遠的存在而且存在得安樂與自由智慧與慈悲人類有達成此圓滿究竟的意欲即以此為崇仰的對象而希望自己以此理想為目標而求其實現總之宗教所歸信崇仰的是人類自己意欲的共同傾向這種意欲的自然流露從何而來這裡姑且不談而人類有這種意欲卻是千真萬確的在人類的知識不充分時傾向於外界時意欲的表現也不完全也表現於自然界知識越進步越是意識到宗教即是人類自己意欲的表現越完全也表現於人類自身所以宗教的形態儘管不同而一切宗教的本質卻並無兩樣一切都不外人類自己人類在環境中表現著自己的意欲在這裡可以指出神教與佛教的不同點一般神教都崇信人類以外的神在一神教中以為神是這個世界命運的安排者人類的創造者神照著自己的樣子造人但在佛教中以為崇信歸依的佛聲聞等是由人的精進修學而證得最高的境地者以此來看宗教所歸信的並不是離人以外的神神只是人類自己的客觀化表現於環境中人類小我的擴大影射到外界想像為宇宙的大我即成唯一的神因此人像神不是神造人而是人類自己照著自己的樣子理想化完善化而想像完成的佛教有這樣的話眾生為佛心中之眾生諸佛乃眾生心中之諸佛眾生人信仰歸依於佛是眾生自己心中所要求實現的自己所以佛弟子歸依佛歸依僧卻要自依止依自己的修學去實現完善的自己佛是人類修證而圓成的然我們人類所知道的還是要經人類知識的再表現經上說佛陀隨類現身是為怎樣的眾生現怎樣的身相人類從自己去認識佛這是真實的如日本人造佛像每留有日本式的髭鬚緬甸的佛像人中短活像緬甸人而我國的造像如彌勒的雍容肥碩恰是我國人的理想型而觀音菩薩為一般女眾所信仰時逐漸的現出柔和慈忍的女相來所以佛隨眾生心的不同而有不同的應現佛說法也如此佛以一音演說法眾生隨類各得解隨各人所要聽的隨各人的興趣知識不同對於佛的教法起著不同的了解宗教是人類自己的意欲表現於環境中不平等而要求平等不自由而希望自由不常而希望永恆不滿愚癡而要求智慧不滿殘酷而要求慈悲當前的世界斷滅論流行不平等不自由到處充滿了愚癡與殘酷該是宗教精神高度發揚的時節了人類都有此願欲而唯有在宗教中才充分地明確地表達出來不但佛教如實的認識自己認識自己的宗教歸仰而努力於自己的實現一般宗教特別是高尚的宗教梵教耶教回教等也都能表達出崇高的理想輝煌的神格由攝導人類自己向這一目標去努力三宗教之特性順從超脫宗教是人類在環境中表達自己的意欲表達自己的意欲於環境中所以宗教有兩個特性一順從二超脫西洋的宗教偏重於順從他們的宗教一詞有約制的意思即宗教是接受外來某種力量神力的制約而不能不順從他應該信順他但單是接受制約是不夠的依佛法說應該著重於超脫的意思人類在環境中感覺外在的力量異常強大自己覺得對他毫無辦法非服從他不可如自然界的颱風豪雨地震海嘯以及大旱久雨等還有寒來暑往日起月落也非人力所能改變深刻的影響人類此外社會的關係社會法制人事牽纏以及貧富壽夭都是不能輕易改變的還有自己的身心也使自己作不得主如失眠愈想合眼而愈是睡不著性情暴躁才賭咒發誓地要立志改過可是話還才說完又會照舊發作起來這種約制我們影響我們的力量是宗教的主要來源引起人類的信順信賴神力山神水神風神五穀之神乃至戰爭的勝敗也覺得有神力在那裡左右著這些控制或操縱自然與社會的力量似乎非順從他不可順從可以得神的庇祐而安樂否則會招來禍殃或信仰命運之神的安排所以一般的宗教每以信順為根本的專重在順從會覺得自己渺小而無用然而自己卻決不願如此所以順從雖是宗教的一大特性而宗教的真實卻是趣向解脫是將那拘縛自己不得不順從的力量設法去超脫他實現自由超脫外來束縛的宗教特性就是神教極端信仰順從的神教也還是如此對於自然界社會界或者自己身心的障礙困難或祈求神的寬宥祈求神的庇護援助或祈求另一大力者折伏造成障礙苦難的神力或者以種種物件種種咒術種種儀式種種祭祀求得一大力者的干涉保護或增加自己的力量或者索性控制那搗亂的力量或者利用那力量這一切無非為了達成解除苦難打開束縛而得超脫自由的目的在現在看來神教的向外崇拜多少是可疑了因為人類知力的進步對於自然界的威力自然界的性質已逐漸從自然本身的理解中加以控制改善利用社會界的動亂障礙不平等不自由也逐漸從政治組織經濟制度等加以調整還不能完全達成目的這是知識的不充分人類自己的問題沒有解決而決非宰制自然與社會的神力問題了人類自己身心的不自在一切病態的魔力在高尚的神教中也在信神的