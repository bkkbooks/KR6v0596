body:
  text: 二中國的宗教興衰與儒家中國的傳統文化過分著重於當前事實所以宗教的情緒一向不夠熱烈特別是在理學支配下的時代中國固有的民族宗教如古典的書詩禮易春秋諸子一分等所傳説的是上層的王侯士大夫的宗教諸子傳説的一分與山海經等所傳説的有著較遲的民間的庶民宗教的成分中國的宗教觀老早就適合於宗法制父家長制階級制祖宗的崇拜最為普遍但著重於近親的三代七代所以如創造神教人類之父的思想不能發達而最高神只是帝王天子民族長子的意味的宗教特權天是象徵宇宙的統一神上帝是民族的祖先由於民族的代興帝也就有赤帝黃帝白帝等帝王以自己的祖宗配天配上帝使本有宇宙大神民族祖神的神格在祖宗的祭祀中沖淡了諸侯依封地所在而祭名山大川庶民不過祭祖宗祭里社土地廟祭灶等而已禮不下庶民上層的宗教也是庶民無分的天神地祇人鬼有著多神教的特色而被組織化層級化織成秩然有序的神界適應於政治的封建世界我的故鄉有諺語説風吹箬帽告訴天天高皇帝遠中國一般平民對於政治與宗教上的帝王與天神可望而不可及關係確是那樣的非常鬆弛中國宗教的又一特質是世俗的這因為停滯於自然宗教的緣故以人間罪惡苦痛而求生天國以世間為虛幻而尋求解脫這種西方式與印度式的宗教在中國不能發展成長生天與自我解脫的宗教要求在以自然哲學為基礎的道家中發展為神仙説也還是充滿人間現實樂的內容天地人間有著高尚宗教成分的神格被局限為上層者的宗教而民間信仰祭祖祭灶而外始終為鬼教與巫教的領域中國宗教的分化就是政治上大人與小人的分化勞心的治者與勞力的被治者的分化宗教的精神始終是世俗的功利的如宗教精神墮落就是賄賂的然而不管如何中國古代到底是有宗教的從渾融的民族文化中首先分化出而成為大宗的是孔子所代表的儒家儒本是宗教師如以主持婚喪禮節為職業即是小人之儒而傾向於現實的教育與政治這雖是上層的大人之學但促進中國文化的普及民間有著不可磨滅的功績整理古典從事政治教育這使得儒者所代表的成為中國文化主流孔子是儒家的大成者對於上層的宗教信仰也是有的如迅雷烈風必變鄉人儺朝服而立於祚階等都可以看出他有某些宗教情緒然而在他傾向於現實的政治與教育中孔子雖不是反宗教的卻有非宗教的濃厚色彩未能事人焉能事鬼未知生焉知死子不語怪力亂神六合之外聖人存而不論雖尊重祭禮但不説神在而説如神在凡有關宗教的宇宙的來源死後的命運鬼神的情況神祕的現象這都被孔子置而不論敬鬼神而遠之確是孔子以來的儒家精神特別是聖人以神道設教充分表示了不知宗教是什麼但知利用宗教作為統治愚民的工具這種非宗教的功利觀與唯物論者的宗教觀實在看不出什麼不同孔子的時代以來民間的文化大大地提高在政局的混亂變革過程中由於王綱失墜而天子獨占的宗教失去了尊嚴社會的文化發達造成諸子百家的戰國時代宗教色彩特濃的如墨家的敬天明鬼老莊的久視真人説陰陽家的符讖五行説在戰國時代有著進一步的發展江淮一帶的黃老之學全真葆命趨向於獨善的隱逸這與燕齊一帶的方士道都是後來道教的主要根源道教是在這些上綜合民間的巫教而形成的實為中國民族宗教的大雜膾當時的儒家從中庸到孟子唯心的形而上學大有進步也重視身心修養周秦間的儒者結合了陰陽五行符讖加深了神祕的氣息戰國時代的諸子不但儒與法重視現實的政治道家與墨家也還是不離治國平天下道家是天子南面之術而陰陽家的五德終始説也與政治的變革要求相呼應此外儒家仰慕西周的政教而高推堯舜的禪讓墨家本出殷宋而高推夏禹道家高推黃帝而許行他們更高推神農除了法家的法後王而外大家都披上一領復古的外衣儒家的孟子是值得注意的人物在儒家中他不大重視禮樂而好談身心性命孔子還推重管仲而孟子偏重王道羞談霸業孔子説性相近也而孟子偏説性善他不但弘道而自認為衛道者大罵楊朱墨翟以為無父無君是禽獸也儒者的中道精神代以偏激的唯心論對於未來的宋儒起著重大的示範作用從秦到漢初政治是道家而兼法家宗教方面為道教根源的方士道非常隆盛秦始皇淮南王漢武帝都是方士道的信仰者他們有充沛的生命力豐富的想像力秦皇是六國的統一者漢武是北逐胸奴西通西域的雄主淮南王也有帝皇的企圖他們渡著神祕的宗教生活而事功卻非常卓著宗教是近於道的學術是以道而統百家的中國文化燦爛的時代大統一大擴展的時代並不屬於儒者儒冠儒服的儒者多少有點保守拘泥煩瑣的禮儀言必稱堯舜即使不是復古的也是重古的這是不能適應當時混亂與不得不變改的時代總算叔孫通通權達變這才憑一套尊君的禮儀取得政治一席地漢武帝是方士道教的信仰者文化上卻來一次獨尊孔子罷斥百家我以為儒家隆盛到成為文化主流應追謝秦皇的以吏為師焚書坑儒實在也是陰陽符讖化的一般學派經這一番打擊經多年戰亂都衰落了而古代典籍的保存研究虧了重視古典的儒者而傳續下來在文化領域中儒者無形間取得了優越的地位無為而治的道家政治因人口增加經濟繁榮而顯得紊亂謹慎老成廉潔忠實的儒者在帝王心目中一天天被重視起來然而兩漢的儒者與孔子的非宗教精神並不相合他們神化了孔子以為孔子預為漢家立法五經的緯書也出來了符讖也被尊重論休徵天人合一的董仲舒是代表者取得政治權威的儒者是一般宗教化的雖然宗教的見解並不高明這樣的儒者王莽是有數的人物他模倣周公實行禪讓復古但終因拘泥古制不達治道而完全失敗從此以來儒家的理想政治再也不曾嘗試過戰國以來的道家陰陽家到漢代逐漸形成有組織的道教張魯張角張修都是大同小異的他們所重的是祭祀祈禳懺悔厭勝符水治病預言世界大亂豫人類以光明的遠景導引吐納辟穀的長生術是獨善的一流也與此相呼應一方面專守經學的儒家崇古拘禮引起一分學者的不滿這是重文學重事功重後王學覽百家的通人這有著道家的氣息大抵不信讖緯等迷信也不信方士的神祕為玄學與清談的前驅漢儒的迷妄固陋逐漸蛻變緯讖也被廢置了加上漢末的黨禍急劇的沒落下來漢末以來的道教經葛洪陶宏景寇謙之他們一方剽竊佛經一方創作漸與玄學相融合他們稱天師使帝王受天的符命但一般社會的宗教活動不外符水祈禳或吐納燒練的長生術佛教起初與道教相並而行等到不斷傳譯而充實興盛以後南朝的玄學為佛教的義學所代替北方朴實而重事功道教與佛教相爭佛教受到多次打擊但還是日漸壯大從漢末到唐初宗教方面全為佛教與道教唐代更有新來的景教摩尼教等這都是一般的平等的宗教中國古代的階級宗教毫無力量政治上學問上儒家雖有強大的地位然真能代表儒家的並不太多除少數唯物論者如神滅論者范縝而外都接受佛教與道教的信仰而第一流的學者屬於佛教從漢到唐儒家雖一度獨占然非宗教精神始終不曾起重大作用儒家所保存的古代傳來的宗法的宗教王侯與庶民分別的宗教不能支配社會人心人類的宗教要求貧乏的功利的道教不能適應人心外來的佛教這才一天天發達發達到籠罩一切的領導地位儒佛道雖有多少爭論而真能互相協調豫社會以合理的推進屬於這一時代漢末以來的變亂到隋唐而再度統一隆盛擴展隋唐融攝著極多的外來文化而籠罩一切吐納衆流的指導精神不外乎佛教與道教中國民族的充實與擴展等到唐武宗的毀滅一切外來宗教開始非常的復古的劇變唐代為一華戎混融的大帝國攝受了甚多的外來文化重用了附屬與歸化的邊族人士其後引起安祿山的叛亂藩鎮的跋扈特別是回紇的非常騷擾五代的混戰局面也只是這一局勢的延長與擴大在這種情況下啓發了中華民族主要為儒者的反抗在唐的國力衰退中由於壯丁逃避財政困難佛教首先受到注意早在憲宗時代韓愈便以衛道自任開始反佛教反佛老的運動他雖只是一位詞章仕宦的文士根本代表不了儒家但引起的影響卻非常深切從民族精神的自覺説是有價值的但結果發展為排斥一切外來文化演進到獨尊孔子的新時代這對於中華民族不免利弊參半而且弊多於利了北魏以來的佛教發展出漠視經教的重行學派一是曇鸞道綽善導以來的持名念佛一是達磨門下到六祖而大盛的參禪念佛非常普及在一般民間影響很大這是通俗的他力的佛教偏重信願禪主要是傳授於出家的僧衆間這是重實質的自力的佛教偏重智證還有偏重悲行的三階教受到政治的壓迫而衰歇了與經過秦皇的焚書坑儒而儒家演進為中國文化主流一樣經過唐武宗的破滅佛法禪宗也就演進為中國佛教的主流在內亂頻仍中民生凋弊毀法而後寺院經像的恢復不容易臺賢唯識等都衰落了獨有禪者山邊林下到處安身深入東南山地闢土開荒講求經濟自足以法堂代佛殿過著專精篤實淡泊強毅的出家生活雖然對於中國文化佛教義學的理解不足但憑他的特長與當時環境的適應取得了代表佛教的領導權北宋的佛教雖也有天臺與賢首宗的復興而主流還是禪宗當時自稱上承堯舜禹湯文武周公孔子道統的理學開始興起了但推行新政新學的王安石蜀派的大小蘇都還是儒佛並重的作為理學主流的洛派在程伊川被貶以後弟子們都還是傾向禪宗由於金兵侵入而到達南宋時代國族的危機更深理學也更隆盛而完成佛教也就慢性的衰落下來説到理學當然是儒家在易大學中庸孟子的思想基礎上融攝了道學與佛學特別是佛教的禪宗發展為體系嚴密內容充實的理學理學與禪者的關係我曾説過宋代理學巨子之故鄉十九為四百年來南禪盤根錯節開化之區理學家之精神作風無一不出於自信自尊重質輕文體道篤行雄健精嚴之禪風如程門師資之往返有類參謁居敬窮理明道統有語録亦類禪宗象山之即心即理明其在我一掃注疏之繁唱六經為我注腳則尤近矣禪宗自有他的偉大處但他偏重心性的體證過著山邊林下的淡泊生活有著急了生死的精神雖自稱為教外別傳的最上乘而作風卻活像聲聞行徑無邊佛法被狹隘為佛法無多子深邃的義學精密的論理都被看作文字戲論而忘卻了這是佛教中偏重智證的一流晚唐以前禪宗都還重在僧衆間其後廣泛的為一般學者所愛好在這種風氣中儒者不能不接受他而又從兩方面抗拒他一由於異族憑陵所激起的民族感情下意識地輕視印度傳來其實早已成為中國文化內容的佛教二禪者重於自了與出離精神不能為重人事重現實的儒者所同意新的儒者面對隆盛的佛教其實是禪宗而從辨夷夏道倫常的立場抨擊佛教其實是禪宗的自私遺棄人事透過佛道思想而重新活躍的儒家理學師承了孟子的攻擊精神孟子攻訐楊墨現在轉化為攻訐佛老似乎不攻訐佛老就算不得孔氏之徒從中國固有思想而融攝了部分的印度佛教理學是成功的孔子的非宗教精神到理學家的排斥佛老才充分的發揮出來民族文化自尊心的高揚發展為復古的菲薄秦漢隋唐的輝煌成就排斥宗教的文明問題就在這裡理學的新儒者也有靜坐尋孔顏樂處有著類似禪者的宗教經驗也能喚起為聖為賢的景仰嚮往鼓舞起為道衛道的熱誠然這僅是少數者在一般民間無法完成這樣的信願本來禪者也有同樣情形然不久禪者早已發展為輝煌寺宇莊嚴的像設鐘鼓儀制使儒者讚美為三代禮樂盡在是矣佛教的一般為念佛特重音聲上層為禪悟南宋而來漸傾向於貫通綜合所以佛教不但是少數者的證悟更是一般人類的皈信處儒者呢幾乎恢復了古代的階級宗教排斥佛老以為中國的有識人物是不應該信佛老的充其量佛老也不過聖人以神道設教的化治愚民的工具他自己即使有類似宗教的信願也不能普遍而對於一般的宗教被看作愚民迷信造成了一般的非宗教無信仰的社會在知識階級中國正統文化的儒者間造成對於宗教的錯覺根深蒂固禪者是著重體證的真切的悟境是性靈的直觀所以禪者應用象徵的表現方式流露出直覺的藝術的壯美禪者的心境大抵不適於研究經教不能重視名理卻不妨美的文藝禪者輕視義學其實他根本無法學會嚴密的義學但卻能發出意境高遠而平淡現成的好詩文真正的禪者不是拘謹的是熱情的殺活自在的但理學者恰好相反孔子以來的儒者早就偏重於曾子一系的狷道理學者承受這樣的傳統復古的嚮往道貌岸然的尊嚴不免流於拘謹或者流於冷酷純正的理學者於詩文書畫等都是不大高明的太子折一枝鮮花理學的老師也要嚕囌一番想到私孰時代的老夫子豈不是從過分謹嚴而流於冷酷在理學的社會中餓死事小失節事大被看作合乎天理當然理學大師也不乏高明人物但給豫一般的印象多少有點迂酸總結的説一句儒家發展到理學是輝煌的成就但世間法難得圓滿他缺少一種應有的東西即沒有真切的宗教情操宗教世界的為人熱情在中國文化大扭轉的過程中有兩點是值得注意的一唐武宗毀廢宗教以來部分的宗教轉入地下活動祕密宗教開始活躍起來如佛教的彌勒出世與摩尼教的明王治世逐漸融合而成為白蓮教等二唐代以來佛教的通俗説教俗講如變文之類非常發達在佛教義學昌明的時代會産生優美的通俗文學是不致太離經的但由於教學的衰落由於理學興起而上層階級多少離開佛教逐漸流為不佛不道又儒又佛的宗教文學明清以來的種種寶卷都從此而來這都與祕密宗教相結合祕密宗教並非沒有合理的思想代表著知識水準低落者的宗教要求這並非不可以引入正道但被看作邪教被取締而取締是從來不曾有效反而由於宗教的轉入地下愈來愈迷妄這可見不能尊重與發展高尚的宗教像儒者那樣的宗教觀宗教界的情形會變得更壞然這不但是宗教界的苦難是中國民族中國社會的莫大損害中國民族逐漸的成為拘泥怯弱妄自尊大囿於狹小的現實不再有雄渾闊大強毅虛心的漢唐盛德了元代皇家是崇佛的儒者被編為九儒十丐的階級雖也還尊敬孔子而理學當然只能困守然而佛教也並不曾得益除了不立文字的傳統而外因蒙古人而進來的蕃僧造成了中國佛教非常混亂的局面短短百年的外族統治儒佛都受到嚴重的傷害總算明太祖出來結束了這一混亂的世局皇覺寺僧出身的明太祖對佛教有護持的熱情論理佛教應該在中國重走好運而事實卻越來越壞這真是出乎意外然而並不希奇只是不理解佛教的真義與受到理學者的影響明太祖的護持佛教是毫無問題的他不斷的詔諭僧衆應怎樣的來弘揚佛法成祖也信佛極深到武宗更學會梵文自稱大慶法王嘉靖以前的明代佛教處於有利的情勢下然而卻意外的受到傷害太祖諭僧純一説既棄父母以為僧當深入危山結廬以靜性太祖以為諸祖經佛之道所在靜處不出戶牖他所訂的僧制或居山澤或居常住或遊諸方不干於民太祖心目中的佛教主要是山林的禪者他們自耕自食演變為放佃的地主不干於民不知道佛制比丘的遊化人間受民間的施與就隨分隨力的將佛法深入到民間不干於民的僧制與此相反使佛教與社會脫節這裡面隱藏著一大問題太祖本與白蓮教有關但在軍事勝利中重用儒者來治理政事太祖尊崇大成理學的朱熹製定八股以朱注四書為準繩來考試士子這個崇佛的皇朝由於尊崇理學及理學者當政佛教即無形的被傷害了禪者的自食其力本是深入山林的不得已從韓愈以來儒者一直在攻訐僧衆的不耕而食不織而衣以及寺院像設的糜費所以太祖的獎勵僧衆深入山林去自食其力或居常住而過著地主生活經懺生活不干於民多少減少儒者的壓力然而僧衆的經濟建築在寺産經懺而不建築在廣大的信衆身上這怎能不走向沒落明代的出家人完全被置於儒家的倫理思想下凡僧尼道士女冠並令拜父母祭祀祖先喪服等第皆與常人同違者杖一百還俗這完全違反了佛制使超越的宗教精神屈服於現實的政治威力這等於暗示了出家的非法為理學者的空前勝利尤其是釋道二教自漢唐以來通於民俗難於盡廢惟嚴其禁約毋使滋蔓露骨的表示了溫和的非宗教精神禪者為代表的佛教本已走向山林理學者攻訐他隱遁自私其實是惟恐他不如此佛教被壓迫而退入山林放棄了社會的文化與慈濟活動中國文化才成為理學的一家天下這個崇佛的皇朝到末季佛教是衰落極了如嚴嵩死在卑田院其實是佛教慈濟事業的悲田院但當時的佛教衰落到連名稱都弄不清了如紫柏大師來京師弘法當然會接觸到朝臣因此被誣陷而死在獄中有些人怪他不知道高蹈山林到京師來自取其辱憨山大師到南昌僅有不穿僧服不受戒的和尚到廣東南華時情形更壞二百年來要僧衆不干於民退出社會去隱修的護法方針證明了根本的錯誤剗絶了佛教的慧命還有一個問題太祖是出身於祕密結社的白蓮教他深切的知道宗教徒的集合對於黑暗政治是有危險性的所以太祖嚴厲的取締祕密結社他的僧衆不干於民不得與民雜處不得奔走市村以化緣為由都含有政治防範的意味這到清代説得更明白聚衆為匪之衆都由姦邪僧道主謀平時煽惑愚民日漸釀成大案專制政治發展到極點的明清統治者不怕聖人之徒的理學家卻怕愚民的僧道唯一的防範方法限制他獎勵他與民衆脫節清代的儒者復活了漢代經學的研究極有成績但理學家在政治上的地位由統治者的推重還是絲毫不曾動搖而且清代的經學並非兩漢的經學兩漢的經學滲透了宗教的仰信而清代經學卻繼承了理學的反宗教精神清代的佛教道教的情形更壞一直在衰落中而理學傳統的排斥宗教的政治壓力真是變本加厲越來越凶惡起初順治康熙雍正初年與中國文化的關係還不深都有佛教的信行雖然這都是禪宗的禪宗的天童一系一時非常隆盛但到了雍正晚年不滿意三峰派的與文人學士相往來運用帝王的威力徹底的破壞了他到乾隆更取著理學正統的立場嚴厲的對付佛教與道教天主教等僧道不得於市肆誦經托鉢陳説因果聚斂金錢違者懲罰若有官及軍民之家縱令妻女於寺觀神廟燒香者笞四十罪坐夫男無夫男者罪坐本婦其寺觀神廟住持及守門之人不為禁止者與同罪依此大清會典的律令來看僧衆道流不但被迫而不干於民不出戶牖不得遊行教化而且還嚴厲的取締婦女們到寺廟進香禮拜營為宗教生活佛教與道教完全被封鎖在山門以內一些自以為儒學正統的縉紳門第往往挂起僧道無緣的牌子即是這種反宗教意識的表白自認為精通中國文化的乾隆帝他公開的表示同意儒家的觀點釋道是異端在國家則為遊民他一登位即下諭痛責佛教界首先將順治康熙雍正三帝與佛教的關係割絶了接著通行甄別僧道的工作他容許山林修道布衣粗食獨善其身而壓抑了宗教的社會活動使成為孤立的脫離社會的分子被整肅的僧道們所有的財産沒收歸公這一來宗教界大大的惶惑不安起來乾隆三次下諭説明這並非屏斥異端只是對付為害佛道為害社會的偽僧偽道然而他的真意其後表白為此教流傳已久人數繁多一時難以禁革是以朕令復行頒給度牒使目前有核查將來可以漸次減少此朕經理之本意也漸次減少是他的目的是他同意儒者觀點禁遊惰勸力作之本意而所以不曾斷然禁絶並非尊重真僧真道而是數十萬人的生活問題他以為僧道亦窮民之一今之僧道不過鄉里無依之貧民竄入空門佛教被看作窮老孤獨殘廢的收容所佛教與道教等的真意義全被抹煞如乾隆二年諭説釋道是異端然讀誦經書之禮教者得罪聖賢比異端更甚凡星相雜流回回教天主教一概禁絶不行嘉慶十年諭説釋道二氏尚不可信況西洋教耶理學精神在政治上的成功重要是一切宗教的排斥養成了中國知識分子的非宗教傳統乾隆以後一切祕密結社的宗教活動強化進行反政府的活動是不無原因的清末的天主教徒為帝國主義作侵略先鋒造成種種教案其中中國知識階級的仇教活動也不是沒有責任的理學傳統的政治人物不知宗教對於人生的真意義使其向上的發展而進行反宗教的抹煞政策充其量承認他勸善戒惡化導愚頑但自稱聖賢之徒的知識分子當然是不需要了這種排斥宗教的政治當然不會做到徹底但説到宗教就聯想到迷信的錯誤卻在中國知識分子的心裡根深蒂固的傳下來這被稱為中國正統的非宗教文化果真是中國民族的幸福嗎時代開始大改變西方的勢力跟著堅利的艦隊而來儒家無法適應迅速的沒落了號稱中國正統文化千百年來占有政治與教育的儒家主要是理學可説是清一色的中國知識界但僅是廢八股開學堂失去了教育權不消十年草年等於全部消失脆弱到如此的不堪一擊似乎太希奇了全中國的孔廟都不知怎樣的變了還比不上飽經摧殘壓迫的佛教與道教多少能為了拆廟毀像而呼號反對這便是非宗教的無信仰的上層文化缺乏堅強力量的真憑實據辛亥光復以來西洋文化的傳入與打倒迷信表裡的同時進行神教徒並非不知道自己的真面目只是利用打倒迷信來摧殘中國固有的信仰祭祖宗也是迷信多少塗抹些洋式情調的新知識分子不脫舊知識分子的非宗教傳統現在是科學時代講求實證實用當然更要反對宗教反宗教或者説打倒迷信這一來更為徹底不但打倒迷信宗教而且還要打倒禮教本來無力的宗教與道德力經不起五四運動的襲擊而完全解體然而科學與民主精神始終沒有成就西洋新宗教依中國的正統文化應説是新迷信除了兜搭得外國人的分子而外也不能迅速建立起來中國民族的精神進入了真正的真空狀態五四運動的領導者胡適他們都是繼承傳統的非宗教者胡適的非基督教非宗教態度並非美國式的實驗哲學覺得自己百事不如人決心要引導中國民族去全盤西化這是外國人所最賞識的結果唯物的共産主義據有了中國大陸發動洗腦運動這能説不是全盤西化嗎近來少數的有心人痛心五四以來的全盤西化打倒孔門禮教弄到神州陸沈而不知從中國人心中摧毀最強大的反共力量宗教信仰不是別的是宋明以來的理學理學者要壓倒異端佛道而自己卻不是宗教在下的局促於倫常家庭為當前的功利所奴役在上的僅是形而上的玄學這都不能從崇高意境的景慕中喚起光明與熱情養成強毅堅決的信念孔子説民無信不立我們現在嘗受無信仰的惡果了宗教情緒的養成對於民族的強盛有著怎樣的作用説來話長然而日本英美都是有信仰的民族連摧毀宗教的蘇聯惡果在後面看著吧也還是千百年來的宗教區秦漢隋唐的隆盛都不是無信仰者的業績我是神教迷信的反對者然而我堅決的相信迷信比沒有信仰好得多我的論列並非故意要挑剔儒家理學在今日儒家與佛教應該是同病互助的時候儒家以及理學僅是有缺點不是根本要不得他是有著光榮的一面的不過以中國正統文化自居的學者大抵不能同情宗教或僅是同情形而上學像梁漱溟熊十力馬一浮馮芝生都對中國文化有認識而且也接觸到佛教但對宗教都是缺乏真切信解的抗戰期間有新儒家運動運動還在開始而排斥宗教的二氏佛老這一類陳腔濫調又逐漸的搬出來了我們現在又避難來臺灣中國文化的運動一定有人在努力這是應該努力的這是復興民族的真正動力希望能擴大胸襟如隋唐以前一樣勿再陷入無信仰的理學窠臼勿偏以儒家為中國文化勿偏以理學為儒家從古典中國文化到周秦的子學兩漢的經學六朝隋唐的佛學宋明以來的理學近代傳來的西學從古代的儒家近代的三民主義線索中貫徹各時代的文化取精用宏來鑄造新的中國文化中國文化的新生才是中國民族復興大業的完成中國文化的運動者不能忽略文化中的宗教因素那怕是迷信的假如中國的知識界永遠把宗教看作迷信落伍有宗教信仰的也不敢拿念珠挂十字架怕人譏笑那麼中國的文化將真是永遠的落伍了
