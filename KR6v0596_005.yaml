承認自己的渺小而回歸於主耶和華的名下接受耶和華上帝的領導耶和華叫人類分散對立就是達成上帝愛世人的辦法二反對成立國家變亂口音一舉上帝似乎是勝利了但並非決定性的勝利人類還是向智慧團結能力而邁進耶和華也就不斷的憤怒抗爭而企圖確保宇宙王國的統治這是有上帝說為證的神父牧師們就是相信這樣的話試舉兩例一衆人彼此說我們不如立一個首領回埃及去罷民一四耶和華對摩西說這百姓藐視我要到幾時呢民一四二以色列的長老都聚集來到拉瑪見撒母耳對他說現在求你為我們立一個王像列國一樣撒上八耶和華對撒母耳說百姓向你說的一切話你只管依從因為他們不是厭棄你而是厭棄我不要我作他們的王撒上八耶和華以色列的神如此說你們今日卻厭棄了救你們脫離一切災難的神說求你立一個王治理我們撒上八第一例是以色列民族從埃及出來的時候當時的領導者摩西利用以色列上帝耶和華的名義鼓舞同族而進行脫離埃及統治的鬥爭在進入祖宗的故鄉迦南以前居留曠野的艱苦生活是可以想見的每日吃嗎哪而生活受到生活的熬煉也就不免有了怨言巴不得我們早死在埃及地耶和華的手下那時我們坐在肉鍋旁邊吃得飽足你們將我們領出來到這曠野是要叫這全會衆都餓死阿出一六誰給我們肉吃呢我們記得在埃及的時候不花錢就吃魚民一一民族的獨立固然重要肚子吃飽也非常要緊這些牢騷以人的立場來說是人情之常但以耶和華來說就顯得不夠信心不夠服從免不得要發怒了後來以色列人聽到迦南地方的人民強壯有力就失望的哀哭起來巴不得我們早死在埃及地或是死在這曠野耶和華為甚麼要把我們領到那迦南地使我們倒在刀下呢我們的妻子和孩子必被虜掠我們回埃及去豈不好嗎衆人彼此說我們不如立一個首領回埃及去罷民一四另立一個領袖不只是不要摩西而就是不信任耶和華上帝的領導嫌耶和華的領導無方使大衆面臨絶地嫌耶和華領導無方不再要耶和華領導對於耶和華上帝的藐視嚴重到甚麼程度所以這一次上帝生的氣可大了準備用瘟疫來擊殺他們耶和華最心愛的以色列人後來雖答應了摩西的懇求還是給了你們的尸首必倒在曠野在進迦南以前就死了的懲罰耶和華上帝的法律是誰不受耶和華的領導誰就該死上帝的大慈悲愛世人是不能與統治人類分離的因為上帝的身分就是宇宙的大統治者主宰在上帝非統治人類就無法愛人類所以人類也就非服從主作忠實的僕人不能獲得上帝的愛耶和華與耶穌先生的信徒阿你們要記著統治你就是愛你第二例在以色列民族進入迦南由祭師撒母耳領導的時候那時以色列還是部落十二支族時代士師祭師治理耶和華神權統治的時代當時的列國都有了國家組織有國王治理以色列人也就向撒母耳要求為他們立一個王從祭師治理到國王治理本是人類歷史的一定演進是可喜的進步但從耶和華的神權神人間的主奴關係來說那等於叛逆不要耶和華作他們的王了所以耶和華對撒母耳說他們不是厭棄你而是厭棄我不要我作他們的王人類由於眼睛明亮人類文明進展到這一階段任憑耶和華怎樣的全知全能也無法扭轉這一歷史的要求雖然耶和華還是努力作最後的說服告訴他們那王將來怎樣管轄他們撒上八服勞役納賦稅還要奪取他們的財産但人類有了國家組織的堅決要求也就不聽耶和華的話耶和華到底是聰明的見事已如此反對無效也就順水推舟給他們立一個王了耶和華不願意以色列人成立國家還是不願意人類的團結人類集合於國家組織之下至少是以政統教怕還要政教分離人類再也不會無組織的受耶和華神權的直接領導了國家制度是人類進一步的社會組織在國家的統一組織下營為群體的活動文化事業公共福利一切都更迅速的進步在這大地上人類要顯揚自己的名字不再將榮耀歸於上帝企圖反對國家誹毀國家為管轄人類虐待人類的力量耶和華早在馬列主義以前吐露這種高見了其實他們也不一定討厭國家只是國家制的存在使他們統治世界的雄才大略無法實現罷了三叫人家庭分爭人類既有了分別善惡的智力那唯有使人類分散對立鬥爭才能接受耶和華上帝的領導這一政略到耶穌先生宣揚福音的時代雖因人智進步而大大修正了耶和華的意思但以促使人類分散對立為達成信仰上帝的有效方法還是一樣如耶穌先生說你們不要想我來是叫地上太平我來乃是叫地上動刀兵因為我來是叫人與父親生疏女兒與母親生疏媳婦與婆婆生疏人的仇敵就是自己家裡的人太十你們以為我來是叫地上太平嗎我告訴你們不是乃是叫人分爭從今以後一家五個人將要分爭三個人和兩個人相爭兩個人和三個人相爭父親和兒子相爭兒子和父親相爭母親和女兒相爭女兒和母親相爭婆婆和媳婦相爭媳婦和婆婆相爭路十二耶穌先生的福音強調信主得救主要是信上帝的兒子信上帝的化身也就是信耶穌自己他強調來世間宣揚福音的中心工作是促使家庭內的自相鬥爭就是動刀動槍也在所不惜有些讀經而沒有讀通的好好先生懷疑耶穌先生那樣的愛人如己不惜犧牲自己的生命怎麼叫世人自相分爭呢不只說愛而又談仇恨不說和平而強調鬥爭呢這怕不是耶穌先生的意見吧這是不明白希伯來精神也可說西方精神的幼稚想法如明白耶和華上帝的主宰人類是從人的分散對立中而完成統治就容易明白耶穌先生這一平常的道理了不過耶和華上帝的愛世人著重於種