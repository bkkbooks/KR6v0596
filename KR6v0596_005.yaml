body:
  text: 五上帝愛世人青年節前後和平東路會的兩位基督教友特地夜晚來訪並送我一部新舊約全書聖經我與新舊約全書別來已三十多年了這一次一旦重逢真有他鄉遇故知的感覺對這兩位基督教友的好意我深深的感謝他們記得我在學佛以前也曾聽過牧師們講道也曾作禮拜按時禱告而且也曾像熱心的基督徒那樣每天讀經我那時的讀經心得不一定與神父牧師們的神學一樣其實他們也不完全一樣但覺得有些心得也著實可以作熱心的神教徒的參考所以一旦與新舊約重逢就想起要多少寫些出來一上帝愛世人的根本立場一上帝的愛上帝是道地的中國名詞西方的一神教傳來將名為耶和華的神譯為上帝或譯作神這樣的譯語沒有甚麼不可以不過中國的上帝與名為耶和華的上帝決不因同名上帝而含義一樣這如同稱為人而或者是賢是聖或者是巨凶大惡一樣這裡不談中國上帝與西方上帝的同異而要專談耶和華上帝的愛世人耶和華上帝的愛世人在神教徒的心目中是千真萬確無可懷疑的事實試略舉三項就可以看出耶和華上帝的愛世人愛到了怎樣的程度一神上帝用地上的塵土造人將生氣吹在他鼻孔裡他就成了有靈的活人創二為他造一個配偶幫助他創二神賜福給他們又對他們說要生養衆多遍滿地面治理這地也要管理海裡的魚空中的鳥和地上各樣行動的活物神說看哪我將遍地上一切結種子的菜蔬和樹上所結有核的果子全賜給你們作食物創一二耶和華說我要將所造的人和走獸並昆蟲以及空中的飛鳥都從地上除滅創六神曉諭挪亞和他的兒子說我與你們和你們的後裔立約凡有血肉的不再被洪水滅絶創九三神愛世人甚至將他的獨生子賜給他們叫一切信他的不致滅亡反得永生約三從第一項說不要說耶和華不造人就是造了人如不給吹一口生氣不再造一個女人作配偶那種泥偶人永恆的獨身者簡直使神教徒不敢想像幸而耶和華上帝的慈愛竟然吹了一口生氣而且給了一個配偶這才成為活人成為有女人可管轄的男人對女人說我必多多加增你懷胎的苦楚你丈夫必管轄你創三這應該怎樣的感謝上帝至少男人們應該如此而且造了一切樹果一切魚鳥獸類給人作食品使人得到充分的口福與營養這難怪神教徒的禱告首先要感謝耶和華上帝的恩典而且每飯不忘總要謝上帝賜給我飯吃從第二項說神對人是這樣的慈愛如上項所說而人類卻在地上罪惡很大終日思想的盡都是惡創六耶和華有此權柄有此大能不應該將人類殺盡滅絶嗎這才四十晝夜降大雨在地上創七造成了最大的洪水泛濫人類和鳥獸等幾乎都斷了種那僅存的挪亞全家趕快拿各類潔淨的牲畜飛鳥獻在壇上為燔祭耶和華聞那馨香之氣就心裡說我不再因人的緣故咒詛地也不再按著我才行的降大洪水滅各種的活物了創八耶和華天恩浩蕩竟然與挪亞父子們立約凡有血肉的不再被洪水滅絶創九使人能安心生活下去大家想想被共産黨徒稱讚為農民革命的張獻忠在他的七殺碑上雖也知道天神生萬物以養人人無一德以報天卻只知殺殺殺殺殺殺殺而不知在快要殺盡四川人時與四川人立約從此封刀也許是四川人沒有挪亞那樣懂得感恩獻供的緣故唉張獻忠到底是匪類耶和華到底是上帝這麼一對比不但顯出耶和華的愛世人也看出西方上帝的智慧了拿第三項來說耶和華的恩德可大了上帝造人而人卻盡量的作惡上帝勸也勸過罵也罵過打也打過殺也殺過威脅利誘什麼辦法都用過而結果是一切毫無用處人類還是我行我素在罪惡中走向毀滅連耶和華一心一意所選定的以色列人也腐敗得國家破亡民族流離這簡直故意與上帝為難使上帝從亞伯拉罕以來的無邊祝福完全落空這幾乎要使人懷疑耶和華的智慧與能力了於是乎耶和華不惜將他的獨生子耶穌先生下放到人間在神學上這是上帝退休聖父的時代過去而聖子耶穌的時代到來耶穌先生要以他的血代替萬民的罪惡而死在十字架上讓萬民有進入天國的可能唉這真是耶和華的恩德說不完二這也算是愛世人嗎上帝愛世人雖在西方神教徒的心目中千真萬確無可懷疑而東方人中國人洋化者除外總覺得不是這一回事從內心生起懷疑這也算是上帝愛世人嗎天地萬物的存在女人的存在是否上帝所造這涉及無可徵信的創造論姑且不論現在假定這一切是耶和華上帝所造的交給人類管理享受的但是耶和華是否真愛世人也還是大大的疑問以男女關係來說打開歷史翻開新聞充滿了以男女關係而引起的無邊糾紛罪惡痛苦拿花草果木蔬菜來說不但荊蔓莠草人類服食毒草毒果而致命的也是常有的事有些花香嗅到了就能使人中毒尤其是鳥獸蟲魚當然人類常常的吃他駕御他而人類受他們的損害如虎狼的吃人蚊蚋的吸血似乎也不能說是上帝創造來愛世人吧最難以理解的人身常生一些寄生蟲如蛔蟲絛蟲吸血蟲等專吸人的血液而生活這怕不是耶和華上帝愛世人創造蟲魚鳥獸以供人管理服用反而是耶和華愛蛔蟲等創造人類以作他們生長繁殖的溫床了問題越說越多上帝愛世人的事實也越來越難信了就像耶和華以洪水來毀滅一切僅挪亞一家幸免於死這位西方神教信仰的典型人物挪亞竟然目睹一切的毀滅而無動於衷還會感謝那位毀滅一切的耶和華上帝的恩典向他獻燔祭這種西方式的信仰叫東方的中國人怎能信受呢又如人類有些生而貧窮的生而殘廢的生而狂騃的生而為奴隸的耶和華上帝到底憑甚麼而厚彼薄此耶穌先生一次醫好了生來瞎眼的有人問起這生而瞎眼的原因何在耶穌先生以為不是這人犯了罪也不是他父母犯罪是要在他的身上顯出神的作為來約九在耶穌先生看來這是非常合理的但現代的世界上多少人生而殘廢的畸形的狂騃的這都是為了要在他身上顯出上帝的作為來嗎耶穌先生這一套理論東方的中國人也永遠的攪不通神的主宰一切或說神有仁慈的恩德這在東方的中國人就是一切民族都有這樣的意識存在的無論是自然社會自己的身心都不只是美好的如雨水的滋潤一切也可以洪水泛濫連耶和華賜給人吃的在中國名為靠天吃飯有時也會因噎塞而死或者骨鯁在喉上下不得對於這些在神明主宰一切的意識中神教徒就會說出許多大道理對人類有利益的這是神的仁慈使人感受苦難的這是神的公義神的憤怒神的考驗還有一切於人有益的歸於上帝於人有損害的屬於惡魔照這樣說不但神與魔對立近於善惡二元論而神的愛世人也不能確定因為上帝有愛也有恨既可以說愛世人為甚麼不說上帝恨世人呢東方的中國的神教觀到此為止所以說到天有好生之德又說天地不仁既看到天地之大德曰生又看到天發殺機儘管畏天敬神有時卻說出天胡不弔上帝為甚麼那樣不憐憫天道難論天道無知甚至會說天道有禍福而無賞罰遠在戰國時代的文藝大師屈原由於忠君愛國而得禍滿腹牢騷就不客氣的向上帝責難一番名為天問了可是希伯來的偉大宗教家為了貫徹上帝的絶對性而宣說上帝是絶對完善的愛因為唯有這樣才能達成唯一絶對的主宰意欲與絶對完善的道德意識的統一表現在世間事實上就是強權與公理的合一這一工作從先知時代開始到耶穌先生的被殺而草草完成可是這麼一來生長在反極權意識充滿人道與理性文化中的東方人中國人越來越攪不通了不免隨時從內心泛起疑問這些也算是上帝愛世人嗎三站穩自己的立場對於上帝愛世人東方人多數不容易明白西方人卻能信得過現在可也不成了生在中國的我從前熱心讀經的時候起初也一直想不通好在我前生修得的慧力不錯終於豁然貫通本來不要說教宗就是普通的神父牧師一定是希望如此心裡有數不消多說像我下面所要說的他們會如數家珍的知道是引用某書某章某節覺得這隻迷失的羔羊摸到羊門而怎麼又走了對神父牧師們雖然不消說可是那些為了奶粉舊衣為了留學為了政治而信教者不免會偶爾泛起疑情為了幫助這些半信不信似信非信的教友們我是不惜眉毛拖地泄露天機依中國傳說泄露天機是干犯天怒的現在我要直捷了當告訴教友們你是人嗎你是人就要站穩你做人的立場認清你與耶和華上帝的關係要知道不能徹底的信仰上帝愛世人毛病在立場不穩認識不清人是甚麼人是耶和華上帝得意的作品有時也會失望人是被造者神是創造者雖然人蒙耶和華上帝的恩賜負起管理世界萬物享受一切的責任與權利但在被造的立場來說人算是甚麼呢創造主對於被造者有支配的完全自由如搏土的工匠要造成花瓶就是花瓶要造成尿罐就是尿罐尿罐還能埋怨工匠的不平等嗎工匠造了花瓶如果看不順眼打壞了重做花瓶還能怪工匠的不盡心嗎被造的陶器誰能說工匠的不是呢耶和華上帝是創造主一切屬於上帝上帝愛甚麼就是甚麼所以無論甚麼事在耶和華來說永無錯誤完全正確人在耶和華眼前蒙恩叫人負起管理使用的責任那不過等於奴僕稟承主人的意思去執行而已主人說先掃地就先掃地主人說後擦椅子就後擦椅子奴僕還敢變動工作的先後次序嗎說開門就開門說關起就關起主人是絶對的支配者就算人是高等的奴隸總還是奴隸除了執行主人的意思還能自作主張嗎所以耶和華上帝的真實信徒在禱告中總是不斷的主呀主呀你的僕人一定是無條件的服從上帝的意思不會錯而永無怨望這種主奴關係新舊約到處啓示我們而耶穌先生特別說得明白所以耶和華上帝的兒女們耶穌先生的門徒們你們要站穩自己奴僕的立場認清人與上帝的主奴關係這才能打開了進入天國的大門依舊約所說人因為犯罪才受到生活的種種艱困至於生而聾啞生而畸形之類那是上帝意志的自由安排被造者是無權過問的健康富有的忽而成為貧病也是耶和華的意思被汽車壓傷壓死也應該作如此想舊約的約伯記對這說得極為透徹約伯是一位義人由於撒旦的搬弄耶和華上帝也就重重的打擊他一下考驗他一下約伯貧病交加痛苦不堪約伯覺得自己是誠信上帝的奉行公義的那為甚麼會有此遭遇呢於是乎他希望早點死去希望能找到耶和華向耶和華訴冤與上帝辨個明白到底為了甚麼末了耶和華向他現身責問他使約伯承認自己的錯誤約伯的確是錯誤了他忘記了自己的奴隸立場忘記了被造者在創造主面前的地位心懷怨望就是缺乏信心的表示他竟想早一點死去而不知人的生存是上帝的權力不是上帝的意思誰還能讓他多活一刻嗎奴隸難道還可與主人辨論嗎作為真誠的耶和華的信仰者必須培養奴隸意識習以成性這才能無條件的信賴上帝才能一切榮耀歸於上帝富貴是上帝的恩賜貧賤是上帝的好意上帝要我活著我就活著要我甚麼時候離開世間我就甚麼時候離開這叫蒙恩奉召歸天一切屬於上帝一切榮耀歸於上帝這樣的信才是耶和華上帝的標準僕人也才能完美地信受上帝愛世人或者以為不然現在是民主自由的時代反奴役的時代耶和華與耶穌先生的道理正以民主自由平等的姿態到處推銷怎麼說一個真誠的天主教